<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Carteira — Análise</title>
<link rel="stylesheet" href="common.css">
<link rel="icon" type="image/png" href="../favicon.png">
<link rel="stylesheet" href="../style.css">
<link rel="stylesheet" href="../mobile.css">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@2.47.0/dist/tabler-icons.min.css">
<script>window.NAV_BASE_PATH = "../"; window.NAV_SLIM = true;</script>
</head>
<body>
<div id="nav-placeholder"></div>
<h2 class="sr-only">Carteira — Análise de concentração, correlação e rebalanceamento</h2>

<div class="app">
  <div class="header">
    <h1><i class="ti ti-chart-pie" aria-hidden="true" style="color:var(--blue)"></i>Carteira</h1>
    <div class="header-actions" id="header-actions"></div>
  </div>

  <div class="tabs" id="tabs"></div>

  <div id="tab-analise">
    <div class="metrics" id="metrics-analise"></div>
    <div class="charts-row">
      <div class="card">
        <div class="card-title"><i class="ti ti-affiliate" aria-hidden="true" style="color:#2E86C1"></i>Risco por Setor</div>
        <div id="analise-setor"></div>
      </div>
      <div class="card">
        <div class="card-title"><i class="ti ti-stethoscope" aria-hidden="true" style="color:#1D9E75"></i>Saúde da Carteira</div>
        <div id="analise-saude"></div>
      </div>
    </div>
    <div class="analise-grid">
      <div class="card">
        <div class="card-title">Concentração — Top 5 Ativos</div>
        <div style="position:relative;height:180px"><canvas id="chartConc" role="img" aria-label="Top 5 ativos por concentração"></canvas></div>
      </div>
      <div class="card">
        <div class="card-title">Alocação por Classe</div>
        <div style="position:relative;height:180px"><canvas id="chartCorr" role="img" aria-label="Diversificação por classe"></canvas></div>
      </div>
    </div>
    <div class="card">
      <div class="card-title">Recomendação de Rebalanceamento</div>
      <div class="tbl-wrap">
      <table class="tbl">
        <thead><tr><th>Classe</th><th class="r">% Atual</th><th class="r">% Ideal</th><th class="r">Diferença</th><th class="r">Ação Sugerida</th></tr></thead>
        <tbody id="tbody-rebal"></tbody>
      </table>
      </div>
    </div>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
<script src="common.js"></script>
<script src="firebase.js"></script>
<script>
renderHeaderAndNav('analise');
injectModals();

function renderAnalise(){
  const c=calcAtivos().sort((a,b)=>b.vt-a.vt);
  const total=c.reduce((s,a)=>s+a.vt,0);
  const t=getTotals();
  // Índice de diversificação (HHI) → "número efetivo de ativos" = 1/Σ(peso²)
  let hhi=0; if(total>0)c.forEach(a=>{const w=a.vt/total;hhi+=w*w;});
  const efetivos=hhi>0?1/hhi:0;
  let divTxt,divCor;
  if(efetivos>=10){divTxt='Bem diversificada';divCor='#1D9E75';}
  else if(efetivos>=5){divTxt='Diversificação ok';divCor='#2E86C1';}
  else if(efetivos>=3){divTxt='Pouco diversificada';divCor='#BA7517';}
  else{divTxt='Muito concentrada';divCor='#E24B4A';}
  document.getElementById('metrics-analise').innerHTML=`
    <div class="mcard"><div class="mcard-label">Diversificação</div><div class="mcard-value">${new Set(c.map(a=>a.classe)).size} classes</div><div class="mcard-sub">${c.length} ativos</div></div>
    <div class="mcard"><div class="mcard-label">Índice de diversificação</div><div class="mcard-value" style="color:${divCor}">${fmt(efetivos,1)}</div><div class="mcard-sub">${divTxt} (nº efetivo de ativos)</div></div>
    <div class="mcard"><div class="mcard-label">DY Médio (12M)</div><div class="mcard-value positive">${fmt(t.dyMed)}%</div></div>
    <div class="mcard"><div class="mcard-label">Ativo mais concentrado</div><div class="mcard-value" style="display:flex;align-items:center;gap:8px">${c[0]?logoAtivo(c[0],20):''}<span>${c[0]?_rotuloAtivoTexto(c[0]):'-'} (${total?fmt((c[0]?.vt||0)/total*100):0}%)</span></div></div>
  `;
  const top5=c.slice(0,5);
  if(charts.conc)charts.conc.destroy();
  // [BUG-A FIX] Guard total>0 para evitar NaN nos gráficos com carteira vazia
  charts.conc=new Chart(document.getElementById('chartConc').getContext('2d'),{
    type:'bar',data:{labels:top5.map(a=>a.ticker),datasets:[{label:'% Carteira',data:top5.map(a=>total>0?parseFloat(((a.vt/total)*100).toFixed(1)):0),backgroundColor:['#185FA5','#3B6D11','#BA7517','#534AB7','#0F6E56'],borderRadius:4}]},
    options:{indexAxis:'y',responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false},tooltip:{callbacks:{label:c=>' '+c.raw+'%'}}},scales:{x:{grid:{color:'rgba(128,128,128,0.08)'},ticks:{color:'#888',font:{size:10},callback:v=>v+'%'}},y:{grid:{display:false},ticks:{color:'#888',font:{size:11}}}}}
  });
  const bc=byClasse(c);
  const clsKeys=Object.keys(bc);
  if(charts.corr)charts.corr.destroy();
  charts.corr=new Chart(document.getElementById('chartCorr').getContext('2d'),{
    type:'polarArea',data:{labels:clsKeys.map(k=>CLASS_LABEL[k]||k),datasets:[{data:clsKeys.map(k=>total>0?parseFloat(((bc[k]/total)*100).toFixed(1)):0),backgroundColor:clsKeys.map(k=>CLASS_COLORS[k]+'99'),borderWidth:0}]},
    options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:true,position:'right',labels:{font:{size:10},color:'#888',boxWidth:10}}}}
  });
  const rebalTb=document.getElementById('tbody-rebal');
  rebalTb.innerHTML=metas.map(m=>{
    const atual=total>0?((bc[m.classe]||0)/total)*100:0;
    const diff=atual-m.ideal;
    let acao='',cor='';
    if(diff>3){acao='Reduzir / Não aportar';cor='#E24B4A'}
    else if(diff<-3){acao='Aumentar aporte';cor='#BA7517'}
    else{acao='Manter';cor='#1D9E75'}
    // [BUG-B FIX] Zona neutra de ±2pp — consistente com metas.html
    const corDiff=diff>2?'#E24B4A':diff<-2?'#BA7517':'#1D9E75';
    return`<tr><td><strong>${CLASS_LABEL[m.classe]||m.classe}</strong></td><td class="r">${fmt(atual)}%</td><td class="r">${m.ideal}%</td><td class="r" style="color:${corDiff};font-weight:500">${diff>=0?'+':''}${fmt(diff)}%</td><td class="r" style="color:${cor};font-weight:500">${acao}</td></tr>`;
  }).join('');
}

/* ---- Risco por setor (busca o setor de cada ativo nos fundamentos) ---- */
var _setorCache=typeof _setorCache!=='undefined'?_setorCache:{}; // var (não const): a aba recarrega o script ao voltar; mantém o cache
async function fetchSetor(ticker){
  if(_setorCache[ticker]!==undefined)return _setorCache[ticker];
  try{
    const r=await fetch('../data/fundamentalistas/'+ticker+'.json?t='+Date.now());
    _setorCache[ticker]=r.ok?((await r.json()).setor||null):null;
  }catch(e){ _setorCache[ticker]=null; }
  return _setorCache[ticker];
}
async function renderSetor(){
  const el=document.getElementById('analise-setor'); if(!el)return;
  const c=calcAtivos();
  const total=c.reduce((s,a)=>s+a.vt,0);
  if(total<=0){ el.innerHTML='<div style="font-size:12px;color:var(--color-text-secondary)">Sem ativos ainda.</div>'; return; }
  await Promise.allSettled(c.map(a=>fetchSetor(a.ticker)));
  const grupos={};
  c.forEach(a=>{
    const setor=_setorCache[a.ticker]||(CLASS_LABEL[a.classe]||'Outros');
    grupos[setor]=(grupos[setor]||0)+a.vt;
  });
  const arr=Object.entries(grupos).map(([s,v])=>({s,v,pct:v/total*100})).sort((a,b)=>b.v-a.v);
  const max=Math.max(...arr.map(x=>x.pct));
  el.innerHTML=arr.map(x=>{
    const cor=x.pct>40?'#E24B4A':x.pct>25?'#BA7517':'#2E86C1';
    return `<div style="display:flex;align-items:center;gap:8px;margin-bottom:8px">
      <span style="min-width:120px;font-size:11px;color:var(--color-text-secondary);white-space:nowrap;overflow:hidden;text-overflow:ellipsis" title="${x.s}">${x.s}</span>
      <span style="flex:1;height:7px;border-radius:4px;background:rgba(128,128,128,0.12);overflow:hidden"><span style="display:block;height:100%;width:${(x.pct/max*100).toFixed(0)}%;background:${cor}"></span></span>
      <span style="font-size:12px;font-weight:600;min-width:46px;text-align:right">${fmt(x.pct)}%</span>
    </div>`;
  }).join('')+'<div style="font-size:10px;color:var(--color-text-secondary);margin-top:6px">Cripto, exterior e renda fixa entram pela classe.</div>';
}

/* ---- Checklist de saúde da carteira ---- */
function renderSaude(){
  const el=document.getElementById('analise-saude'); if(!el)return;
  const c=calcAtivos();
  const t=getTotals();
  const total=c.reduce((s,a)=>s+a.vt,0);
  if(total<=0){ el.innerHTML='<div style="font-size:12px;color:var(--color-text-secondary)">Sem ativos ainda.</div>'; return; }
  const bc=byClasse(c);
  const maxAtivoPct=Math.max(...c.map(a=>a.vt/total*100));
  const maxClassePct=Math.max(...Object.values(bc))/total*100;
  const nClasses=new Set(c.map(a=>a.classe)).size;
  const temRF=(bc['RF']||0)+(bc['TD']||0)>0;
  const checks=[
    {ok:maxAtivoPct<=20, txt:'Nenhum ativo passa de 20% da carteira', det:`maior tem ${fmt(maxAtivoPct)}%`},
    {ok:nClasses>=3, txt:'Pelo menos 3 classes diferentes', det:`você tem ${nClasses}`},
    {ok:maxClassePct<=60, txt:'Nenhuma classe passa de 60%', det:`maior classe ${fmt(maxClassePct)}%`},
    {ok:temRF, txt:'Tem uma reserva em Renda Fixa/Tesouro', det:temRF?'sim':'nenhuma'},
    {ok:t.dyMed>0, txt:'A carteira gera dividendos', det:`DY ${fmt(t.dyMed)}%`},
    {ok:c.length>=5, txt:'Pelo menos 5 ativos', det:`você tem ${c.length}`},
  ];
  const okN=checks.filter(x=>x.ok).length;
  el.innerHTML=`<div style="font-size:12px;color:var(--color-text-secondary);margin-bottom:10px">${okN} de ${checks.length} itens em ordem</div>`+
    checks.map(x=>`<div style="display:flex;align-items:flex-start;gap:8px;margin-bottom:9px">
      <span style="color:${x.ok?'#1D9E75':'#E24B4A'};font-weight:700;font-size:13px">${x.ok?'✓':'✕'}</span>
      <span style="font-size:12px"><span style="color:var(--color-text-primary)">${x.txt}</span> <span style="color:var(--color-text-secondary)">— ${x.det}</span></span>
    </div>`).join('');
}

function renderAll(){
  renderAnalise();
  renderSetor();
  renderSaude();
}

mvGate(initConsolidador);
</script>
<script src="../nav.js"></script>
</body>
</html>
