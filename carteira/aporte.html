<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Carteira — Aporte</title>
<link rel="stylesheet" href="common.css">
<link rel="icon" type="image/png" href="../favicon.png">
<link rel="stylesheet" href="../style.css">
<link rel="stylesheet" href="../mobile.css">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@2.47.0/dist/tabler-icons.min.css">
<style>
  /* Motion design da carteira — sutil e rápido */
  @keyframes apFadeUp{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:none}}
  @keyframes apBarGrow{from{transform:scaleX(0)}to{transform:scaleX(1)}}
  .ap-anim-row{animation:apFadeUp .35s ease-out both}
  .ap-bar-anim{transform-origin:left center;animation:apBarGrow .45s ease-out both}
  .ap-leg-item{transition:background .15s ease;cursor:default;border-radius:6px}
  .ap-leg-item:hover{background:rgba(255,255,255,.05)}
  @media (prefers-reduced-motion: reduce){
    .ap-anim-row,.ap-bar-anim{animation:none!important}
  }
</style>
<script>window.NAV_BASE_PATH = "../"; window.NAV_SLIM = true;</script>
</head>
<body>
<div id="nav-placeholder"></div>
<h2 class="sr-only">Carteira — Aporte: onde investir e meta da carteira</h2>

<div class="app">
  <div class="header">
    <h1><i class="ti ti-chart-pie" aria-hidden="true" style="color:var(--blue)"></i>Carteira</h1>
    <div class="header-actions" id="header-actions"></div>
  </div>

  <div class="tabs" id="tabs"></div>

  <div id="tab-aporte">
    <div class="card" style="margin-bottom:1rem">
      <div style="display:flex;flex-wrap:wrap;justify-content:space-between;align-items:flex-start;gap:18px">
        <div>
          <div style="font-size:11px;font-weight:600;color:var(--text2,#8A8884);text-transform:uppercase;letter-spacing:.05em;margin-bottom:8px">Quanto vou aportar</div>
          <div style="display:flex;align-items:center;gap:8px">
            <span style="font-size:15px;color:var(--color-text-secondary)">R$</span>
            <input id="ap-input" type="number" min="0" step="50" placeholder="0,00" class="cell-edit" style="width:160px;font-size:16px;text-align:right" oninput="apSetAporte(this.value)">
          </div>
          <div id="ap-resumo" style="font-size:12px;color:var(--color-text-secondary);margin-top:10px"></div>
        </div>
        <div style="min-width:260px;max-width:380px">
          <div class="card-title" style="margin-bottom:8px"><i class="ti ti-history" aria-hidden="true" style="color:#2E86C1"></i>Seu histórico de aportes</div>
          <div id="ap-historico"></div>
        </div>
      </div>
    </div>

    <div class="charts-row">
      <div class="card">
        <div class="card-title"><i class="ti ti-target" aria-hidden="true" style="color:var(--blue)"></i>Carteira ideal (sua meta)</div>
        <div style="display:flex;align-items:flex-start;gap:14px;margin-bottom:12px">
          <div style="position:relative;flex:1;min-width:130px;height:210px"><canvas id="ap-pizza-ideal" role="img" aria-label="Carteira ideal por classe"></canvas></div>
          <div id="ap-legenda-ideal" style="flex-shrink:0;display:flex;flex-direction:column;gap:6px"></div>
        </div>
        <div style="border-top:1px solid var(--border,rgba(255,255,255,0.06));padding-top:10px">
          <div id="ap-meta-add"></div>
          <div id="ap-meta-total" style="margin-top:8px;font-size:12px"></div>
        </div>
      </div>
      <div class="card">
        <div class="card-title">Sua carteira (hoje)</div>
        <div style="display:flex;align-items:center;gap:14px">
          <div style="position:relative;flex:1;min-width:130px;height:210px"><canvas id="ap-pizza-atual" role="img" aria-label="Sua carteira atual por classe"></canvas></div>
          <div id="ap-legenda-atual" style="flex-shrink:0;display:flex;flex-direction:column;gap:6px"></div>
        </div>
      </div>
    </div>

    <div class="section-title"><i class="ti ti-arrow-big-down-lines" aria-hidden="true"></i>Onde aportar</div>
    <div id="ap-tabela"></div>

    <div class="section-title" style="margin-top:1.5rem"><i class="ti ti-adjustments" aria-hidden="true"></i>Rebalanceamento por classe</div>
    <div id="ap-rebal"></div>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
<script src="common.js"></script>
<script src="firebase.js"></script>
<script>
renderHeaderAndNav('aporte');
injectModals();

var aporteAtual=0; // var (não let): o script da página roda de novo na troca de abas

// Classes possíveis (mesma ordem do app); o editor de meta lista todas.
var AP_CLASSES=['B3','FII','ETF','BDR','RF','TD','Crypto','Exterior','ETFINT','REIT','FUNDO','OUTRO'];
var AP_PALETTE=['#E2453C','#FF6B35','#F5A623','#FFCC00','#E8615D','#C9772E','#D4A017','#1D9E75','#0F8E6E','#2E86C1','#3B6D11','#7D5BA6']; // quentes primeiro, frias no fim
// Cor por ranking: a maior fatia da meta pega a 1ª cor, e assim por diante.
// Ordem: classes da meta (ideal>0) por % decrescente; depois as demais (que você tem) por valor decrescente.
var apColorByClasse={};
function apBuildColorMap(){
  const im=apIdealMap();
  const metaCls=AP_CLASSES.filter(k=>(im[k]||0)>0)
    .sort((a,b)=>(im[b]||0)-(im[a]||0)||AP_CLASSES.indexOf(a)-AP_CLASSES.indexOf(b));
  const bc=byClasse(calcAtivos());
  const extras=AP_CLASSES.filter(k=>!metaCls.includes(k)&&((bc[k]||0)>0||im.hasOwnProperty(k)))
    .sort((a,b)=>(bc[b]||0)-(bc[a]||0)||AP_CLASSES.indexOf(a)-AP_CLASSES.indexOf(b));
  apColorByClasse={};
  metaCls.concat(extras).forEach((cl,i)=>{apColorByClasse[cl]=AP_PALETTE[i%AP_PALETTE.length];});
}
function apColor(cl){
  if(apColorByClasse[cl])return apColorByClasse[cl];
  var i=AP_CLASSES.indexOf(cl);return i>=0?AP_PALETTE[i%AP_PALETTE.length]:'#888';
}

/* Motion: anima a entrada só no 1º desenho da aba (não a cada tecla digitada) */
var apFirstPaint=true;   // resetado pra true sempre que a aba é reaberta (o script roda de novo)
var apTabelaShown=false; // anima as barras só quando a tabela passa a aparecer
function apHoverSlice(cid,i){ const ch=charts[cid]; if(!ch)return; ch.setActiveElements([{datasetIndex:0,index:i}]); ch.update('none'); }
function apHoverClear(cid){ const ch=charts[cid]; if(!ch)return; ch.setActiveElements([]); ch.update('none'); }

function apSetAporte(v){ aporteAtual=Math.max(0,parseFloat(v)||0); apRenderTabela(); apRenderResumo(); apRenderRebal(); }

function apIdealMap(){ const m={}; metas.forEach(x=>m[x.classe]=x.ideal); return m; }

/* Editar a meta por classe (atualiza dados + recalcula sem reconstruir os inputs, pra não perder o foco) */
function apSetMeta(classe,valor){
  const v=Math.max(0,parseFloat(valor)||0);
  const idx=metas.findIndex(m=>m.classe===classe);
  if(idx>=0)metas[idx].ideal=v; else metas.push({classe,ideal:v});
  saveMetas(); apBuildColorMap();
  apRenderTotal(); apRenderCharts(); apRenderTabela(); apRenderResumo(); apRenderRebal();
}

function apRenderEditor(){
  const im=apIdealMap();
  const ativas=AP_CLASSES.filter(cl=>metas.some(m=>m.classe===cl))
    .sort((a,b)=>(im[b]||0)-(im[a]||0)||AP_CLASSES.indexOf(a)-AP_CLASSES.indexOf(b));
  const disp=AP_CLASSES.filter(cl=>!metas.some(m=>m.classe===cl));
  const idealOrder=ativas.filter(cl=>(im[cl]||0)>0); // fatias da pizza ideal, na mesma ordem
  const rows=ativas.map((cl,i)=>{
    const pi=idealOrder.indexOf(cl);
    const cls='ap-leg-item'+(apFirstPaint?' ap-anim-row':'');
    const sty=`display:flex;align-items:center;gap:6px;padding:1px 4px;${apFirstPaint?`animation-delay:${i*40}ms;`:''}`;
    const hov=pi>=0?` onmouseenter="apHoverSlice('ap-pizza-ideal',${pi})" onmouseleave="apHoverClear('ap-pizza-ideal')"`:'';
    return `<div class="${cls}" style="${sty}"${hov}>
      <span style="width:9px;height:9px;border-radius:50%;background:${apColor(cl)};flex-shrink:0"></span>
      <span style="min-width:90px;font-size:12px;color:var(--color-text-primary);white-space:nowrap">${CLASS_LABEL[cl]||cl}</span>
      <input class="cell-edit" type="number" min="0" max="100" step="1" value="${im[cl]||''}" placeholder="0" style="width:50px;text-align:right" oninput="apSetMeta('${cl}',this.value)">
      <span style="font-size:11px;color:var(--color-text-secondary)">%</span>
      <button class="btn btn-sm" title="Remover classe" onclick="apRemoveClasse('${cl}')" style="padding:1px 6px;line-height:1">✕</button>
    </div>`;
  }).join('');
  const add=disp.length?`
    <div style="display:flex;align-items:center;gap:8px;margin-top:10px">
      <select id="ap-add-classe" class="cell-edit" style="flex:1;font-size:12px">
        <option value="">+ Adicionar classe…</option>
        ${disp.map(cl=>`<option value="${cl}">${CLASS_LABEL[cl]||cl}</option>`).join('')}
      </select>
      <button class="btn btn-sm" onclick="apAddClasse(document.getElementById('ap-add-classe').value)" style="padding:2px 10px">+</button>
    </div>`:'';
  const leg=document.getElementById('ap-legenda-ideal');
  if(leg)leg.innerHTML=rows||'<div style="font-size:12px;color:var(--color-text-secondary)">Adicione uma classe abaixo.</div>';
  const addEl=document.getElementById('ap-meta-add');
  if(addEl)addEl.innerHTML=add;
  apRenderTotal();
}
function apAddClasse(cl){
  if(!cl||metas.some(m=>m.classe===cl))return;
  metas.push({classe:cl,ideal:0}); saveMetas(); apBuildColorMap();
  apRenderEditor(); apRenderCharts(); apRenderTabela(); apRenderResumo(); apRenderRebal();
}
function apRemoveClasse(cl){
  metas=metas.filter(m=>m.classe!==cl); saveMetas(); apBuildColorMap();
  apRenderEditor(); apRenderCharts(); apRenderTabela(); apRenderResumo(); apRenderRebal();
}

function apRenderTotal(){
  const total=metas.reduce((s,m)=>s+(parseFloat(m.ideal)||0),0);
  const ok=Math.abs(total-100)<0.5;
  document.getElementById('ap-meta-total').innerHTML=
    `Total: <strong style="color:${ok?'#1D9E75':'#BA7517'}">${total.toFixed(0)}%</strong>`+
    (ok?' ✓':' — o ideal é somar 100%.');
}

function apPizza(canvasId,labels,vals,colors){
  const el=document.getElementById(canvasId);
  if(!el)return;
  if(charts[canvasId])charts[canvasId].destroy();
  const soma=vals.reduce((s,v)=>s+v,0);
  charts[canvasId]=new Chart(el.getContext('2d'),{
    type:'doughnut',
    data:{labels,datasets:[{data:vals,backgroundColor:colors,borderWidth:0,hoverOffset:3}]},
    options:{responsive:true,maintainAspectRatio:false,cutout:'0%',
      animation:apFirstPaint?{animateRotate:true,animateScale:true,duration:500,easing:'easeOutCubic'}:{duration:200},
      plugins:{legend:{display:false},
      tooltip:{callbacks:{label:c=>' '+c.label+': '+(soma?((c.raw/soma)*100).toFixed(1):0)+'%'}}}}
  });
}

function apRenderCharts(){
  const c=calcAtivos();
  const total=c.reduce((s,a)=>s+a.vt,0);
  const im=apIdealMap();
  const bc=byClasse(c);
  // Ordem-base (igual à meta): classes da meta por % desc; depois as que você tem fora da meta, por valor desc.
  const metaCls=AP_CLASSES.filter(k=>(im[k]||0)>0)
    .sort((a,b)=>(im[b]||0)-(im[a]||0)||AP_CLASSES.indexOf(a)-AP_CLASSES.indexOf(b));
  const extras=AP_CLASSES.filter(k=>(bc[k]||0)>0&&!metaCls.includes(k))
    .sort((a,b)=>(bc[b]||0)-(bc[a]||0)||AP_CLASSES.indexOf(a)-AP_CLASSES.indexOf(b));
  // Sua carteira (hoje): legenda imita a ordem do ideal; classes da meta que faltam aparecem apagadas.
  const legendCls=metaCls.concat(extras);          // legenda completa (inclui faltantes da meta)
  const pieCls=legendCls.filter(k=>(bc[k]||0)>0);  // gráfico: só o que você tem
  apPizza('ap-pizza-atual',
    pieCls.map(k=>CLASS_LABEL[k]||k),
    pieCls.map(k=>+bc[k].toFixed(2)),
    pieCls.map(k=>apColor(k)));
  document.getElementById('ap-legenda-atual').innerHTML=legendCls.length?legendCls.map((k,i)=>{
    const tem=(bc[k]||0)>0;
    const pct=total?((bc[k]||0)/total*100).toFixed(1):0;
    const pi=tem?pieCls.indexOf(k):-1;
    const cls='ap-leg-item'+((apFirstPaint&&tem)?' ap-anim-row':''); // não animar as apagadas (preserva opacidade)
    const sty=`display:flex;align-items:center;gap:8px;padding:1px 4px;${tem?'':'opacity:.4;'}${(apFirstPaint&&tem)?`animation-delay:${i*40}ms;`:''}`;
    const hov=pi>=0?` onmouseenter="apHoverSlice('ap-pizza-atual',${pi})" onmouseleave="apHoverClear('ap-pizza-atual')"`:'';
    return `<div class="${cls}" style="${sty}"${hov}>
      <span style="display:flex;align-items:center;gap:5px;font-size:12px;color:var(--color-text-secondary);min-width:96px"><span style="width:9px;height:9px;border-radius:50%;background:${apColor(k)};flex-shrink:0"></span>${CLASS_LABEL[k]||k}</span>
      <span style="font-size:12px;font-weight:600;color:var(--color-text-primary)">${tem?pct+'%':'—'}</span>
    </div>`;
  }).join(''):'<div style="font-size:12px;color:var(--color-text-secondary)">Sem ativos ainda.</div>';
  // Carteira ideal (meta) — só classes com ideal > 0, por % desc
  const clsIdeal=metaCls;
  apPizza('ap-pizza-ideal',
    clsIdeal.map(k=>CLASS_LABEL[k]||k),
    clsIdeal.map(k=>im[k]),
    clsIdeal.map(k=>apColor(k)));
  // A legenda da carteira ideal é o próprio editor (apRenderEditor) — não sobrescrever aqui.
}

function apRenderResumo(){
  const el=document.getElementById('ap-resumo');
  if(!el)return;
  if(aporteAtual<=0){ el.textContent='Digite um valor para ver onde investir.'; return; }
  const c=calcAtivos();
  const total=c.reduce((s,a)=>s+a.vt,0);
  const sug=calcSugestaoAporte(c,total,aporteAtual);
  const n=c.filter(a=>sug.aporteAtivo[a.ticker]>0.005).length;
  el.innerHTML=`Aporte de <strong>${fmtR(aporteAtual)}</strong> dividido em <strong>${n}</strong> ativo(s). Novo patrimônio: <strong>${fmtR(total+aporteAtual)}</strong>.`;
}

function apRenderTabela(){
  const c=calcAtivos();
  const total=c.reduce((s,a)=>s+a.vt,0);
  const el=document.getElementById('ap-tabela');
  if(aporteAtual<=0){
    apTabelaShown=false;
    el.innerHTML='<div class="empty">Digite quanto vai aportar lá em cima para ver quanto investir em cada ativo.</div>';
    return;
  }
  const sug=calcSugestaoAporte(c,total,aporteAtual);
  const FRAC=new Set(['RF','TD','Crypto','FUNDO']); // fracionários: sem cota inteira
  const linhas=c.map(a=>({a,ap:sug.aporteAtivo[a.ticker]||0,alvo:sug.alvoPct[a.ticker]||0,qtd:sug.qtdComprar[a.ticker]||0}))
    .filter(x=>x.ap>0.005)
    .sort((x,y)=>y.ap-x.ap);
  // Classes da meta sem ativo: dinheiro reservado + sugestão de adicionar a classe.
  const reservas=Object.entries(sug.reservaClasse||{}).map(([cl,v])=>({cl,v})).sort((a,b)=>b.v-a.v);
  const sobra=sug.sobra||0;
  if(!linhas.length&&!reservas.length){
    el.innerHTML='<div class="empty">Nenhum ativo recebeu aporte. Defina a meta por classe e dê notas aos ativos.</div>';
    return;
  }
  const maxAp=Math.max(linhas.length?linhas[0].ap:0,...reservas.map(r=>r.v),1);
  const totalDist=linhas.reduce((s,x)=>s+x.ap,0)+reservas.reduce((s,r)=>s+r.v,0)+sobra;
  const animBars=!apTabelaShown; apTabelaShown=true; // anima as barras só na 1ª vez que a tabela aparece
  el.innerHTML=`<div class="tbl-wrap"><table class="tbl">
    <thead><tr><th>Ativo</th><th>Classe</th><th class="r">Nota</th><th class="r">% alvo</th><th class="r">Preço atual</th><th class="r">Qtd</th><th class="r">Aporte sugerido</th><th class="r">% do aporte</th></tr></thead>
    <tbody>
      ${linhas.map(({a,ap,alvo,qtd},bi)=>{const frac=FRAC.has(a.classe);return `<tr>
        <td><strong title="${a.ticker}">${typeof rotuloAtivo==='function'?rotuloAtivo(a):a.ticker}</strong></td>
        <td><span style="display:inline-flex;align-items:center;gap:5px"><span style="width:9px;height:9px;border-radius:50%;background:${apColor(a.classe)}"></span>${CLASS_LABEL[a.classe]||a.classe}</span></td>
        <td class="r">${a.nota||1}</td>
        <td class="r">${alvo>0?alvo.toFixed(1)+'%':'-'}</td>
        <td class="r">${frac?'—':fmtR(a.cotacao||0)}</td>
        <td class="r">${frac?'—':'<strong>'+(qtd||0)+'</strong>'}</td>
        <td class="r"><div style="display:flex;align-items:center;justify-content:flex-end;gap:8px">
          <span style="flex:1;max-width:110px;height:6px;border-radius:3px;background:rgba(128,128,128,0.15);overflow:hidden"><span class="${animBars?'ap-bar-anim':''}" style="display:block;height:100%;width:${(ap/maxAp*100).toFixed(0)}%;background:#1D9E75;${animBars?`animation-delay:${bi*30}ms;`:''}"></span></span>
          <strong style="color:#1D9E75">${fmtR(ap)}</strong></div></td>
        <td class="r">${(ap/aporteAtual*100).toFixed(1)}%</td>
      </tr>`;}).join('')}
      ${reservas.map(({cl,v})=>`<tr style="background:rgba(255,204,0,0.05)">
        <td colspan="6"><span style="display:inline-flex;align-items:center;gap:6px"><i class="ti ti-plus" aria-hidden="true" style="color:#FFCC00"></i><span>Adicione <strong>${CLASS_LABEL[cl]||cl}</strong> na sua carteira para alcançar a meta</span></span></td>
        <td class="r"><strong style="color:#FFCC00">${fmtR(v)}</strong></td>
        <td class="r">${(v/aporteAtual*100).toFixed(1)}%</td>
      </tr>`).join('')}
      ${sobra>0.005?`<tr style="opacity:.7">
        <td colspan="6"><span style="display:inline-flex;align-items:center;gap:6px"><i class="ti ti-coin" aria-hidden="true"></i><span>Troco que não fechou uma cota (classes já no alvo)</span></span></td>
        <td class="r"><strong>${fmtR(sobra)}</strong></td>
        <td class="r">${(sobra/aporteAtual*100).toFixed(1)}%</td>
      </tr>`:''}
    </tbody>
    <tfoot><tr><td colspan="6" style="text-align:right;font-weight:600">Total</td><td class="r"><strong>${fmtR(totalDist)}</strong></td><td class="r">100%</td></tr></tfoot>
  </table></div>`;
}

/* ---- Rebalanceamento por classe: o que comprar/reduzir para chegar na meta ---- */
function apRenderRebal(){
  const el=document.getElementById('ap-rebal'); if(!el)return;
  const c=calcAtivos();
  const total=c.reduce((s,a)=>s+a.vt,0);
  const metasValidas=(metas||[]).filter(m=>(m.ideal||0)>0);
  if(!metasValidas.length){ el.innerHTML='<div class="empty">Defina suas metas por classe lá em cima para ver o rebalanceamento.</div>'; return; }
  if(total<=0&&aporteAtual<=0){ el.innerHTML='<div class="empty">Sem patrimônio ainda. Adicione lançamentos ou digite quanto vai aportar.</div>'; return; }
  const bc=byClasse(c);
  const novoTotal=total+aporteAtual;
  const linhas=metasValidas.map(m=>{
    const atualR=bc[m.classe]||0;
    const idealR=novoTotal*(m.ideal/100);
    return {classe:m.classe, ideal:m.ideal, atualR, idealR, diff:idealR-atualR};
  }).sort((a,b)=>b.diff-a.diff);
  // Com aporte digitado, divide o dinheiro só nas classes abaixo da meta (proporcional ao déficit).
  let distrib={};
  if(aporteAtual>0){
    const deficits=linhas.filter(l=>l.diff>0);
    const somaDef=deficits.reduce((s,l)=>s+l.diff,0);
    deficits.forEach(l=>{ distrib[l.classe]=somaDef>0?aporteAtual*l.diff/somaDef:0; });
  }
  el.innerHTML=`<div class="card"><div class="tbl-wrap"><table class="tbl">
    <thead><tr><th>Classe</th><th class="r">Hoje</th><th class="r">Ideal</th><th class="r">Diferença</th>${aporteAtual>0?'<th class="r">Aportar deste valor</th>':'<th class="r">Ação</th>'}</tr></thead>
    <tbody>${linhas.map(l=>{
      const cor=l.diff>2?'#BA7517':l.diff<-2?'#E24B4A':'#1D9E75';
      const acao=l.diff>novoTotal*0.02?'Aumentar':l.diff<-novoTotal*0.02?'Reduzir/segurar':'✓ No alvo';
      const ultima=aporteAtual>0?`<td class="r"><strong style="color:#1D9E75">${distrib[l.classe]>0?fmtR(distrib[l.classe]):'—'}</strong></td>`:`<td class="r" style="color:${cor};font-weight:500">${acao}</td>`;
      return `<tr><td><span style="display:inline-flex;align-items:center;gap:5px"><span style="width:9px;height:9px;border-radius:50%;background:${apColor(l.classe)}"></span><strong>${CLASS_LABEL[l.classe]||l.classe}</strong> <span style="font-size:11px;color:var(--color-text-secondary)">${l.ideal}%</span></span></td>
        <td class="r">${fmtR(l.atualR)}</td><td class="r">${fmtR(l.idealR)}</td>
        <td class="r" style="color:${cor};font-weight:500">${l.diff>=0?'+':''}${fmtR(l.diff)}</td>${ultima}</tr>`;
    }).join('')}</tbody>
  </table></div>
  <div style="font-size:10px;color:var(--color-text-secondary);margin-top:8px">${aporteAtual>0?'O valor que você vai aportar foi dividido nas classes abaixo da meta.':'Digite quanto vai aportar lá em cima para ver a divisão do dinheiro.'}</div></div>`;
}

/* ---- Histórico de aportes (a partir das compras lançadas) ---- */
function apHistorico(){
  const compras=ativos.filter(a=>(a.tipo||'Compra')==='Compra'&&a.data);
  if(!compras.length)return null;
  const porMes={}; let total=0;
  compras.forEach(a=>{const ym=a.data.slice(0,7);const v=a.qtd*a.pm;porMes[ym]=(porMes[ym]||0)+v;total+=v;});
  const meses=Object.keys(porMes).sort();
  const [y0,m0]=meses[0].split('-').map(Number);
  const hoje=new Date();
  const mesesCorridos=Math.max(1,(hoje.getFullYear()-y0)*12+(hoje.getMonth()+1-m0)+1);
  return {total, nMesesComAporte:meses.length, mesesCorridos, mediaCorrido:total/mesesCorridos, maiorMes:Math.max(...Object.values(porMes))};
}
function apRenderHistorico(){
  const el=document.getElementById('ap-historico'); if(!el)return;
  const h=apHistorico();
  if(!h){ el.innerHTML='<div style="font-size:12px;color:var(--color-text-secondary)">Lance suas compras com data para ver seu histórico.</div>'; return; }
  el.innerHTML=`<div style="display:flex;flex-direction:column;gap:10px">
    <div style="display:flex;justify-content:space-between"><span style="font-size:12px;color:var(--color-text-secondary)">Total já aportado</span><strong>${fmtR(h.total)}</strong></div>
    <div style="display:flex;justify-content:space-between"><span style="font-size:12px;color:var(--color-text-secondary)">Média por mês</span><strong>${fmtR(h.mediaCorrido)}</strong></div>
    <div style="display:flex;justify-content:space-between"><span style="font-size:12px;color:var(--color-text-secondary)">Maior aporte num mês</span><strong>${fmtR(h.maiorMes)}</strong></div>
    <div style="display:flex;justify-content:space-between"><span style="font-size:12px;color:var(--color-text-secondary)">Meses com aporte</span><strong>${h.nMesesComAporte} de ${h.mesesCorridos}</strong></div>
  </div>`;
}

function renderAll(){
  apBuildColorMap();
  apRenderEditor();
  apRenderCharts();
  apRenderTabela();
  apRenderResumo();
  apRenderRebal();
  apRenderHistorico();
  apFirstPaint=false; // a partir daqui, edições não re-animam a entrada
}

mvGate(initConsolidador);
</script>
