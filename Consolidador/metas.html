<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Consolidador de Carteira — Metas</title>
<link rel="stylesheet" href="common.css">
<link rel="icon" type="image/png" href="../favicon.png">
<link rel="stylesheet" href="../style.css">
<link rel="stylesheet" href="../mobile.css">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@2.47.0/dist/tabler-icons.min.css">
<script>window.NAV_BASE_PATH = "../"; window.NAV_SLIM = true;</script>
</head>
<body>
<div id="nav-placeholder"></div>
<h2 class="sr-only">Consolidador de Carteira — Metas de alocação ideal vs. atual</h2>

<div class="app">
  <div class="header">
    <h1><i class="ti ti-chart-pie" aria-hidden="true" style="color:var(--blue)"></i>Consolidador de Carteira</h1>
    <div class="header-actions" id="header-actions"></div>
  </div>

  <div class="tabs" id="tabs"></div>

  <div id="tab-metas">
    <div class="section-title" style="margin-top:0"><i class="ti ti-adjustments" aria-hidden="true"></i>Rebalanceamento sugerido</div>
    <div class="card" style="margin-bottom:1.5rem">
      <div style="display:flex;flex-wrap:wrap;gap:10px;align-items:flex-end;margin-bottom:12px">
        <div><div style="font-size:11px;color:var(--color-text-secondary);margin-bottom:3px">Vou investir agora (R$, opcional)</div>
          <input id="reb-aporte" type="number" min="0" step="100" value="0" class="cell-edit" style="width:140px;text-align:right" oninput="renderRebalanceamento()"></div>
      </div>
      <div id="reb-conteudo"></div>
    </div>

    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:1rem;flex-wrap:wrap;gap:8px">
      <div class="section-title" style="margin:0"><i class="ti ti-target" aria-hidden="true"></i>Meus objetivos</div>
      <button class="btn btn-sm btn-primary" onclick="objToggleForm()">+ Novo objetivo</button>
    </div>
    <div id="obj-form" style="display:none"></div>
    <div id="obj-lista"></div>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
<script src="common.js"></script>
<script src="firebase.js"></script>
<script>
renderHeaderAndNav('metas');
injectModals();

/* ===== Meus Objetivos ===== */
function objAnoAtual(){ return new Date().getFullYear(); }
function objYMAtual(){ const d=new Date(); return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0'); }
function objAtual(o){
  const t=getTotals();
  if(o.tipo==='patrimonio') return t.total;
  if(o.tipo==='investido')  return t.custo;
  if(o.tipo==='prov_ano'){ const ano=String(objAnoAtual()); return getDividendosPorMes().filter(m=>m.ym.startsWith(ano)).reduce((s,m)=>s+m.total,0); }
  if(o.tipo==='prov_mes'){ const ym=objYMAtual(); const e=getDividendosPorMes().find(m=>m.ym===ym); return e?e.total:0; }
  if(o.tipo==='ativo'){ const a=calcAtivos().find(x=>x.ticker===(o.ticker||'').toUpperCase()); return a?a.qtd:0; }
  return 0;
}
function objTitulo(o){
  const base={patrimonio:'Patrimônio total',investido:'Valor investido',prov_ano:'Proventos em '+objAnoAtual(),prov_mes:'Proventos no mês',ativo:(o.ticker||'').toUpperCase()+' (cotas)'}[o.tipo]||'Objetivo';
  return o.nome?o.nome+' — '+base:base;
}
function objIcone(o){ return {patrimonio:'🏦',investido:'📊',prov_ano:'💰',prov_mes:'💰',ativo:'📈'}[o.tipo]||'🎯'; }
function objFmtVal(o,v){ return o.tipo==='ativo'?(Math.round(v*100)/100).toLocaleString('pt-BR')+' cotas':fmtR(v); }

function objToggleForm(){
  const f=document.getElementById('obj-form');
  if(f.style.display==='none'){ objRenderForm(); f.style.display='block'; } else { f.style.display='none'; }
}
function objRenderForm(){
  document.getElementById('obj-form').innerHTML=`
    <div class="card" style="margin-bottom:1rem">
      <div class="card-title">Novo objetivo</div>
      <div class="modal-grid">
        <div class="form-group" style="grid-column:1/-1"><label>Tipo de objetivo</label>
          <select id="obj-tipo" onchange="objFormCampos()">
            <option value="patrimonio">Patrimônio total</option>
            <option value="investido">Valor investido (aportado)</option>
            <option value="prov_ano">Proventos no ano</option>
            <option value="prov_mes">Proventos no mês</option>
            <option value="ativo">Quantidade de um ativo</option>
          </select>
        </div>
        <div class="form-group" id="obj-g-ticker" style="display:none"><label>Ativo (ticker)</label><input id="obj-ticker" type="text" placeholder="Ex: PETR4"></div>
        <div class="form-group"><label id="obj-alvo-label">Valor alvo (R$)</label><input id="obj-alvo" type="number" min="0" step="0.01" placeholder="0"></div>
        <div class="form-group" id="obj-g-aporte"><label>Aporte mensal previsto (R$, opcional)</label><input id="obj-aporte" type="number" min="0" step="0.01" placeholder="0"></div>
        <div class="form-group"><label>Nome (opcional)</label><input id="obj-nome" type="text" placeholder="Ex: Aposentadoria"></div>
      </div>
      <div class="modal-actions" style="margin-top:10px">
        <button class="btn" onclick="objToggleForm()">Cancelar</button>
        <button class="btn btn-primary" onclick="objAddSubmit()">Salvar objetivo</button>
      </div>
    </div>`;
  objFormCampos();
}
function objFormCampos(){
  const t=document.getElementById('obj-tipo').value;
  document.getElementById('obj-g-ticker').style.display=t==='ativo'?'':'none';
  document.getElementById('obj-g-aporte').style.display=(t==='patrimonio'||t==='investido')?'':'none';
  document.getElementById('obj-alvo-label').textContent=t==='ativo'?'Quantidade alvo (cotas)':'Valor alvo (R$)';
}
function objAddSubmit(){
  const tipo=document.getElementById('obj-tipo').value;
  const alvo=parseFloat(document.getElementById('obj-alvo').value)||0;
  if(alvo<=0){ alert('Informe um valor alvo maior que zero.'); return; }
  const o={ id:'o'+Date.now().toString(36), tipo, alvo, nome:(document.getElementById('obj-nome').value||'').trim() };
  if(tipo==='ativo'){ o.ticker=(document.getElementById('obj-ticker').value||'').trim().toUpperCase(); if(!o.ticker){ alert('Informe o ticker do ativo.'); return; } }
  if(tipo==='patrimonio'||tipo==='investido'){ o.aporteMensal=parseFloat(document.getElementById('obj-aporte').value)||0; }
  if(!Array.isArray(objetivos))objetivos=[];
  objetivos.push(o); saveObjetivos();
  document.getElementById('obj-form').style.display='none';
  renderObjetivos();
}
function objRemove(id){ objetivos=(objetivos||[]).filter(o=>o.id!==id); saveObjetivos(); renderObjetivos(); }
function objConclusao(o,atual,falta){
  const ap=o.aporteMensal||0;
  if(!(ap>0)||falta<=0)return '';
  let meses=0, saldo=atual; const alvo=o.alvo||0;
  if(o.tipo==='patrimonio'){
    // Juros compostos: proventos reinvestidos (usa o DY da carteira) + aporte mensal
    const dyA=(getTotals().dyMed)||0;
    const r=Math.pow(1+dyA/100,1/12)-1;
    while(saldo<alvo && meses<1200){ saldo=saldo*(1+r)+ap; meses++; }
  } else {
    meses=Math.ceil(falta/ap);
  }
  if(meses>=1200) return 'mais de 100 anos';
  const d=new Date(); d.setMonth(d.getMonth()+meses);
  const mm=['jan','fev','mar','abr','mai','jun','jul','ago','set','out','nov','dez'][d.getMonth()];
  const obs=(o.tipo==='patrimonio'&&((getTotals().dyMed)||0)>0)?' (com proventos reinvestidos)':'';
  return mm+'/'+d.getFullYear()+' (~'+meses+' meses)'+obs;
}
function renderObjetivos(){
  const lista=document.getElementById('obj-lista'); if(!lista)return;
  const arr=objetivos||[];
  if(!arr.length){ lista.innerHTML='<div class="empty">Nenhum objetivo ainda. Clique em “+ Novo objetivo”.</div>'; return; }
  lista.innerHTML=arr.map(o=>{
    const atual=objAtual(o); const alvo=o.alvo||0;
    const pct=alvo>0?Math.min(100,(atual/alvo)*100):0;
    const falta=Math.max(0,alvo-atual); const done=pct>=100;
    const cor=done?'#1D9E75':'#2E86C1';
    const conc=objConclusao(o,atual,falta);
    return `<div class="card" style="margin-bottom:12px">
      <div style="display:flex;justify-content:space-between;align-items:center;gap:8px;margin-bottom:8px">
        <div style="font-weight:600;font-size:14px">${objIcone(o)} ${objTitulo(o)}</div>
        <button class="btn btn-sm" title="Remover" onclick="objRemove('${o.id}')" style="padding:1px 8px;line-height:1">✕</button>
      </div>
      <div style="display:flex;justify-content:space-between;font-size:12px;margin-bottom:4px">
        <span style="color:${cor};font-weight:600">${fmt(pct)}%</span>
        ${done?'<span style="color:#1D9E75;font-weight:600">✓ concluído</span>':''}
      </div>
      <div class="progress-bar"><div class="progress-fill" style="width:${pct}%;background:${cor}"></div></div>
      <div style="display:flex;gap:22px;margin-top:12px;flex-wrap:wrap;font-size:12px">
        <div><div style="color:var(--color-text-secondary)">Atual</div><strong>${objFmtVal(o,atual)}</strong></div>
        <div><div style="color:var(--color-text-secondary)">Objetivo</div><strong>${objFmtVal(o,alvo)}</strong></div>
        <div><div style="color:var(--color-text-secondary)">Faltam</div><strong>${objFmtVal(o,falta)}</strong></div>
        ${conc?`<div><div style="color:var(--color-text-secondary)">Conclusão estimada</div><strong>${conc}</strong></div>`:''}
      </div>
    </div>`;
  }).join('');
}
/* ---- Rebalanceamento: o que comprar/reduzir para chegar na alocação ideal ---- */
function renderRebalanceamento(){
  const el=document.getElementById('reb-conteudo'); if(!el)return;
  const aporte=Math.max(0,parseFloat(document.getElementById('reb-aporte').value)||0);
  const c=calcAtivos();
  const total=c.reduce((s,a)=>s+a.vt,0);
  const metasValidas=(metas||[]).filter(m=>(m.ideal||0)>0);
  if(!metasValidas.length){ el.innerHTML='<div class="empty">Defina suas metas por classe na aba <strong>Aporte</strong> para ver o rebalanceamento.</div>'; return; }
  if(total<=0&&aporte<=0){ el.innerHTML='<div class="empty">Sem patrimônio ainda. Adicione lançamentos ou informe um valor a investir.</div>'; return; }
  const bc=byClasse(c);
  const novoTotal=total+aporte;
  const linhas=metasValidas.map(m=>{
    const atualR=bc[m.classe]||0;
    const idealR=novoTotal*(m.ideal/100);
    const diff=idealR-atualR; // >0 precisa aportar; <0 está acima
    return {classe:m.classe, ideal:m.ideal, atualR, idealR, diff};
  }).sort((a,b)=>b.diff-a.diff);
  // Quando há aporte, distribui o dinheiro só nas classes abaixo da meta (deficit), proporcional ao déficit.
  let distrib={};
  if(aporte>0){
    const deficits=linhas.filter(l=>l.diff>0);
    const somaDef=deficits.reduce((s,l)=>s+l.diff,0);
    deficits.forEach(l=>{ distrib[l.classe]=somaDef>0?aporte*l.diff/somaDef:0; });
  }
  el.innerHTML=`<div class="tbl-wrap"><table class="tbl">
    <thead><tr><th>Classe</th><th class="r">Hoje</th><th class="r">Ideal</th><th class="r">Diferença</th>${aporte>0?'<th class="r">Aportar deste valor</th>':'<th class="r">Ação</th>'}</tr></thead>
    <tbody>${linhas.map(l=>{
      const cor=l.diff>2?'#BA7517':l.diff<-2?'#E24B4A':'#1D9E75';
      const acao=l.diff>novoTotal*0.02?'Aumentar':l.diff<-novoTotal*0.02?'Reduzir/segurar':'✓ No alvo';
      const ultima=aporte>0?`<td class="r"><strong style="color:#1D9E75">${distrib[l.classe]>0?fmtR(distrib[l.classe]):'—'}</strong></td>`:`<td class="r" style="color:${cor};font-weight:500">${acao}</td>`;
      return `<tr><td><strong>${CLASS_LABEL[l.classe]||l.classe}</strong> <span style="font-size:11px;color:var(--color-text-secondary)">${l.ideal}%</span></td>
        <td class="r">${fmtR(l.atualR)}</td><td class="r">${fmtR(l.idealR)}</td>
        <td class="r" style="color:${cor};font-weight:500">${l.diff>=0?'+':''}${fmtR(l.diff)}</td>${ultima}</tr>`;
    }).join('')}</tbody>
  </table></div>
  <div style="font-size:10px;color:var(--color-text-secondary);margin-top:8px">${aporte>0?'O valor a investir foi dividido nas classes que estão abaixo da meta.':'Informe um valor acima para ver a sugestão de divisão do aporte.'}</div>`;
}

function renderAll(){ renderObjetivos(); renderRebalanceamento(); }

mvGate(initConsolidador);
</script>
<script src="../nav.js"></script>
</body>
</html>
