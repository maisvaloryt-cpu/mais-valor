  const c=calcAtivos(); // Bug #6 fix: contagem real de posições, não de lançamentos
  document.getElementById('metrics-resumo').innerHTML=`
    <div class="mcard">
      <div class="mcard-label"><i class="ti ti-wallet" aria-hidden="true"></i> Patrimônio total</div>
      <div class="mcard-value">${fmtR(t.total)}</div>
      <div class="mcard-sub">Valor investido: <strong>${fmtR(t.custo)}</strong></div>
    </div>
    <div class="mcard">
      <div class="mcard-label"><i class="ti ti-trending-up" aria-hidden="true"></i> Lucro total</div>
      <div class="mcard-value ${t.lucroTotal>=0?'positive':'negative'}">${t.lucroTotal>=0?'+':''}${fmtR(t.lucroTotal)}</div>
      <div class="mcard-sub">Capital: <span class="${t.res>=0?'positive':'negative'}">${t.res>=0?'+':''}${fmtR(t.res)}</span> + Prov: <span class="positive">${fmtR(t.proventosTotal)}</span></div>
    </div>
    <div class="mcard">
      <div class="mcard-label"><i class="ti ti-coin" aria-hidden="true"></i> Proventos (12M)</div>
      <div class="mcard-value positive">${fmtR(t.provAno)}</div>
      <div class="mcard-sub">DY médio: <strong class="positive">${fmt(t.dyMed)}%</strong></div>
    </div>
    <div class="mcard">
      <div class="mcard-label"><i class="ti ti-chart-bar" aria-hidden="true"></i> Variação (capital)</div>
      <div class="mcard-value ${t.resPct>=0?'positive':'negative'}">${fmtP(t.resPct)}</div>
      <div class="mcard-sub">${fmtR(Math.abs(t.res))} ${t.res>=0?'acima':'abaixo'} do custo</div>
    </div>
    <div class="mcard">
      <div class="mcard-label"><i class="ti ti-percent" aria-hidden="true"></i> Rentabilidade total</div>
      <div class="mcard-value ${t.rentTotal>=0?'positive':'negative'}">${fmtP(t.rentTotal)}</div>
      <div class="mcard-sub">${c.length} ativos em ${new Set(c.map(a=>a.classe)).size} classes</div>
    </div>
  `;
}

function renderEvolucao(nMeses=24){
  const evol=calcEvolucaoPatrimonio(nMeses).filter(m=>m.vt>0||m.custo>0);
  const ctx=document.getElementById('chartEvol').getContext('2d');
  if(charts.evol)charts.evol.destroy();
  // [BUG-P3 FIX] Estado vazio — sem lançamentos ainda
  if(evol.length===0){
    ctx.canvas.style.display='none';
    const parent=ctx.canvas.parentElement;
    if(!parent.querySelector('.evol-empty')){
      const emp=document.createElement('div');
      emp.className='evol-empty';
      emp.style.cssText='display:flex;align-items:center;justify-content:center;height:100%;color:var(--color-text-secondary);font-size:12px;text-align:center;padding:1rem';
      emp.textContent='Nenhum dado de evolução ainda. Adicione lançamentos com datas para ver o gráfico.';
      parent.appendChild(emp);
    }
    return;
  }
  ctx.canvas.style.display='';
  const emp=ctx.canvas.parentElement.querySelector('.evol-empty');
  if(emp)emp.remove();
  // Barras mensais empilhadas: base = aportes acumulados (azul); resultado por cima:
  // verde (lucro, acima dos aportes) ou vermelho (prejuízo, descendo do topo dos aportes).
  charts.evol=new Chart(ctx,{
    type:'bar',
    data:{
      labels:evol.map(m=>m.label),
      datasets:[
        {label:'Aportes',data:evol.map(m=>m.custo),backgroundColor:'#17C3B2',stack:'p',maxBarThickness:30},
        {label:'Lucro',data:evol.map(m=>Math.max(0,m.vt-m.custo)),backgroundColor:'#FFCC00',stack:'p',maxBarThickness:30,borderRadius:3},
        {label:'Prejuízo',data:evol.map(m=>-Math.max(0,m.custo-m.vt)),backgroundColor:'#E24B4A',stack:'p',maxBarThickness:30,borderRadius:3}
      ]
    },
    options:{responsive:true,maintainAspectRatio:false,
      interaction:{mode:'index',intersect:false},
      plugins:{
        legend:{display:true,position:'bottom',labels:{boxWidth:10,boxHeight:10,usePointStyle:true,font:{size:10},color:'#888'}},
        tooltip:{filter:i=>i.datasetIndex===0,callbacks:{
          title:items=>items[0].label,
          label:item=>{const m=evol[item.dataIndex];const res=m.vt-m.custo;return [' Patrimônio: '+fmtR(m.vt),' Aportes: '+fmtR(m.custo),(res>=0?' Lucro: ':' Prejuízo: ')+fmtR(Math.abs(res))];}
        }}
      },
      scales:{
        x:{stacked:true,grid:{display:false},ticks:{color:'#888',font:{size:10}}},
        y:{stacked:true,beginAtZero:true,grid:{color:'rgba(128,128,128,0.08)'},ticks:{color:'#888',font:{size:10},callback:v=>'R$'+Math.round(v/1000)+'k'}}
      }
    }
  });
}

// Cor por ativo = um tom da cor da sua classe (mesmo tema quente, sem arco-íris)
function _hexToHsl(hex){
  let h=String(hex).replace('#',''); if(h.length===3)h=h.split('').map(x=>x+x).join('');
  const r=parseInt(h.slice(0,2),16)/255,g=parseInt(h.slice(2,4),16)/255,b=parseInt(h.slice(4,6),16)/255;
  const mx=Math.max(r,g,b),mn=Math.min(r,g,b); let hh=0,s=0,l=(mx+mn)/2;
  if(mx!==mn){const d=mx-mn; s=l>0.5?d/(2-mx-mn):d/(mx+mn);
    if(mx===r)hh=(g-b)/d+(g<b?6:0); else if(mx===g)hh=(b-r)/d+2; else hh=(r-g)/d+4; hh/=6;}
  return {h:hh*360,s:s*100,l:l*100};
}
// i = posição do ativo dentro da classe → alterna mais claro/mais escuro
function _tomDaClasse(hex,i){
  const c=_hexToHsl(hex);
  const passos=[0,14,-12,26,-22,38,-32,8,-6];
  const dl=passos[i%passos.length]+Math.floor(i/passos.length)*5;
  const l=Math.max(24,Math.min(80,c.l+dl));
  return `hsl(${c.h.toFixed(0)},${c.s.toFixed(0)}%,${l.toFixed(0)}%)`;
}

function renderPizza(mode='classe'){
  const c=calcAtivos();
  const total=c.reduce((s,a)=>s+a.vt,0);
  let labels,vals,colors;
  if(mode==='ativo'){
    labels=c.map(a=>typeof _rotuloAtivoTexto==='function'?_rotuloAtivoTexto(a):a.ticker);
    vals=c.map(a=>parseFloat(a.vt.toFixed(2)));
    const nNaClasse={};
    colors=c.map(a=>{
      const base=CLASS_COLORS[a.classe]||'#B5341F';
      const i=(nNaClasse[a.classe]=(nNaClasse[a.classe]||0)+1)-1;
      return _tomDaClasse(base,i);
    });
  } else {
    const bc=byClasse(c);
    labels=Object.keys(bc).map(k=>CLASS_LABEL[k]||k);
    vals=Object.values(bc).map(v=>parseFloat(v.toFixed(2)));
    colors=Object.keys(bc).map(k=>CLASS_COLORS[k]||'#888');
  }
  if(charts.pizza)charts.pizza.destroy();
  charts.pizza=new Chart(document.getElementById('chartPizza').getContext('2d'),{
    type:'doughnut',
    data:{labels,datasets:[{data:vals,backgroundColor:colors,borderWidth:0,hoverOffset:3}]},
    options:{responsive:true,maintainAspectRatio:false,cutout:'68%',plugins:{legend:{display:false},tooltip:{callbacks:{label:c=>' '+fmtR(c.raw)+' ('+((c.raw/total)*100).toFixed(1)+'%)'}}}}
  });
  const marcador=(i)=>{
    if(mode!=='ativo') return `<span style="width:9px;height:9px;border-radius:50%;background:${colors[i]};flex-shrink:0"></span>`;
    const a=c[i];
    const semLogo=(a.classe==='RF'||a.classe==='TD'||a.classe==='FUNDO'||a.classe==='OUTRO');
    if(semLogo) return `<span style="width:13px;height:13px;border-radius:50%;background:${colors[i]};flex-shrink:0;display:inline-block"></span>`;
    const tk=a.classe==='BDR'?a.ticker.replace(/\d+$/,''):a.ticker;
    return `<span style="display:inline-flex;border-radius:50%;flex-shrink:0;box-shadow:0 0 0 1.5px ${colors[i]}">${typeof logoHtml==='function'?logoHtml(tk,15):''}</span>`;
  };
  document.getElementById('legendPizza').innerHTML=labels.map((l,i)=>`
    <div style="display:flex;align-items:center;justify-content:space-between;gap:8px">
      <span style="display:flex;align-items:center;gap:6px;font-size:11px;color:var(--color-text-secondary)">
        ${marcador(i)}${l}
      </span>
      <span style="font-size:11px;font-weight:500;color:var(--color-text-primary)">${total?((vals[i]/total)*100).toFixed(1):0}%</span>
    </div>
  `).join('');
}

function renderGrupos(){
  const c=calcAtivos();
  const total=c.reduce((s,a)=>s+a.vt,0);
  const totalAtivos=c.length;
  document.getElementById('total-count').textContent='('+totalAtivos+')';
  const idealMap={}; metas.forEach(m=>idealMap[m.classe]=m.ideal);
  const sug=calcSugestaoAporte(c,total,0); // aporte=0 aqui: só precisamos de % alvo e Comprar?. O valor do aporte vive na aba Aporte.
  const grupos={};
  c.forEach(a=>{if(!grupos[a.classe])grupos[a.classe]=[];grupos[a.classe].push(a)});
  let html='';
  Object.entries(grupos).forEach(([cls,items])=>{
    const gVt=items.reduce((s,a)=>s+a.vt,0);
    const gCusto=items.reduce((s,a)=>s+a.custo,0);
    const gVar=gCusto>0?((gVt-gCusto)/gCusto)*100:0;
    // Bug #7 fix: rentabilidade inclui proventos (não é igual à variação de capital)
    const gProv=items.reduce((s,a)=>s+a.proventos,0);
    const gRent=gCusto>0?((gVt-gCusto+gProv)/gCusto)*100:0;
    const pctCart=total>0?((gVt/total)*100):0;
    const idealCls=idealMap[cls]||0;
    const diffCls=pctCart-idealCls;
    const corCls=idealCls<=0?'var(--color-text-primary)':(diffCls>2?'#E24B4A':diffCls<-2?'#BA7517':'#1D9E75');
    html+=`<div class="grupo">
      <div class="grupo-header" onclick="toggleGrupo('g-${cls}',this)">
        <div class="grupo-icon" style="background:${CLASS_COLORS[cls]}22;color:${CLASS_COLORS[cls]}">${(CLASS_LABEL[cls]||cls).slice(0,2)}</div>
        <span class="grupo-name">${CLASS_LABEL[cls]||cls}</span>
        <div class="grupo-stats">
          <div class="grupo-stat"><div class="gs-label">Ativos</div><div class="gs-value">${items.length}</div></div>
          <div class="grupo-stat"><div class="gs-label">Valor total</div><div class="gs-value">${fmtR(gVt)}</div></div>
          <div class="grupo-stat"><div class="gs-label">Variação</div><div class="gs-value ${gVar>=0?'positive':'negative'}">${fmtP(gVar)}</div></div>
          <div class="grupo-stat"><div class="gs-label">Rentabilidade</div><div class="gs-value ${gRent>=0?'positive':'negative'}">${fmtP(gRent)}</div></div>
          <div class="grupo-stat"><div class="gs-label">% carteira / ideal</div><div class="gs-value" style="color:${corCls}">${pctCart.toFixed(1)}% / ${idealCls}%</div></div>
        </div>
        <i class="ti ti-chevron-down chevron open" aria-hidden="true"></i>
      </div>
      <div id="g-${cls}">
        <div class="tbl-wrap">
        <table class="tbl">
          <thead><tr><th>Ativo</th><th class="r">Quant.</th><th class="r">Preço Médio</th><th class="r">Preço Atual</th><th class="r">Variação</th><th class="r">Rentabilidade</th><th class="r">Saldo</th><th class="r">Nota</th><th class="r">% Carteira</th><th class="r">% Ideal</th><th class="r">Comprar?</th><th></th></tr></thead>
          <tbody>
            ${items.map(a=>{
              const alvo=sug.alvoPct[a.ticker]||0;
              const comp=sug.comprar[a.ticker];
              return `<tr>
              <td><strong title="${a.ticker}">${typeof rotuloAtivo==='function'?rotuloAtivo(a):a.ticker}</strong></td>
              <td class="r">${a.qtd.toLocaleString('pt-BR')}</td>
              <td class="r">${fmtR(a.pm)}</td>
              <td class="r">${fmtR(a.cotacao)}</td>
              <td class="r"><span class="pill ${a.res>=0?'pill-up':'pill-dn'}">${a.res>=0?'▲':'▼'} ${fmt(Math.abs(a.resPct))}%</span></td>
              <td class="r ${a.rentTotal>=0?'positive':'negative'}">${fmtP(a.rentTotal)}</td>
              <td class="r">${fmtR(a.vt)}</td>
              <td class="r"><input class="cell-edit" type="number" min="1" max="10" value="${a.nota||1}" title="Nota (1–10)" onchange="setMetaAtivo('${a.ticker}','nota',this.value)"></td>
              <td class="r">${total?((a.vt/total)*100).toFixed(1):0}%</td>
              <td class="r" title="% alvo automático: ideal da classe × peso da nota">${alvo>0?alvo.toFixed(1)+'%':'-'}</td>
              <td class="r"><span class="pill ${comp==='Sim'?'pill-up':'pill-dn'}" title="Automático: abaixo do % alvo = Sim">${comp==='Sim'?'✓ Sim':'✕ Não'}</span></td>
              <td><button class="btn btn-sm" onclick="removeAtivo('${a.ticker}')"><i class="ti ti-trash" aria-hidden="true"></i></button></td>
            </tr>`;}).join('')}
          </tbody>
        </table>
        </div>
      </div>
    </div>`;
  });
  document.getElementById('grupos-ativos').innerHTML=html||'<div class="empty">Nenhum ativo cadastrado. Clique em "+ Adicionar Lançamento".</div>';
}

/* ---- Termômetro da carteira (0–100), destaques do mês e comparação com CDI ---- */
function _cdiMensal(){
  const anual=parseFloat(BCB?.cdi?.anual)||0;
  return anual>0?Math.pow(1+anual/100,1/12)-1:0;
}
// Simula quanto os mesmos aportes renderiam na renda fixa (CDI), mês a mês.
function calcSaldoCDI(nMeses=120){
  const evol=calcEvolucaoPatrimonio(nMeses).filter(m=>m.vt>0||m.custo>0);
  if(!evol.length)return null;
  const r=_cdiMensal();
  let saldo=0, custoAnt=0;
  evol.forEach(m=>{
    const aporteMes=Math.max(0,m.custo-custoAnt); // entrada de dinheiro novo no mês
    saldo=saldo*(1+r)+aporteMes;
    custoAnt=m.custo;
  });
  return {saldoCDI:saldo, custo:custoAnt};
}
// Variação do último mês de cada ativo (usa preços históricos do site).
function destaquesDoMes(){
  const c=calcAtivos();
  const movimentos=[];
  c.forEach(a=>{
    const hist=HISTORICO_CACHE[a.ticker];
    if(!hist)return;
    const meses=Object.keys(hist).sort();
    if(meses.length<2)return;
    const ult=hist[meses[meses.length-1]], penult=hist[meses[meses.length-2]];
    if(!ult||!penult)return;
    movimentos.push({ticker:a.ticker, classe:a.classe, nome:(typeof _rotuloAtivoTexto==='function'?_rotuloAtivoTexto(a):a.ticker), varPct:(ult/penult-1)*100});
  });
  if(!movimentos.length)return null;
  movimentos.sort((x,y)=>y.varPct-x.varPct);
  return {melhor:movimentos[0], pior:movimentos[movimentos.length-1]};
}
function calcTermometro(){
  const c=calcAtivos();
  const t=getTotals();
  const total=c.reduce((s,a)=>s+a.vt,0);
  if(!c.length||total<=0)return null;
  // 1) Diversificação (0–40): nº de classes + menor concentração no maior ativo
  const nClasses=new Set(c.map(a=>a.classe)).size;
  const maxPct=Math.max(...c.map(a=>a.vt/total*100));
  const scClasses=Math.min(nClasses,5)/5*20;
  const scConc=maxPct<=20?20:Math.max(0,20-(maxPct-20));
  // 2) Lucro (0–30): rentabilidade total com proventos
  const scLucro=Math.max(0,Math.min(30,15+t.rentTotal/2));
  // 3) Renda (0–30): dividend yield médio
  const scRenda=Math.max(0,Math.min(30,t.dyMed*4));
  const nota=Math.round(scClasses+scConc+scLucro+scRenda);
  let txt,cor;
  if(nota<40){txt='Precisa de atenção';cor='#E24B4A';}
  else if(nota<60){txt='Razoável';cor='#BA7517';}
  else if(nota<80){txt='Boa';cor='#2E86C1';}
  else{txt='Excelente';cor='#1D9E75';}
  return {nota,txt,cor,nClasses,maxPct};
}

  const el=document.getElementById('resumo-extra');
  if(!el)return;
  const term=calcTermometro();
  if(!term){ el.innerHTML=''; return; }
  const dest=destaquesDoMes();
  const t=getTotals();
  const cdi=calcSaldoCDI();
  // Card termômetro
  const cardTerm=`<div class="card">
    <div class="card-title"><i class="ti ti-temperature" aria-hidden="true" style="color:${term.cor}"></i>Termômetro da carteira</div>
    <div style="display:flex;align-items:center;gap:14px">
      <div style="font-size:30px;font-weight:800;color:${term.cor};line-height:1">${term.nota}<span style="font-size:14px;color:var(--color-text-secondary);font-weight:600">/100</span></div>
      <div style="flex:1">
        <div style="font-size:13px;font-weight:600;color:${term.cor};margin-bottom:6px">${term.txt}</div>
        <div class="progress-bar"><div class="progress-fill" style="width:${term.nota}%;background:${term.cor}"></div></div>
        <div style="font-size:11px;color:var(--color-text-secondary);margin-top:6px">${term.nClasses} classes · maior ativo ${fmt(term.maxPct)}% · DY ${fmt(t.dyMed)}%</div>
      </div>
    </div>
    <div style="font-size:10px;color:var(--color-text-secondary);margin-top:8px">Nota simples juntando diversificação, lucro e dividendos. Serve de guia, não é recomendação.</div>
  </div>`;
  // Card destaques do mês
  const cardDest=dest?`<div class="card">
    <div class="card-title"><i class="ti ti-flame" aria-hidden="true" style="color:#FF8C00"></i>Destaques do mês</div>
    <div style="display:flex;flex-direction:column;gap:12px">
      <div style="display:flex;justify-content:space-between;align-items:center">
        <span style="font-size:12px;color:var(--color-text-secondary)">▲ Maior alta</span>
        <span style="display:inline-flex;align-items:center;gap:6px">${logoAtivo(dest.melhor,18)}<strong>${dest.melhor.nome}</strong> <span class="positive" style="font-weight:600">${fmtP(dest.melhor.varPct)}</span></span>
      </div>
      <div style="display:flex;justify-content:space-between;align-items:center">
        <span style="font-size:12px;color:var(--color-text-secondary)">▼ Maior baixa</span>
        <span style="display:inline-flex;align-items:center;gap:6px">${logoAtivo(dest.pior,18)}<strong>${dest.pior.nome}</strong> <span class="negative" style="font-weight:600">${fmtP(dest.pior.varPct)}</span></span>
      </div>
    </div>
    <div style="font-size:10px;color:var(--color-text-secondary);margin-top:10px">Variação do último mês com preço de fechamento.</div>
  </div>`:'';
  // Card carteira vs CDI
  let cardCDI='';
  if(cdi){
    const diff=t.total-cdi.saldoCDI;
    const ganhou=diff>=0;
    cardCDI=`<div class="card">
      <div class="card-title"><i class="ti ti-scale" aria-hidden="true" style="color:#534AB7"></i>Sua carteira vs Renda Fixa (CDI)</div>
      <div style="display:flex;flex-direction:column;gap:10px">
        <div style="display:flex;justify-content:space-between"><span style="font-size:12px;color:var(--color-text-secondary)">Você tem hoje</span><strong>${fmtR(t.total)}</strong></div>
        <div style="display:flex;justify-content:space-between"><span style="font-size:12px;color:var(--color-text-secondary)">Se fosse só CDI</span><strong>${fmtR(cdi.saldoCDI)}</strong></div>
        <div style="display:flex;justify-content:space-between;border-top:1px solid var(--color-border-secondary);padding-top:8px">
          <span style="font-size:12px;color:var(--color-text-secondary)">${ganhou?'Você está ganhando do CDI':'Você está perdendo pro CDI'}</span>
          <strong class="${ganhou?'positive':'negative'}">${ganhou?'+':''}${fmtR(diff)}</strong></div>
      </div>
      <div style="font-size:10px;color:var(--color-text-secondary);margin-top:8px">Simulação: seus mesmos aportes rendendo ${fmt(parseFloat(BCB?.cdi?.anual)||0)}% a.a. (CDI atual).</div>
    </div>`;
  }
  el.style.display='grid';
  el.style.gridTemplateColumns='repeat(auto-fit,minmax(240px,1fr))';
  el.style.gap='14px';
  el.innerHTML=cardTerm+cardDest+cardCDI;
}

function renderAll(){
  renderMetricsResumo();
  renderResumoExtra();
  renderEvolucao();
  renderPizza();
  renderGrupos();
}

mvGate(initConsolidador);
</script>
<script src="../nav.js"></script>
