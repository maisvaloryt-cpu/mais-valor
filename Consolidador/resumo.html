<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Consolidador de Carteira — Resumo</title>
<link rel="stylesheet" href="common.css">
<link rel="icon" type="image/png" href="../favicon.png">
<link rel="stylesheet" href="../style.css">
<link rel="stylesheet" href="../mobile.css">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@2.47.0/dist/tabler-icons.min.css">
<script>window.NAV_BASE_PATH = "../"; window.NAV_SLIM = true;</script>
</head>
<body>
<div id="nav-placeholder"></div>
<h2 class="sr-only">Consolidador de Carteira — Resumo geral da carteira</h2>

<div class="app">
  <div class="header">
    <h1><i class="ti ti-chart-pie" aria-hidden="true" style="color:var(--blue)"></i>Consolidador de Carteira</h1>
    <div class="header-actions" id="header-actions"></div>
  </div>

  <div class="tabs" id="tabs"></div>

  <div id="tab-resumo">
    <div class="metrics" id="metrics-resumo"></div>
    <div class="charts-row">
      <div class="card">
        <div class="card-title">Evolução Real do Patrimônio
          <select onchange="renderEvolucao(+this.value)" style="font-size:11px;padding:3px 6px;border:0.5px solid var(--color-border-secondary);border-radius:6px;background:var(--color-background-primary);color:var(--color-text-secondary)">
            <option value="12">12 meses</option><option value="24" selected>24 meses</option><option value="60">5 anos</option>
          </select>
        </div>
        <div style="position:relative;height:190px"><canvas id="chartEvol" role="img" aria-label="Evolução do patrimônio mensal"></canvas></div>
      </div>
      <div class="card">
        <div class="card-title">Ativos na Carteira
          <select onchange="renderPizza(this.value)" style="font-size:11px;padding:3px 6px;border:0.5px solid var(--color-border-secondary);border-radius:6px;background:var(--color-background-primary);color:var(--color-text-secondary)">
            <option value="classe">Todos os tipos</option><option value="ativo">Por ativo</option>
          </select>
        </div>
        <div style="display:flex;align-items:center;gap:12px">
          <div style="position:relative;width:140px;height:140px;flex-shrink:0"><canvas id="chartPizza" role="img" aria-label="Alocação por tipo de ativo"></canvas></div>
          <div id="legendPizza" style="flex:1;display:flex;flex-direction:column;gap:5px"></div>
        </div>
      </div>
    </div>
    <div class="card" id="aporte-card" style="margin-bottom:14px">
      <div class="card-title"><i class="ti ti-cash" aria-hidden="true" style="color:var(--blue)"></i>Aporte — onde investir agora</div>
      <div style="display:flex;align-items:center;gap:10px;flex-wrap:wrap">
        <label for="aporte-input" style="font-size:12px;color:var(--color-text-secondary)">Quanto vou aportar:</label>
        <span style="display:flex;align-items:center;gap:4px"><span style="font-size:13px;color:var(--color-text-secondary)">R$</span>
          <input id="aporte-input" type="number" min="0" step="50" placeholder="0,00" class="cell-edit" style="width:130px;text-align:right" oninput="setAporte(this.value)"></span>
        <span id="aporte-resumo" style="font-size:12px;color:var(--color-text-secondary)"></span>
      </div>
    </div>
    <div class="section-title"><i class="ti ti-stack" aria-hidden="true"></i>Meus Ativos <span id="total-count" style="font-size:12px;color:var(--color-text-secondary);font-weight:400"></span></div>
    <div id="grupos-ativos"></div>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
<script src="common.js"></script>
<script src="firebase.js"></script>
<script>
renderHeaderAndNav('resumo');
injectModals();

function renderMetricsResumo(){
  const t=getTotals();
  const c=calcAtivos(); // Bug #6 fix: contagem real de posições, não de lançamentos
  document.getElementById('metrics-resumo').innerHTML=`
    <div class="mcard">
      <div class="mcard-label"><i class="ti ti-wallet" aria-hidden="true"></i> Patrimônio total</div>
      <div class="mcard-value">${fmtR(t.total)}</div>
      <div class="mcard-sub">Valor investido: <strong>${fmtR(t.custo)}</strong></div>
    </div>
    <div class="mcard">
      <div class="mcard-label"><i class="ti ti-trending-up" aria-hidden="true"></i> Lucro total</div>
      <div class="mcard-value ${t.lucroTotal>=0?'positive':'negative'}">${t.lucroTotal>=0?'+':''}${fmtR(t.lucroTotal)}</div>
      <div class="mcard-sub">Capital: <span class="${t.res>=0?'positive':'negative'}">${t.res>=0?'+':''}${fmtR(t.res)}</span> + Prov: <span class="positive">${fmtR(t.proventosTotal)}</span></div>
    </div>
    <div class="mcard">
      <div class="mcard-label"><i class="ti ti-coin" aria-hidden="true"></i> Proventos (12M)</div>
      <div class="mcard-value positive">${fmtR(t.provAno)}</div>
      <div class="mcard-sub">DY médio: <strong class="positive">${fmt(t.dyMed)}%</strong></div>
    </div>
    <div class="mcard">
      <div class="mcard-label"><i class="ti ti-chart-bar" aria-hidden="true"></i> Variação (capital)</div>
      <div class="mcard-value ${t.resPct>=0?'positive':'negative'}">${fmtP(t.resPct)}</div>
      <div class="mcard-sub">${fmtR(Math.abs(t.res))} ${t.res>=0?'acima':'abaixo'} do custo</div>
    </div>
    <div class="mcard">
      <div class="mcard-label"><i class="ti ti-percent" aria-hidden="true"></i> Rentabilidade total</div>
      <div class="mcard-value ${t.rentTotal>=0?'positive':'negative'}">${fmtP(t.rentTotal)}</div>
      <div class="mcard-sub">${c.length} ativos em ${new Set(c.map(a=>a.classe)).size} classes</div>
    </div>
  `;
}

function renderEvolucao(nMeses=24){
  const evol=calcEvolucaoPatrimonio(nMeses).filter(m=>m.vt>0||m.custo>0);
  const ctx=document.getElementById('chartEvol').getContext('2d');
  if(charts.evol)charts.evol.destroy();
  // [BUG-P3 FIX] Estado vazio — sem lançamentos ainda
  if(evol.length===0){
    ctx.canvas.style.display='none';
    const parent=ctx.canvas.parentElement;
    if(!parent.querySelector('.evol-empty')){
      const emp=document.createElement('div');
      emp.className='evol-empty';
      emp.style.cssText='display:flex;align-items:center;justify-content:center;height:100%;color:var(--color-text-secondary);font-size:12px;text-align:center;padding:1rem';
      emp.textContent='Nenhum dado de evolução ainda. Adicione lançamentos com datas para ver o gráfico.';
      parent.appendChild(emp);
    }
    return;
  }
  ctx.canvas.style.display='';
  const emp=ctx.canvas.parentElement.querySelector('.evol-empty');
  if(emp)emp.remove();
  charts.evol=new Chart(ctx,{
    type:'line',
    data:{
      labels:evol.map(m=>m.label),
      datasets:[
        {label:'Patrimônio',data:evol.map(m=>m.vt),borderColor:'#1D9E75',backgroundColor:'rgba(29,158,117,0.08)',fill:true,tension:0.3,pointRadius:2,pointBackgroundColor:'#1D9E75'},
        {label:'Custo',data:evol.map(m=>m.custo),borderColor:'#888',borderDash:[4,4],backgroundColor:'transparent',tension:0.3,pointRadius:0}
      ]
    },
    options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false},tooltip:{callbacks:{label:c=>' '+fmtR(c.raw)}}},scales:{x:{grid:{display:false},ticks:{color:'#888',font:{size:10}}},y:{grid:{color:'rgba(128,128,128,0.08)'},ticks:{color:'#888',font:{size:10},callback:v=>'R$'+Math.round(v/1000)+'k'}}}}
  });
}

// Bug #16 fix: gera N cores distintas usando ângulo dourado em HSL (funciona com qualquer nº de ativos)
function _gerarCores(n){
  if(n<=10){
    const paleta=['#185FA5','#3B6D11','#BA7517','#534AB7','#0F6E56','#993C1D','#1D9E75','#D85A30','#9FE1CB','#378ADD'];
    return paleta.slice(0,n);
  }
  const cores=[];
  const goldenAngle=137.508;
  for(let i=0;i<n;i++){
    const h=(i*goldenAngle)%360;
    const s=55+((i*7)%20); // varia entre 55–75%
    const l=38+((i*11)%20); // varia entre 38–58%
    cores.push(`hsl(${h.toFixed(0)},${s}%,${l}%)`);
  }
  return cores;
}

function renderPizza(mode='classe'){
  const c=calcAtivos();
  const total=c.reduce((s,a)=>s+a.vt,0);
  let labels,vals,colors;
  if(mode==='ativo'){
    labels=c.map(a=>a.ticker);
    vals=c.map(a=>parseFloat(a.vt.toFixed(2)));
    colors=_gerarCores(labels.length);
  } else {
    const bc=byClasse(c);
    labels=Object.keys(bc).map(k=>CLASS_LABEL[k]||k);
    vals=Object.values(bc).map(v=>parseFloat(v.toFixed(2)));
    colors=Object.keys(bc).map(k=>CLASS_COLORS[k]||'#888');
  }
  if(charts.pizza)charts.pizza.destroy();
  charts.pizza=new Chart(document.getElementById('chartPizza').getContext('2d'),{
    type:'doughnut',
    data:{labels,datasets:[{data:vals,backgroundColor:colors,borderWidth:0,hoverOffset:3}]},
    options:{responsive:true,maintainAspectRatio:false,cutout:'68%',plugins:{legend:{display:false},tooltip:{callbacks:{label:c=>' '+fmtR(c.raw)+' ('+((c.raw/total)*100).toFixed(1)+'%)'}}}}
  });
  document.getElementById('legendPizza').innerHTML=labels.map((l,i)=>`
    <div style="display:flex;align-items:center;justify-content:space-between;gap:8px">
      <span style="display:flex;align-items:center;gap:5px;font-size:11px;color:var(--color-text-secondary)">
        <span style="width:9px;height:9px;border-radius:50%;background:${colors[i]};flex-shrink:0"></span>${l}
      </span>
      <span style="font-size:11px;font-weight:500;color:var(--color-text-primary)">${total?((vals[i]/total)*100).toFixed(1):0}%</span>
    </div>
  `).join('');
}

let aporteAtual=0;
function setAporte(v){ aporteAtual=Math.max(0,parseFloat(v)||0); renderGrupos(); }

/* Sugestão de aporte em 2 níveis: a classe puxa pro % ideal (aba Metas), depois a nota
   (peso suave = raiz da nota) divide dentro da classe.
   - alvoPct[ticker]  : % alvo do ativo na carteira inteira (ideal da classe × peso da nota)
   - comprar[ticker]  : 'Sim' se o ativo está abaixo do alvo, senão 'Não'
   - aporteAtivo[tic] : R$ sugerido do aporte para o ativo                                  */
function calcSugestaoAporte(c,totalAtual,aporte){
  const idealMap={}; metas.forEach(m=>idealMap[m.classe]=m.ideal);
  const pesoNota=n=>n>0?Math.sqrt(n):0;
  const classes=[...new Set(c.map(a=>a.classe))];
  const somaPesoClasse={}, qtdClasse={};
  c.forEach(a=>{somaPesoClasse[a.classe]=(somaPesoClasse[a.classe]||0)+pesoNota(a.nota);qtdClasse[a.classe]=(qtdClasse[a.classe]||0)+1;});
  const shareNota=a=>{const sp=somaPesoClasse[a.classe]||0;return sp>0?pesoNota(a.nota)/sp:(qtdClasse[a.classe]?1/qtdClasse[a.classe]:0);};
  // alvo % de cada ativo na carteira + decisão Comprar?
  const alvoPct={}, comprar={};
  c.forEach(a=>{
    alvoPct[a.ticker]=(idealMap[a.classe]||0)*shareNota(a);
    const atualPct=totalAtual>0?(a.vt/totalAtual)*100:0;
    comprar[a.ticker]=atualPct<alvoPct[a.ticker]-0.05?'Sim':'Não';
  });
  // distribuição do aporte
  const aporteAtivo={}; c.forEach(a=>aporteAtivo[a.ticker]=0);
  if(aporte>0){
    const novoTotal=totalAtual+aporte;
    const bc=byClasse(c);
    const deficit={}; let somaDef=0;
    classes.forEach(cl=>{const d=Math.max(0,novoTotal*((idealMap[cl]||0)/100)-(bc[cl]||0));deficit[cl]=d;somaDef+=d;});
    const somaIdeal=classes.reduce((s,cl)=>s+(idealMap[cl]||0),0);
    const aporteClasse={};
    classes.forEach(cl=>{aporteClasse[cl]=somaDef>0?aporte*deficit[cl]/somaDef:(somaIdeal>0?aporte*((idealMap[cl]||0)/somaIdeal):0);});
    c.forEach(a=>{aporteAtivo[a.ticker]=(aporteClasse[a.classe]||0)*shareNota(a);});
  }
  return {alvoPct,comprar,aporteAtivo,temAporte:aporte>0};
}

function renderGrupos(){
  const c=calcAtivos();
  const total=c.reduce((s,a)=>s+a.vt,0);
  const totalAtivos=c.length;
  document.getElementById('total-count').textContent='('+totalAtivos+')';
  const idealMap={}; metas.forEach(m=>idealMap[m.classe]=m.ideal);
  const sug=calcSugestaoAporte(c,total,aporteAtual);
  const resumoEl=document.getElementById('aporte-resumo');
  if(resumoEl){
    const nRec=c.filter(a=>sug.aporteAtivo[a.ticker]>0.005).length;
    resumoEl.textContent=sug.temAporte?`Sugerido em ${nRec} ativo(s) — divisão por classe + nota (veja a coluna "Aporte").`:'Digite um valor para ver onde investir.';
  }
  const grupos={};
  c.forEach(a=>{if(!grupos[a.classe])grupos[a.classe]=[];grupos[a.classe].push(a)});
  let html='';
  Object.entries(grupos).forEach(([cls,items])=>{
    const gVt=items.reduce((s,a)=>s+a.vt,0);
    const gCusto=items.reduce((s,a)=>s+a.custo,0);
    const gVar=gCusto>0?((gVt-gCusto)/gCusto)*100:0;
    // Bug #7 fix: rentabilidade inclui proventos (não é igual à variação de capital)
    const gProv=items.reduce((s,a)=>s+a.proventos,0);
    const gRent=gCusto>0?((gVt-gCusto+gProv)/gCusto)*100:0;
    const pctCart=total>0?((gVt/total)*100):0;
    const idealCls=idealMap[cls]||0;
    const diffCls=pctCart-idealCls;
    const corCls=idealCls<=0?'var(--color-text-primary)':(diffCls>2?'#E24B4A':diffCls<-2?'#BA7517':'#1D9E75');
    html+=`<div class="grupo">
      <div class="grupo-header" onclick="toggleGrupo('g-${cls}',this)">
        <div class="grupo-icon" style="background:${CLASS_COLORS[cls]}22;color:${CLASS_COLORS[cls]}">${(CLASS_LABEL[cls]||cls).slice(0,2)}</div>
        <span class="grupo-name">${CLASS_LABEL[cls]||cls}</span>
        <div class="grupo-stats">
          <div class="grupo-stat"><div class="gs-label">Ativos</div><div class="gs-value">${items.length}</div></div>
          <div class="grupo-stat"><div class="gs-label">Valor total</div><div class="gs-value">${fmtR(gVt)}</div></div>
          <div class="grupo-stat"><div class="gs-label">Variação</div><div class="gs-value ${gVar>=0?'positive':'negative'}">${fmtP(gVar)}</div></div>
          <div class="grupo-stat"><div class="gs-label">Rentabilidade</div><div class="gs-value ${gRent>=0?'positive':'negative'}">${fmtP(gRent)}</div></div>
          <div class="grupo-stat"><div class="gs-label">% carteira / ideal</div><div class="gs-value" style="color:${corCls}">${pctCart.toFixed(1)}% / ${idealCls}%</div></div>
        </div>
        <i class="ti ti-chevron-down chevron open" aria-hidden="true"></i>
      </div>
      <div id="g-${cls}">
        <div class="tbl-wrap">
        <table class="tbl">
          <thead><tr><th>Ativo</th><th class="r">Quant.</th><th class="r">Preço Médio</th><th class="r">Preço Atual</th><th class="r">Variação</th><th class="r">Rentabilidade</th><th class="r">Saldo</th><th class="r">Nota</th><th class="r">% Carteira</th><th class="r">% Ideal</th><th class="r">Comprar?</th><th class="r">Aporte</th><th></th></tr></thead>
          <tbody>
            ${items.map(a=>{
              const alvo=sug.alvoPct[a.ticker]||0;
              const comp=sug.comprar[a.ticker];
              const ap=sug.aporteAtivo[a.ticker]||0;
              return `<tr>
              <td><strong>${a.ticker}</strong></td>
              <td class="r">${a.qtd.toLocaleString('pt-BR')}</td>
              <td class="r">${fmtR(a.pm)}</td>
              <td class="r">${fmtR(a.cotacao)}</td>
              <td class="r"><span class="pill ${a.res>=0?'pill-up':'pill-dn'}">${a.res>=0?'▲':'▼'} ${fmt(Math.abs(a.resPct))}%</span></td>
              <td class="r ${a.rentTotal>=0?'positive':'negative'}">${fmtP(a.rentTotal)}</td>
              <td class="r">${fmtR(a.vt)}</td>
              <td class="r"><input class="cell-edit" type="number" min="0" max="10" value="${a.nota||''}" placeholder="-" title="Nota (0–10)" onchange="setMetaAtivo('${a.ticker}','nota',this.value)"></td>
              <td class="r">${total?((a.vt/total)*100).toFixed(1):0}%</td>
              <td class="r" title="% alvo automático: ideal da classe × peso da nota">${alvo>0?alvo.toFixed(1)+'%':'-'}</td>
              <td class="r"><span class="pill ${comp==='Sim'?'pill-up':'pill-dn'}" title="Automático: abaixo do % alvo = Sim">${comp==='Sim'?'✓ Sim':'✕ Não'}</span></td>
              <td class="r">${sug.temAporte&&ap>0.005?'<strong style="color:#1D9E75">'+fmtR(ap)+'</strong>':'-'}</td>
              <td><button class="btn btn-sm" onclick="removeAtivo('${a.ticker}')"><i class="ti ti-trash" aria-hidden="true"></i></button></td>
            </tr>`;}).join('')}
          </tbody>
        </table>
        </div>
      </div>
    </div>`;
  });
  document.getElementById('grupos-ativos').innerHTML=html||'<div class="empty">Nenhum ativo cadastrado. Clique em "+ Adicionar Lançamento".</div>';
}

function renderAll(){
  renderMetricsResumo();
  renderEvolucao();
  renderPizza();
  renderGrupos();
}

mvGate(initConsolidador);
</script>
<script src="../nav.js"></script>
</body>
</html>
