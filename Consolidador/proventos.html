<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Consolidador de Carteira — Proventos</title>
<link rel="stylesheet" href="common.css">
<link rel="icon" type="image/png" href="../favicon.png">
<link rel="stylesheet" href="../style.css">
<link rel="stylesheet" href="../mobile.css">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@2.47.0/dist/tabler-icons.min.css">
<script>window.NAV_BASE_PATH = "../"; window.NAV_SLIM = true;</script>
</head>
<body>
<div id="nav-placeholder"></div>
<h2 class="sr-only">Consolidador de Carteira — Proventos recebidos e estimados</h2>

<div class="app">
  <div class="header">
    <h1><i class="ti ti-chart-pie" aria-hidden="true" style="color:var(--blue)"></i>Consolidador de Carteira</h1>
    <div class="header-actions" id="header-actions"></div>
  </div>

  <div class="tabs" id="tabs"></div>

  <div id="tab-proventos">
    <div class="metrics" id="metrics-prov"></div>
    <div class="charts-row">
      <div class="card">
        <div class="card-title">Proventos Mensais (últimos 12M)</div>
        <div style="position:relative;height:190px"><canvas id="chartProvMes" role="img" aria-label="Proventos mensais"></canvas></div>
      </div>
      <div class="card">
        <div class="card-title">Proventos por Classe</div>
        <div style="position:relative;height:190px"><canvas id="chartProvClasse" role="img" aria-label="Proventos por classe"></canvas></div>
      </div>
    </div>
    <div class="card">
      <div class="card-title">Proventos Recebidos por Ativo</div>
      <div class="tbl-wrap">
      <table class="tbl">
        <thead><tr><th>Ticker</th><th>Classe</th><th class="r">Valor em Carteira</th><th class="r">DY Real</th><th class="r">Proventos Recebidos</th><th class="r">Desde</th></tr></thead>
        <tbody id="tbody-prov"></tbody>
      </table>
      </div>
    </div>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
<script src="common.js"></script>
<script src="firebase.js"></script>
<script>
renderHeaderAndNav('proventos');
injectModals();

function renderProventos(){
  const c=calcAtivos();
  const t=getTotals();

  // Métricas reais
  document.getElementById('metrics-prov').innerHTML=`
    <div class="mcard"><div class="mcard-label">Proventos recebidos (total)</div><div class="mcard-value positive">${fmtR(t.proventosTotal)}</div><div class="mcard-sub">Desde a data de compra de cada ativo</div></div>
    <div class="mcard"><div class="mcard-label">Proventos (últimos 12M)</div><div class="mcard-value positive">${fmtR(t.provAno)}</div><div class="mcard-sub">Média mensal: ${fmtR(t.provAno/12)}</div></div>
    <div class="mcard"><div class="mcard-label">DY Médio (12M)</div><div class="mcard-value positive">${fmt(t.dyMed)}%</div><div class="mcard-sub">Sobre patrimônio atual</div></div>
    <div class="mcard"><div class="mcard-label">Renda Passiva / Dia</div><div class="mcard-value positive">${fmtR(t.provAno/365)}</div><div class="mcard-sub">Baseado nos últimos 12 meses</div></div>
  `;

  // Gráfico mensal — dados reais
  const porMes=getDividendosPorMes();
  const labels12=porMes.slice(-12).map(m=>{
    const [y,mm]=m.ym.split('-');
    const nomes=['','Jan','Fev','Mar','Abr','Mai','Jun','Jul','Ago','Set','Out','Nov','Dez'];
    return nomes[parseInt(mm)]+'/'+y.slice(2);
  });
  const vals12=porMes.slice(-12).map(m=>parseFloat(m.total.toFixed(2)));
  if(charts.provMes)charts.provMes.destroy();
  charts.provMes=new Chart(document.getElementById('chartProvMes').getContext('2d'),{
    type:'bar',
    data:{labels:labels12,datasets:[{label:'Proventos recebidos',data:vals12,backgroundColor:'#1D9E75',borderRadius:3}]},
    options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false},tooltip:{callbacks:{label:c=>' '+fmtR(c.raw)}}},scales:{x:{grid:{display:false},ticks:{color:'#888',font:{size:10}}},y:{grid:{color:'rgba(128,128,128,0.08)'},ticks:{color:'#888',font:{size:10},callback:v=>'R$'+v.toLocaleString('pt-BR')}}}}
  });

  // Gráfico por classe — soma dos proventos reais
  const provPorClasse={};
  c.forEach(a=>{if(a.proventos>0){provPorClasse[a.classe]=(provPorClasse[a.classe]||0)+a.proventos;}});
  const clsKeys=Object.keys(provPorClasse);
  if(charts.provCls)charts.provCls.destroy();
  charts.provCls=new Chart(document.getElementById('chartProvClasse').getContext('2d'),{
    type:'doughnut',
    data:{labels:clsKeys.map(k=>CLASS_LABEL[k]||k),datasets:[{data:clsKeys.map(k=>parseFloat(provPorClasse[k].toFixed(2))),backgroundColor:clsKeys.map(k=>CLASS_COLORS[k]),borderWidth:0}]},
    options:{responsive:true,maintainAspectRatio:false,cutout:'60%',plugins:{legend:{display:true,position:'right',labels:{font:{size:11},color:'#888',boxWidth:10}}}}
  });

  // Tabela por ativo — dados reais
  const tbody=document.getElementById('tbody-prov');
  const comProv=c.filter(a=>a.vt>0||a.proventos>0).sort((a,b)=>b.proventos-a.proventos);
  tbody.innerHTML=comProv.map(a=>`
    <tr>
      <td><strong>${a.ticker}</strong></td>
      <td><span class="badge ${CLASS_BADGE[a.classe]||''}">${CLASS_LABEL[a.classe]||a.classe}</span></td>
      <td class="r">${fmtR(a.vt)}</td>
      <td class="r positive">${fmt(a.dy)}%</td>
      <td class="r positive">${fmtR(a.proventos)}</td>
      <td class="r">${a.data||'—'}</td>
    </tr>`).join('');
}

function renderAll(){
  renderProventos();
}

renderAll();
</script>
<script src="../nav.js"></script>
</body>
</html>
