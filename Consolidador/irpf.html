<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Consolidador de Carteira — IRPF</title>
<link rel="stylesheet" href="common.css">
<link rel="icon" type="image/png" href="../favicon.png">
<link rel="stylesheet" href="../style.css">
<link rel="stylesheet" href="../mobile.css">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@2.47.0/dist/tabler-icons.min.css">
<script>window.NAV_BASE_PATH = "../"; window.NAV_SLIM = true;</script>
</head>
<body>
<div id="nav-placeholder"></div>
<h2 class="sr-only">Consolidador de Carteira — Informações para declaração de IRPF</h2>

<div class="app">
  <div class="header">
    <h1><i class="ti ti-chart-pie" aria-hidden="true" style="color:var(--blue)"></i>Consolidador de Carteira</h1>
    <div class="header-actions" id="header-actions"></div>
  </div>

  <div class="tabs" id="tabs"></div>

  <div id="tab-irpf">
    <div style="display:flex;align-items:center;gap:8px;margin-bottom:1rem;flex-wrap:wrap">
      <div class="section-title" style="margin:0"><i class="ti ti-file-text" aria-hidden="true"></i>Informações para IRPF</div>
      <span class="tag-irpf" id="tag-ano-irpf">Ano-Calendário</span>
      <button class="btn btn-sm" style="margin-left:auto" onclick="exportarRelatorioIRPF()"><i class="ti ti-download" aria-hidden="true"></i> Exportar Relatório ↗</button>
    </div>
    <div class="metrics" id="metrics-irpf"></div>
    <div class="card">
      <div class="card-title" id="titulo-bens">Bens e Direitos</div>
      <div class="tbl-wrap">
      <table class="tbl">
        <thead><tr><th>Ticker</th><th>Classe</th><th>Código IRPF</th><th class="r">Custo de Aquisição</th><th class="r">Qtd</th><th class="r">Preço Médio</th></tr></thead>
        <tbody id="tbody-irpf"></tbody>
      </table>
      </div>
    </div>
    <div style="margin-top:1rem" class="card">
      <div class="card-title">Rendimentos Isentos (Proventos)</div>
      <div class="tbl-wrap">
      <table class="tbl">
        <thead><tr><th>Ticker</th><th>Classe</th><th class="r">Proventos Recebidos (Ano)</th><th>Tributação</th></tr></thead>
        <tbody id="tbody-irpf2"></tbody>
      </table>
      </div>
    </div>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
<script src="common.js"></script>
<script src="firebase.js"></script>
<script>
renderHeaderAndNav('irpf');
injectModals();

function renderIRPF(){
  // [BUG-C7 FIX] Posição em 31/12 do ano-calendário (não posição atual)
  const anoCalendario=new Date().getFullYear()-1;
  document.getElementById('tag-ano-irpf').textContent='Ano-Calendário '+anoCalendario;
  document.getElementById('titulo-bens').textContent='Bens e Direitos — Posição em 31/12/'+anoCalendario;
  const c=calcAtivos(anoCalendario+'-12-31');
  const custo=c.reduce((s,a)=>s+a.custo,0);
  // [BUG-F4 FIX] Proventos reais do ano-calendário (não all-time)
  const proventosAno=c.reduce((s,a)=>s+calcProventosAno(a.ticker,anoCalendario),0);
  const ganhoRealizado=getGanhosRealizados(anoCalendario);
  document.getElementById('metrics-irpf').innerHTML=`
    <div class="mcard"><div class="mcard-label">Total Bens e Direitos</div><div class="mcard-value">${fmtR(custo)}</div><div class="mcard-sub">Custo de aquisição em 31/12/${anoCalendario}</div></div>
    <div class="mcard"><div class="mcard-label">Rendimentos Recebidos em ${anoCalendario}</div><div class="mcard-value positive">${fmtR(proventosAno)}</div><div class="mcard-sub">Proventos recebidos no ano-calendário</div></div>
    <div class="mcard"><div class="mcard-label">Ganho de Capital Realizado</div><div class="mcard-value ${ganhoRealizado>=0?'positive':'negative'}">${ganhoRealizado>=0?'+':''}${fmtR(ganhoRealizado)}</div><div class="mcard-sub">Vendas efetivadas em ${anoCalendario}</div></div>
  `;
  // [BUG-F1 FIX] Grupo e Código IRPF corretos por classe
  document.getElementById('tbody-irpf').innerHTML=c.map(a=>`
    <tr><td><strong>${a.ticker}</strong></td><td><span class="badge ${CLASS_BADGE[a.classe]||''}">${CLASS_LABEL[a.classe]||a.classe}</span></td>
    <td>Grupo ${IRPF_GRUPO[a.classe]||'03'} / Cód. ${IRPF_CODIGO[a.classe]||'01'}</td>
    <td class="r">${fmtR(a.custo)}</td><td class="r">${a.qtd.toLocaleString('pt-BR')}</td><td class="r">${fmtR(a.pm)}</td></tr>
  `).join('');
  // [BUG-F2 FIX] Tributação correta por classe (ETF, Crypto, BDR, Exterior)
  document.getElementById('tbody-irpf2').innerHTML=c.map(a=>{
    const provAno=calcProventosAno(a.ticker,anoCalendario);
    let trib;
    if(a.classe==='FII') trib='<span style="color:#1D9E75;font-weight:500">Isento (Lei 11.033/04)</span>';
    else if(a.classe==='B3') trib='<span style="color:#888;font-weight:500">Div: Isento / JCP: 15%</span>';
    else if(a.classe==='ETF') trib='<span style="color:#BA7517;font-weight:500">15% RF / 15-22,5% RV</span>';
    else if(a.classe==='Crypto') trib='<span style="color:#BA7517;font-weight:500">Isento (vendas &lt; R$35k/mês)</span>';
    else if(a.classe==='BDR') trib='<span style="color:#BA7517;font-weight:500">15-22,5% sobre dividendos</span>';
    else if(a.classe==='Exterior') trib='<span style="color:#BA7517;font-weight:500">Tributável (Lei 14.754/23)</span>';
    else if(a.classe==='RF'||a.classe==='TD') trib='<span style="color:#BA7517;font-weight:500">15-22,5% sobre o rendimento (tabela regressiva)</span>';
    else if(a.classe==='ETFINT'||a.classe==='REIT') trib='<span style="color:#BA7517;font-weight:500">Tributável (Lei 14.754/23)</span>';
    else if(a.classe==='FUNDO') trib='<span style="color:#BA7517;font-weight:500">15-22,5% / come-cotas</span>';
    else trib='<span style="color:#BA7517;font-weight:500">Tributável</span>';
    return`<tr><td><strong>${a.ticker}</strong></td><td><span class="badge ${CLASS_BADGE[a.classe]||''}">${CLASS_LABEL[a.classe]||a.classe}</span></td>
    <td class="r positive">${fmtR(provAno)}</td><td>${trib}</td></tr>`;
  }).join('');
}

function renderAll(){
  renderIRPF();
}

mvGate(initConsolidador);
</script>
<script src="../nav.js"></script>
</body>
</html>
