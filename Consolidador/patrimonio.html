<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Consolidador de Carteira — Patrimônio</title>
<link rel="stylesheet" href="common.css">
<link rel="icon" type="image/png" href="../favicon.png">
<link rel="stylesheet" href="../style.css">
<link rel="stylesheet" href="../mobile.css">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@2.47.0/dist/tabler-icons.min.css">
<script>window.NAV_BASE_PATH = "../"; window.NAV_SLIM = true;</script>
</head>
<body>
<div id="nav-placeholder"></div>
<h2 class="sr-only">Consolidador de Carteira — Evolução do patrimônio</h2>

<div class="app">
  <div class="header">
    <h1><i class="ti ti-chart-pie" aria-hidden="true" style="color:var(--blue)"></i>Consolidador de Carteira</h1>
    <div class="header-actions" id="header-actions"></div>
  </div>

  <div class="tabs" id="tabs"></div>

  <div id="tab-patrimonio">
    <div class="metrics" id="metrics-patri"></div>
    <div class="card" style="margin-bottom:1.25rem">
      <div class="card-title">Evolução Histórica Acumulada</div>
      <div style="position:relative;height:220px"><canvas id="chartPatri" role="img" aria-label="Evolução histórica do patrimônio"></canvas></div>
    </div>
    <div class="analise-grid">
      <div class="card">
        <div class="card-title">Valor Aplicado vs. Ganho de Capital</div>
        <div style="position:relative;height:170px"><canvas id="chartVaGc" role="img" aria-label="Valor aplicado vs ganho de capital"></canvas></div>
      </div>
      <div class="card">
        <div class="card-title">Alocação Atual por Classe</div>
        <div style="position:relative;height:170px"><canvas id="chartPatriPizza" role="img" aria-label="Alocação por classe"></canvas></div>
      </div>
    </div>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<script src="common.js"></script>
<script>
renderHeaderAndNav('patrimonio');
injectModals();

function renderPatrimonio(){
  const t=getTotals();
  document.getElementById('metrics-patri').innerHTML=`
    <div class="mcard"><div class="mcard-label">Patrimônio Atual</div><div class="mcard-value">${fmtR(t.total)}</div></div>
    <div class="mcard"><div class="mcard-label">Total Investido</div><div class="mcard-value">${fmtR(t.custo)}</div></div>
    <div class="mcard"><div class="mcard-label">Ganho de Capital</div><div class="mcard-value ${t.res>=0?'positive':'negative'}">${t.res>=0?'+':''}${fmtR(t.res)}</div></div>
    <div class="mcard"><div class="mcard-label">Proventos Recebidos</div><div class="mcard-value positive">${fmtR(t.provAno)}</div></div>
  `;
  const labels=['Jan','Fev','Mar','Abr','Mai','Jun','Jul','Ago','Set','Out','Nov','Dez'];
  const base=t.custo;
  const vals=labels.map((_,i)=>parseFloat((base+i*base*0.025).toFixed(2)));
  if(charts.patri)charts.patri.destroy();
  charts.patri=new Chart(document.getElementById('chartPatri').getContext('2d'),{
    type:'line',data:{labels,datasets:[{label:'Patrimônio',data:vals,borderColor:'#185FA5',backgroundColor:'rgba(24,95,165,0.07)',fill:true,tension:0.4,pointRadius:3,pointBackgroundColor:'#185FA5'}]},
    options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false},tooltip:{callbacks:{label:c=>' '+fmtR(c.raw)}}},scales:{x:{grid:{display:false},ticks:{color:'#888',font:{size:10}}},y:{grid:{color:'rgba(128,128,128,0.08)'},ticks:{color:'#888',font:{size:10},callback:v=>'R$'+Math.round(v/1000)+'k'}}}}
  });
  const va=labels.map((_,i)=>parseFloat((base*0.85).toFixed(2)));
  const gc=labels.map((_,i)=>parseFloat((base*0.15+i*base*0.02).toFixed(2)));
  if(charts.vagc)charts.vagc.destroy();
  charts.vagc=new Chart(document.getElementById('chartVaGc').getContext('2d'),{
    type:'bar',data:{labels,datasets:[{label:'Valor Aplicado',data:va,backgroundColor:'#185FA5',stack:'s',borderRadius:2},{label:'Ganho de Capital',data:gc,backgroundColor:'#9FE1CB',stack:'s',borderRadius:2}]},
    options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},scales:{x:{grid:{display:false},ticks:{color:'#888',font:{size:10}}},y:{grid:{color:'rgba(128,128,128,0.08)'},ticks:{color:'#888',font:{size:10},callback:v=>'R$'+Math.round(v/1000)+'k'}}}}
  });
  const c=calcAtivos();
  const bc=byClasse(c);
  const clsKeys=Object.keys(bc);
  if(charts.patriPizza)charts.patriPizza.destroy();
  charts.patriPizza=new Chart(document.getElementById('chartPatriPizza').getContext('2d'),{
    type:'doughnut',data:{labels:clsKeys.map(k=>CLASS_LABEL[k]||k),datasets:[{data:Object.values(bc).map(v=>parseFloat(v.toFixed(2))),backgroundColor:clsKeys.map(k=>CLASS_COLORS[k]),borderWidth:0}]},
    options:{responsive:true,maintainAspectRatio:false,cutout:'62%',plugins:{legend:{display:true,position:'right',labels:{font:{size:11},color:'#888',boxWidth:10}}}}
  });
}

function renderAll(){
  renderPatrimonio();
}

renderAll();
</script>
<script src="../nav.js"></script>
</body>
</html>
