<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Consolidador de Carteira — Patrimônio</title>
<link rel="stylesheet" href="common.css">
<link rel="icon" type="image/png" href="../favicon.png">
<link rel="stylesheet" href="../style.css">
<link rel="stylesheet" href="../mobile.css">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@2.47.0/dist/tabler-icons.min.css">
<script>window.NAV_BASE_PATH = "../"; window.NAV_SLIM = true;</script>
</head>
<body>
<div id="nav-placeholder"></div>
<h2 class="sr-only">Consolidador de Carteira — Evolução do patrimônio</h2>

<div class="app">
  <div class="header">
    <h1><i class="ti ti-chart-pie" aria-hidden="true" style="color:var(--blue)"></i>Consolidador de Carteira</h1>
    <div class="header-actions" id="header-actions"></div>
  </div>

  <div class="tabs" id="tabs"></div>

  <div id="tab-patrimonio">
    <div class="metrics" id="metrics-patri"></div>
    <div class="card" style="margin-bottom:1.25rem">
      <div class="card-title">Evolução Real do Patrimônio
        <select id="sel-periodo" onchange="renderEvolucaoPatri(+this.value)" style="font-size:11px;padding:3px 6px;border:0.5px solid var(--color-border-secondary);border-radius:6px;background:var(--color-background-primary);color:var(--color-text-secondary)">
          <option value="12">12 meses</option><option value="24" selected>24 meses</option><option value="60">5 anos</option><option value="120">10 anos</option>
        </select>
      </div>
      <div style="position:relative;height:220px"><canvas id="chartPatri" role="img" aria-label="Evolução real do patrimônio"></canvas></div>
    </div>
    <div class="analise-grid">
      <div class="card">
        <div class="card-title">Custo vs Ganho de Capital por Classe</div>
        <div style="position:relative;height:170px"><canvas id="chartVaGc" role="img" aria-label="Custo vs ganho de capital por classe"></canvas></div>
      </div>
      <div class="card">
        <div class="card-title">Alocação Atual por Classe</div>
        <div style="position:relative;height:170px"><canvas id="chartPatriPizza" role="img" aria-label="Alocação por classe"></canvas></div>
      </div>
    </div>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<script src="common.js"></script>
<script>
renderHeaderAndNav('patrimonio');
injectModals();

function renderPatrimonio(){
  const t=getTotals();
  document.getElementById('metrics-patri').innerHTML=`
    <div class="mcard"><div class="mcard-label">Patrimônio Atual</div><div class="mcard-value">${fmtR(t.total)}</div></div>
    <div class="mcard"><div class="mcard-label">Total Investido</div><div class="mcard-value">${fmtR(t.custo)}</div></div>
    <div class="mcard"><div class="mcard-label">Ganho de Capital</div><div class="mcard-value ${t.res>=0?'positive':'negative'}">${t.res>=0?'+':''}${fmtR(t.res)}</div></div>
    <div class="mcard"><div class="mcard-label">Proventos Recebidos (total)</div><div class="mcard-value positive">${fmtR(t.proventosTotal)}</div><div class="mcard-sub">Últimos 12M: ${fmtR(t.provAno)}</div></div>
  `;
  // Gráfico 1: Evolução real do patrimônio (preços históricos do site)
  renderEvolucaoPatri(24);

  // Gráfico 2: Custo vs ganho de capital por classe (dados reais)
  const c=calcAtivos();
  const bcc={};
  c.forEach(a=>{if(!bcc[a.classe])bcc[a.classe]={custo:0,res:0};bcc[a.classe].custo+=a.custo;bcc[a.classe].res+=a.res;});
  const clsKeys=Object.keys(bcc);
  if(charts.vagc)charts.vagc.destroy();
  charts.vagc=new Chart(document.getElementById('chartVaGc').getContext('2d'),{
    type:'bar',
    data:{
      labels:clsKeys.map(k=>CLASS_LABEL[k]||k),
      datasets:[
        {label:'Custo',data:clsKeys.map(k=>parseFloat(bcc[k].custo.toFixed(2))),backgroundColor:'#185FA5',stack:'s',borderRadius:2},
        {label:'Ganho',data:clsKeys.map(k=>parseFloat(Math.max(0,bcc[k].res).toFixed(2))),backgroundColor:'#1D9E75',stack:'s',borderRadius:2},
        {label:'Perda',data:clsKeys.map(k=>parseFloat(Math.min(0,bcc[k].res).toFixed(2))),backgroundColor:'#E24B4A',stack:'s',borderRadius:2}
      ]
    },
    options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false},tooltip:{callbacks:{label:c=>' '+fmtR(c.raw)}}},scales:{x:{grid:{display:false},ticks:{color:'#888',font:{size:10}}},y:{grid:{color:'rgba(128,128,128,0.08)'},ticks:{color:'#888',font:{size:10},callback:v=>'R$'+Math.round(v/1000)+'k'}}}}
  });
  const bc=byClasse(c);
  const bcKeys=Object.keys(bc);
  if(charts.patriPizza)charts.patriPizza.destroy();
  charts.patriPizza=new Chart(document.getElementById('chartPatriPizza').getContext('2d'),{
    type:'doughnut',data:{labels:bcKeys.map(k=>CLASS_LABEL[k]||k),datasets:[{data:bcKeys.map(k=>parseFloat(bc[k].toFixed(2))),backgroundColor:bcKeys.map(k=>CLASS_COLORS[k]),borderWidth:0}]},
    options:{responsive:true,maintainAspectRatio:false,cutout:'62%',plugins:{legend:{display:true,position:'right',labels:{font:{size:11},color:'#888',boxWidth:10}}}}
  });
}

function renderEvolucaoPatri(nMeses){
  const evol=calcEvolucaoPatrimonio(nMeses).filter(m=>m.vt>0||m.custo>0);
  if(charts.patri)charts.patri.destroy();
  charts.patri=new Chart(document.getElementById('chartPatri').getContext('2d'),{
    type:'line',
    data:{
      labels:evol.map(m=>m.label),
      datasets:[
        {label:'Patrimônio',data:evol.map(m=>m.vt),borderColor:'#185FA5',backgroundColor:'rgba(24,95,165,0.08)',fill:true,tension:0.3,pointRadius:2,pointBackgroundColor:'#185FA5'},
        {label:'Custo',data:evol.map(m=>m.custo),borderColor:'#888',borderDash:[4,4],backgroundColor:'transparent',tension:0.3,pointRadius:0}
      ]
    },
    options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false},tooltip:{callbacks:{label:c=>' '+fmtR(c.raw)}}},scales:{x:{grid:{display:false},ticks:{color:'#888',font:{size:10}}},y:{grid:{color:'rgba(128,128,128,0.08)'},ticks:{color:'#888',font:{size:10},callback:v=>'R$'+Math.round(v/1000)+'k'}}}}
  });
}

function renderAll(){
  renderPatrimonio();
}

renderAll();
</script>
<script src="../nav.js"></script>
</body>
</html>
