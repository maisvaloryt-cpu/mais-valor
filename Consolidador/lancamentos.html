<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Consolidador de Carteira — Lançamentos</title>
<link rel="stylesheet" href="common.css">
<link rel="icon" type="image/png" href="../favicon.png">
<link rel="stylesheet" href="../style.css">
<link rel="stylesheet" href="../mobile.css">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@2.47.0/dist/tabler-icons.min.css">
<script>window.NAV_BASE_PATH = "../"; window.NAV_SLIM = true;</script>
</head>
<body>
<div id="nav-placeholder"></div>
<h2 class="sr-only">Consolidador de Carteira — Histórico de lançamentos</h2>

<div class="app">
  <div class="header">
    <h1><i class="ti ti-chart-pie" aria-hidden="true" style="color:var(--blue)"></i>Consolidador de Carteira</h1>
    <div class="header-actions" id="header-actions"></div>
  </div>

  <div class="tabs" id="tabs"></div>

  <div id="tab-lancamentos">
    <div class="filter-row">
      <select id="filtro-classe" onchange="renderLancamentos()">
        <option value="">Todas as classes</option>
        <option value="B3">Ações B3</option><option value="FII">FIIs</option>
        <option value="Crypto">Cripto</option><option value="RF">Renda Fixa</option>
        <option value="ETF">ETFs</option><option value="Exterior">Exterior</option>
      </select>
      <select id="filtro-tipo" onchange="renderLancamentos()">
        <option value="">Todos os tipos</option>
        <option value="Compra">Compra</option><option value="Venda">Venda</option>
        <option value="Provento">Provento</option>
      </select>
    </div>
    <div class="card">
      <div class="tbl-wrap">
      <table class="tbl">
        <thead><tr><th>Data</th><th>Ticker</th><th>Classe</th><th>Tipo</th><th class="r">Qtd</th><th class="r">Preço</th><th class="r">Total</th></tr></thead>
        <tbody id="tbody-lanc"></tbody>
      </table>
      </div>
    </div>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<script src="common.js"></script>
<script>
renderHeaderAndNav('lancamentos');
injectModals();

function renderLancamentos(){
  const fc=document.getElementById('filtro-classe').value;
  const ft=document.getElementById('filtro-tipo').value;
  const sorted=[...ativos].sort((a,b)=>new Date(b.data)-new Date(a.data));
  const filtered=sorted.filter(a=>(!fc||a.classe===fc)&&(!ft||a.tipo===ft));
  document.getElementById('tbody-lanc').innerHTML=filtered.length?filtered.map(a=>`
    <tr>
      <td>${a.data?new Date(a.data).toLocaleDateString('pt-BR'):'-'}</td>
      <td><strong>${a.ticker}</strong></td>
      <td><span class="badge ${CLASS_BADGE[a.classe]||''}">${CLASS_LABEL[a.classe]||a.classe}</span></td>
      <td>${a.tipo||'Compra'}</td>
      <td class="r">${a.qtd.toLocaleString('pt-BR')}</td>
      <td class="r">${fmtR(a.pm)}</td>
      <td class="r">${fmtR(a.qtd*a.pm)}</td>
    </tr>
  `).join(''):'<tr><td colspan="7" style="text-align:center;padding:1.5rem;color:var(--color-text-secondary);font-size:12px">Nenhum lançamento encontrado.</td></tr>';
}

function renderAll(){
  renderLancamentos();
}

renderAll();
</script>
<script src="../nav.js"></script>
</body>
</html>
