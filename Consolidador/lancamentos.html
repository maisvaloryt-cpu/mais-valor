<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Consolidador de Carteira — Lançamentos</title>
<link rel="stylesheet" href="common.css">
<link rel="icon" type="image/png" href="../favicon.png">
<link rel="stylesheet" href="../style.css">
<link rel="stylesheet" href="../mobile.css">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@2.47.0/dist/tabler-icons.min.css">
<script>window.NAV_BASE_PATH = "../"; window.NAV_SLIM = true;</script>
</head>
<body>
<div id="nav-placeholder"></div>
<h2 class="sr-only">Consolidador de Carteira — Histórico de lançamentos</h2>

<div class="app">
  <div class="header">
    <h1><i class="ti ti-chart-pie" aria-hidden="true" style="color:var(--blue)"></i>Consolidador de Carteira</h1>
    <div class="header-actions" id="header-actions"></div>
  </div>

  <div class="tabs" id="tabs"></div>

  <div id="tab-lancamentos">
    <div class="filter-row">
      <input id="filtro-busca" type="text" placeholder="🔎 Buscar ticker..." oninput="renderLancamentos()" style="flex:1;min-width:140px">
      <select id="filtro-classe" onchange="renderLancamentos()">
        <option value="">Todas as classes</option>
        <option value="B3">Ações B3</option><option value="FII">FIIs</option>
        <option value="Crypto">Cripto</option><option value="RF">Renda Fixa</option>
        <option value="ETF">ETFs</option><option value="Exterior">Exterior</option>
      </select>
      <select id="filtro-tipo" onchange="renderLancamentos()">
        <option value="">Todos os tipos</option>
        <option value="Compra">Compra</option><option value="Venda">Venda</option>
      </select>
      <select id="filtro-ano" onchange="renderLancamentos()">
        <option value="">Todos os anos</option>
      </select>
    </div>
    <div class="metrics" id="metrics-lanc"></div>
    <div class="card">
      <div class="tbl-wrap">
      <table class="tbl">
        <thead><tr><th>Data</th><th>Ticker</th><th>Classe</th><th>Tipo</th><th class="r">Qtd</th><th class="r">Preço</th><th class="r">Total</th><th></th></tr></thead>
        <tbody id="tbody-lanc"></tbody>
      </table>
      </div>
    </div>

    <!-- Seção separada: Proventos Importados (fallback — usados só se site não tiver dados) -->
    <div id="proventos-importados-section" style="display:none;margin-top:1.5rem">
      <div class="section-title" style="font-size:13px">
        <i class="ti ti-coins" aria-hidden="true"></i>
        Proventos Importados
        <span style="font-size:11px;font-weight:400;color:var(--color-text-secondary)"> — fallback usado quando o site não tem dados de dividendos do ativo</span>
      </div>
      <div class="card">
        <div class="tbl-wrap">
        <table class="tbl">
          <thead><tr><th>Data</th><th>Ticker</th><th>Classe</th><th class="r">Qtd Ações</th><th class="r">Valor/Ação</th><th class="r">Total Recebido</th><th></th></tr></thead>
          <tbody id="tbody-prov"></tbody>
        </table>
        </div>
      </div>
    </div>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
<script src="common.js"></script>
<script src="firebase.js"></script>
<script>
renderHeaderAndNav('lancamentos');
injectModals();

// Se veio do Resumo com ?ticker=XXX, já preenche a busca por esse ativo.
(function aplicarFiltroDaURL(){
  try{
    const t=new URLSearchParams(location.search).get('ticker');
    if(t){const inp=document.getElementById('filtro-busca');if(inp)inp.value=t;}
  }catch(e){}
})();

function popularAnosLanc(){
  const sel=document.getElementById('filtro-ano');
  if(!sel||sel.options.length>1)return;
  const anos=[...new Set(ativos.filter(a=>a.data).map(a=>a.data.slice(0,4)))].sort((a,b)=>b-a);
  anos.forEach(y=>{ const o=document.createElement('option'); o.value=y; o.textContent=y; sel.appendChild(o); });
}

function renderLancamentos(){
  popularAnosLanc();
  const fc=document.getElementById('filtro-classe').value;
  const ft=document.getElementById('filtro-tipo').value;
  const fa=document.getElementById('filtro-ano').value;
  const fb=(document.getElementById('filtro-busca').value||'').trim().toUpperCase();

  // Bug #9 fix: sort robusto com datas inválidas
  const sortFn=(a,b)=>{
    const da=a.data?new Date(a.data):new Date(0);
    const db=b.data?new Date(b.data):new Date(0);
    return db-da;
  };

  // Bug #13 fix: preservar índice original para permitir exclusão por linha
  // Indexa cada entrada com sua posição real em ativos[]
  const mainTx=ativos
    .map((a,i)=>({...a,_idx:i}))
    .filter(a=>(a.tipo||'Compra')!=='Provento')
    .sort(sortFn);
  const filtered=mainTx.filter(a=>(!fc||a.classe===fc)&&(!ft||(a.tipo||'Compra')===ft)&&(!fa||(a.data||'').slice(0,4)===fa)&&(!fb||a.ticker.toUpperCase().includes(fb)));
  // Totais dos lançamentos filtrados
  let comprado=0,vendido=0;
  filtered.forEach(a=>{const v=a.qtd*a.pm;if((a.tipo||'Compra')==='Venda')vendido+=v;else comprado+=v;});
  document.getElementById('metrics-lanc').innerHTML=`
    <div class="mcard"><div class="mcard-label">Lançamentos</div><div class="mcard-value">${filtered.length}</div></div>
    <div class="mcard"><div class="mcard-label">Total comprado</div><div class="mcard-value">${fmtR(comprado)}</div></div>
    <div class="mcard"><div class="mcard-label">Total vendido</div><div class="mcard-value">${fmtR(vendido)}</div></div>
    <div class="mcard"><div class="mcard-label">Saldo líquido aplicado</div><div class="mcard-value ${comprado-vendido>=0?'':'negative'}">${fmtR(comprado-vendido)}</div></div>
  `;
  document.getElementById('tbody-lanc').innerHTML=filtered.length?filtered.map(a=>`
    <tr>
      <td>${a.data?a.data.split('-').reverse().join('/'):'-'}</td>
      <td><strong title="${a.ticker}">${typeof rotuloAtivo==='function'?rotuloAtivo(a):a.ticker}</strong></td>
      <td><span class="badge ${CLASS_BADGE[a.classe]||''}">${CLASS_LABEL[a.classe]||a.classe}</span></td>
      <td>${a.tipo||'Compra'}</td>
      <td class="r">${a.qtd.toLocaleString('pt-BR')}</td>
      <td class="r">${fmtR(a.pm)}</td>
      <td class="r">${fmtR(a.qtd*a.pm)}</td>
      <td><button class="btn btn-sm" title="Opções" onclick="openRowMenu(event,${a._idx})"><i class="ti ti-dots-vertical" aria-hidden="true"></i></button></td>
    </tr>
  `).join(''):'<tr><td colspan="8" style="text-align:center;padding:1.5rem;color:var(--color-text-secondary);font-size:12px">Nenhum lançamento encontrado.</td></tr>';

  // Seção de Proventos Importados (fallback)
  const provSection=document.getElementById('proventos-importados-section');
  const proventos=ativos.map((a,i)=>({...a,_idx:i})).filter(a=>a.tipo==='Provento').sort(sortFn);
  if(proventos.length){
    provSection.style.display='';
    document.getElementById('tbody-prov').innerHTML=proventos.map(a=>`
      <tr>
        <td>${a.data?a.data.split('-').reverse().join('/'):'-'}</td>
        <td><strong title="${a.ticker}">${typeof rotuloAtivo==='function'?rotuloAtivo(a):a.ticker}</strong></td>
        <td><span class="badge ${CLASS_BADGE[a.classe]||''}">${CLASS_LABEL[a.classe]||a.classe}</span></td>
        <td class="r">${a.qtd.toLocaleString('pt-BR')}</td>
        <td class="r">${fmtR(a.pm)}</td>
        <td class="r positive">${fmtR(a.qtd*a.pm)}</td>
        <td><button class="btn btn-sm" title="Opções" onclick="openRowMenu(event,${a._idx})"><i class="ti ti-dots-vertical" aria-hidden="true"></i></button></td>
      </tr>
    `).join('');
  }else{
    provSection.style.display='none';
  }
}

function renderAll(){
  renderLancamentos();
}

mvGate(initConsolidador);
</script>
<script src="../nav.js"></script>
</body>
</html>
