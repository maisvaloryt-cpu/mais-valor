<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<link rel="icon" type="image/png" href="favicon.png">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>FIIs — Mais Valor</title>
<link rel="stylesheet" href="style.css">
<link rel="stylesheet" href="mobile.css">
</head>
<body>
<div id="nav-placeholder"></div>

<div class="page-hero fade-in">
  <h1>FUNDOS <em>IMOBILIÁRIOS</em></h1>
  <p>Cotações, DY, P/VP e histórico de todos os FIIs listados na B3.
    <span id="data-timestamp" style="color:var(--gold);font-size:12px"></span></p>
</div>

<div class="container">
  <div class="main-grid">
    <div class="fade-in-1">

      <!-- BUSCA E SEGMENTO -->
      <div class="filter-bar">
        <input class="filter-input" placeholder="🔍 Buscar por ticker ou nome..." style="flex:1;max-width:300px" oninput="filterTable()" id="f-search">
        <select class="filter-select" onchange="filterTable()" id="f-setor">
          <option value="">Todos os tipos e segmentos</option>
          <optgroup label="🧱 Tijolo">
            <option value="__tijolo__">— Todos os Tijolo —</option>
            <option>Escritórios</option>
            <option>Lajes Corporativas</option>
            <option>Logística</option>
            <option>Shoppings</option>
            <option>Hospital</option>
            <option>Hotel</option>
            <option>Residencial</option>
            <option>Varejo</option>
            <option>Agências</option>
            <option>Industrial</option>
            <option>Educacional</option>
          </optgroup>
          <optgroup label="📄 Papel">
            <option value="__papel__">— Todos os Papel —</option>
            <option value="Títulos e Val. Mob.">Títulos e Val. Mob.</option>
            <option value="CRI / Papel">CRI / Papel</option>
          </optgroup>
          <optgroup label="📦 Outros">
            <option value="__outros__">— Todos os Outros —</option>
            <option>Multicategoria</option>
            <option>FOF</option>
            <option>Híbrido</option>
            <option>Multiestratégia</option>
            <option>Outros</option>
            <option>Agrícola</option>
          </optgroup>
        </select>
      </div>

      <div class="table-wrap">
        <!-- RANKING colado acima da tabela -->
        <div class="ranking-bar" style="border-bottom:1px solid rgba(255,255,255,0.07);padding-bottom:10px;margin-bottom:0">
          <span class="ranking-label">Ranking por:</span>
          <div class="ranking-btns">
            <button class="rank-btn active" data-sort="vp" onclick="setRank(this)">Valor Patrimonial</button>
            <button class="rank-btn" data-sort="dy" onclick="setRank(this)">Dividend Yield</button>
            <button class="rank-btn" data-sort="pvp" onclick="setRank(this)">Menores P/VP</button>
            <button class="rank-btn" data-sort="vac" onclick="setRank(this)">Menor Vacância</button>
            <button class="rank-btn" data-sort="liq" onclick="setRank(this)">Liquidez</button>
          </div>
        </div>
        <table class="data-table">
          <thead><tr>
            <th>Ativos</th>
            <th class="r sortable" data-sort="vp" onclick="setRank(this)" title="Ordenar por Patrimônio Líquido">Patrimônio Líquido <span class="sort-arrow"></span></th>
            <th class="r sortable" data-sort="pvp" onclick="setRank(this)" title="Ordenar por P/VP">P/VP <span class="sort-arrow"></span></th>
            <th class="r sortable" data-sort="dy" onclick="setRank(this)" title="Ordenar por Dividend Yield">DY 12m <span class="sort-arrow"></span></th>
            <th class="r sortable" data-sort="vac" onclick="setRank(this)" title="Menor vacância = melhor">Vacância <span class="sort-arrow"></span></th>
            <th class="r sortable" data-sort="liq" onclick="setRank(this)" title="Ordenar por Liquidez Diária">Liquidez Diária <span class="sort-arrow"></span></th>
            <th class="r" style="color:var(--text3)">Segmento</th>
          </tr></thead>
          <tbody id="tbody">
            <tr><td colspan="7" style="text-align:center;padding:2rem;color:var(--text3)">
              <span class="loading-dot"></span><span class="loading-dot"></span><span class="loading-dot"></span>
            </td></tr>
          </tbody>
        </table>
      </div>
    </div>

    <div class="sidebar fade-in-2">
      <div class="card">
        <div class="section-header" style="margin-bottom:.75rem"><div class="section-title">Por Segmento</div></div>
        <div id="seg-list"></div>
      </div>
      <div class="card">
        <div class="section-header" style="margin-bottom:.75rem"><div class="section-title">Maiores DY</div></div>
        <div id="top-dy"></div>
      </div>
      <div class="card">
        <div class="section-header" style="margin-bottom:.75rem"><div class="section-title">Abaixo do VP</div></div>
        <div id="below-vp"></div>
      </div>
    </div>
  </div>
</div>

<div id="footer-placeholder"></div>
<script>
/* Mais Valor — logo SVG global para uso pelo nav.js */
window.MV_LOGO_SVG = '<svg viewBox="0 0 530 530" xmlns="http://www.w3.org/2000/svg" width="40" height="40" style="display:block;">\n        <defs>\n          <linearGradient id="mvGold" x1="0%" y1="0%" x2="100%" y2="100%">\n            <stop offset="0%" stop-color="#FFD76A"/>\n            <stop offset="100%" stop-color="#F3B13B"/>\n          </linearGradient>\n        </defs>\n        <rect width="530" height="530" fill="#C90D08"/>\n        <path fill="url(#mvGold)" d="M459 58 L346 125 L387 142 L365 181 L296 277 L258 315 L212 349 L174 367 L147 374 L110 376 L89 372 L67 362 L49 345 L37 324 L32 302 L31 349 L52 392 L70 409 L94 422 L150 429 L196 420 L230 407 L298 365 L337 329 L377 280 L441 171 L475 192 L480 191 Z"/>\n        <path fill="url(#mvGold)" d="M399 303 L384 326 L358 359 L318 398 L283 424 L258 438 L222 452 L190 459 L161 460 L178 465 L200 468 L237 467 L278 458 L315 441 L340 421 L361 395 L383 353 L397 314 Z"/>\n      </svg>';
</script>
<script src="data.js"></script>
<script src="nav.js"></script>
<style>
.ranking-bar{display:flex;align-items:center;gap:12px;flex-wrap:wrap;padding:10px 0 4px}
.ranking-label{font-size:13px;color:var(--text3);white-space:nowrap;font-weight:500}
.ranking-btns{display:flex;gap:6px;flex-wrap:wrap}
.rank-btn{background:transparent;border:1px solid rgba(255,255,255,0.1);color:var(--text2);padding:5px 14px;border-radius:20px;font-size:12px;font-weight:500;cursor:pointer;transition:all .18s;white-space:nowrap}
.rank-btn:hover{border-color:var(--gold);color:var(--gold)}
.rank-btn.active{background:var(--gold);border-color:var(--gold);color:#000;font-weight:700}
.sortable{cursor:pointer;user-select:none;transition:color .15s}
.sortable:hover{color:var(--gold)}
.sort-arrow{color:var(--gold);font-size:10px}
</style>
<script>
let data = [];
let currentSort = 'vp';

function fmtBi(v) {
  if (!v || isNaN(v)) return '—';
  if (v >= 1e12) return (v/1e12).toFixed(2) + ' T';
  if (v >= 1e9)  return (v/1e9).toFixed(2) + ' B';
  if (v >= 1e6)  return (v/1e6).toFixed(2) + ' M';
  return v.toLocaleString('pt-BR');
}

// fiiLogoOrAvatar removida — usando logoHtml() de nav.js (com cache + cascata de fontes)
function fiiLogoOrAvatar(ticker, size=32){ return logoHtml(ticker, size); }

function setRank(el) {
  document.querySelectorAll('.rank-btn').forEach(b => b.classList.remove('active'));
  el.classList.add('active');
  currentSort = el.dataset.sort;
  filterTable();
}

// ── Tabela ────────────────────────────────────────────────────────
function renderTable(arr) {
  const tb = document.getElementById('tbody');
  tb.innerHTML = '';
  if (!arr.length) {
    tb.innerHTML = '<tr><td colspan="7" style="text-align:center;padding:2rem;color:var(--text3)">Nenhum FII encontrado</td></tr>';
    return;
  }
  // Atualiza seta do header ativo
  document.querySelectorAll('.sort-arrow').forEach(el => el.textContent = '');
  const activeBtn = document.querySelector(`.rank-btn.active`);
  const activeSort = activeBtn ? activeBtn.dataset.sort : currentSort;
  const activeTh = document.querySelector(`th[data-sort="${activeSort}"] .sort-arrow`);
  if (activeTh) activeTh.textContent = ' ↓';

  arr.forEach((d, i) => {
    const tr = document.createElement('tr');
    tr.style.animationDelay = (i * 0.015) + 's';
    tr.className = 'fade-in';
    tr.style.cursor = 'pointer';
    if (d.stale) tr.setAttribute('data-stale', 'true');

    const pvpClass = d.pvp < 1 ? 'up' : d.pvp > 1.1 ? 'dn' : '';

    // Vacância
    const vac = d.vacancia != null ? d.vacancia : null;
    const vacTxt = vac !== null ? vac.toFixed(1) + '%' : '—';
    const vacClass = vac !== null ? (vac <= 5 ? 'up' : vac >= 20 ? 'dn' : '') : '';

    // Liquidez diária
    const liqTxt = d.volNum > 0 ? fmtBi(d.volNum) : '—';

    // Patrimônio líquido
    const vpVal = d.pl_val || d.mcap || d.vmNum || null;

    tr.innerHTML = `
      <td>
        <div style="display:flex;align-items:center;gap:10px">
          ${fiiLogoOrAvatar(d.t, 32)}
          <div>
            <div class="asset-ticker">${d.t}</div>
            <div class="asset-name">${d.n || ''}</div>
          </div>
        </div>
      </td>
      <td class="r" style="color:var(--text2)">${vpVal ? fmtBi(vpVal) : '—'}</td>
      <td class="r ${pvpClass}">${d.pvp > 0 ? d.pvp.toFixed(2) : '—'}</td>
      <td class="r gold">${d.dy > 0 ? d.dy.toFixed(1) + '%' : '0%'}</td>
      <td class="r ${vacClass}">${vacTxt}</td>
      <td class="r" style="color:var(--text2);font-size:12px">${liqTxt}</td>
      <td class="r" style="color:var(--text3);font-size:11px">${d.setor || '—'}</td>`;
    tr.onclick = () => location.href = `ativo.html?t=${d.t}&tipo=fii`;
    tb.appendChild(tr);
  });
}

// ── Filtro e ordenação ─────────────────────────────────────────────
// Mapeamento de categorias hierárquicas
const SETOR_TIJOLO = ['Escritórios','Lajes Corporativas','Logística','Shoppings','Hospital','Hotel','Residencial','Varejo','Agências','Industrial','Educacional'];
const SETOR_PAPEL  = ['Títulos e Val. Mob.','CRI / Papel'];
const SETOR_OUTROS = ['Multicategoria','FOF','Híbrido','Multiestratégia','Outros','Agrícola'];

function filterTable() {
  const q = document.getElementById('f-search').value.toLowerCase();
  const s = document.getElementById('f-setor').value;
  data = FIIS.filter(d => {
    const matchQ = d.t.toLowerCase().includes(q) || (d.n||'').toLowerCase().includes(q);
    let matchS = true;
    if (s === '__tijolo__') matchS = SETOR_TIJOLO.includes(d.setor);
    else if (s === '__papel__')  matchS = SETOR_PAPEL.includes(d.setor);
    else if (s === '__outros__') matchS = SETOR_OUTROS.includes(d.setor);
    else if (s) matchS = d.setor === s;
    return matchQ && matchS;
  });
  applySort(currentSort);
}

function applySort(k) {
  if (k === 'dy')  data.sort((a, b) => b.dy - a.dy);
  else if (k === 'pvp') {
    data = data.filter(d => d.pvp && d.pvp > 0);
    data.sort((a, b) => a.pvp - b.pvp);
  }
  else if (k === 'vac') {
    // Menor vacância primeiro; sem dados vai pro fim
    data.sort((a, b) => {
      const av = a.vacancia != null ? a.vacancia : 9999;
      const bv = b.vacancia != null ? b.vacancia : 9999;
      return av - bv;
    });
  }
  else if (k === 'liq') data.sort((a, b) => (b.volNum || 0) - (a.volNum || 0));
  else if (k === 'v12') {
    data.sort((a, b) => {
      const av = a.v12 != null ? a.v12 : -9999;
      const bv = b.v12 != null ? b.v12 : -9999;
      return bv - av;
    });
  }
  else /* vp / default */ data.sort((a, b) => (b.pl_val || b.mcap || b.vmNum || 0) - (a.pl_val || a.mcap || a.vmNum || 0));
  renderTable(data);
}

// ── Sidebar ────────────────────────────────────────────────────────
function renderSidebar() {
  const segs = {};
  FIIS.forEach(d => { segs[d.setor] = (segs[d.setor] || 0) + 1; });
  document.getElementById('seg-list').innerHTML = Object.entries(segs)
    .sort((a, b) => b[1] - a[1])
    .map(([s, n]) => `
      <div class="mover-item" style="cursor:pointer" onclick="document.getElementById('f-setor').value='${s}';filterTable()">
        <span style="font-size:12px;font-weight:700">${s}</span>
        <span class="pill gold-pill">${n}</span>
      </div>`).join('');

  const topDy = [...FIIS].filter(d => d.dy > 0).sort((a, b) => b.dy - a.dy).slice(0, 5);
  document.getElementById('top-dy').innerHTML = topDy.length
    ? topDy.map(d => `
      <div class="mover-item" style="cursor:pointer" onclick="location.href='ativo.html?t=${d.t}&tipo=fii'">
        <div style="display:flex;align-items:center;gap:8px">
          ${fiiLogoOrAvatar(d.t, 26)}
          <div><div class="mover-ticker">${d.t}</div><div class="mover-name">${d.setor}</div></div>
        </div>
        <span class="pill gold-pill">${d.dy.toFixed(1)}%</span>
      </div>`).join('')
    : '<div style="color:var(--text3);font-size:12px">—</div>';

  const belowVP = [...FIIS].filter(d => d.pvp && d.pvp < 0.95).sort((a, b) => a.pvp - b.pvp).slice(0, 5);
  document.getElementById('below-vp').innerHTML = belowVP.length
    ? belowVP.map(d => `
      <div class="mover-item" style="cursor:pointer" onclick="location.href='ativo.html?t=${d.t}&tipo=fii'">
        <div style="display:flex;align-items:center;gap:8px">
          ${fiiLogoOrAvatar(d.t, 26)}
          <div><div class="mover-ticker">${d.t}</div><div class="mover-name">${d.setor}</div></div>
        </div>
        <span class="pill up-pill">P/VP ${d.pvp.toFixed(2)}</span>
      </div>`).join('')
    : '<div style="color:var(--text3);font-size:12px">Nenhum abaixo de 0.95</div>';
}

async function init() {
  await loadData();
  // Abre sempre ordenado por Valor Patrimonial
  data = [...FIIS].sort((a, b) => (b.pl_val || b.mcap || b.vmNum || 0) - (a.pl_val || a.mcap || a.vmNum || 0));
  const params = new URLSearchParams(location.search);
  if (params.get('q')) {
    document.getElementById('f-search').value = params.get('q');
    filterTable();
  } else {
    renderTable(data);
  }
  renderSidebar();
}
init();
</script>
</body>
</html>
