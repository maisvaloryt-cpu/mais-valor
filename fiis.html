<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<link rel="icon" type="image/png" href="favicon.png">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>FIIs — Mais Valor</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<div id="nav-placeholder"></div>

<div class="page-hero fade-in">
  <h1>FUNDOS <em>IMOBILIÁRIOS</em></h1>
  <p>Cotações, DY, P/VP e histórico de todos os FIIs listados na B3.
    <span id="data-timestamp" style="color:var(--gold);font-size:12px"></span></p>
</div>

<div class="container">
  <div class="main-grid">
    <div class="fade-in-1">

      <!-- BUSCA E SEGMENTO -->
      <div class="filter-bar">
        <input class="filter-input" placeholder="🔍 Buscar por ticker ou nome..." style="flex:1;max-width:300px" oninput="filterTable()" id="f-search">
        <select class="filter-select" onchange="filterTable()" id="f-setor">
          <option value="">Todos os tipos e segmentos</option>
          <option>Papel</option>
          <option>Logística</option>
          <option>Shoppings</option>
          <option>Híbrido</option>
          <option>FOF</option>
          <option>Lajes</option>
          <option>Residencial</option>
          <option>Hotel</option>
          <option>Educacional</option>
        </select>
      </div>

      <div class="table-wrap">
        <!-- RANKING colado acima da tabela -->
        <div class="ranking-bar" style="border-bottom:1px solid rgba(255,255,255,0.07);padding-bottom:10px;margin-bottom:0">
          <span class="ranking-label">Ranking por:</span>
          <div class="ranking-btns">
            <button class="rank-btn active" data-sort="vp" onclick="setRank(this)">Valor Patrimonial</button>
            <button class="rank-btn" data-sort="dy" onclick="setRank(this)">Dividend Yield</button>
            <button class="rank-btn" data-sort="liq" onclick="setRank(this)">Liquidez</button>
            <button class="rank-btn" data-sort="pvp" onclick="setRank(this)">Menores P/VP</button>
            <button class="rank-btn" data-sort="v" onclick="setRank(this)">Variação dia</button>
          </div>
        </div>
        <table class="data-table">
          <thead><tr>
            <th>Ativos</th>
            <th class="r">Patrimônio Líquido</th>
            <th class="r">P/VP</th>
            <th class="r">Dividend Yield</th>
            <th class="r">Variação 12m</th>
            <th class="r">Segmento</th>
          </tr></thead>
          <tbody id="tbody">
            <tr><td colspan="6" style="text-align:center;padding:2rem;color:var(--text3)">
              <span class="loading-dot"></span><span class="loading-dot"></span><span class="loading-dot"></span>
            </td></tr>
          </tbody>
        </table>
      </div>
    </div>

    <div class="sidebar fade-in-2">
      <div class="card">
        <div class="section-header" style="margin-bottom:.75rem"><div class="section-title">Por Segmento</div></div>
        <div id="seg-list"></div>
      </div>
      <div class="card">
        <div class="section-header" style="margin-bottom:.75rem"><div class="section-title">Maiores DY</div></div>
        <div id="top-dy"></div>
      </div>
      <div class="card">
        <div class="section-header" style="margin-bottom:.75rem"><div class="section-title">Abaixo do VP</div></div>
        <div id="below-vp"></div>
      </div>
    </div>
  </div>
</div>

<div id="footer-placeholder"></div>
<script src="data.js"></script>
<script src="nav.js"></script>
<style>
.ranking-bar{display:flex;align-items:center;gap:12px;flex-wrap:wrap;padding:10px 0 4px}
.ranking-label{font-size:13px;color:var(--text3);white-space:nowrap;font-weight:500}
.ranking-btns{display:flex;gap:6px;flex-wrap:wrap}
.rank-btn{background:transparent;border:1px solid rgba(255,255,255,0.1);color:var(--text2);padding:5px 14px;border-radius:20px;font-size:12px;font-weight:500;cursor:pointer;transition:all .18s;white-space:nowrap}
.rank-btn:hover{border-color:var(--gold);color:var(--gold)}
.rank-btn.active{background:var(--gold);border-color:var(--gold);color:#000;font-weight:700}
</style>
<script>
let data = [];
let currentSort = 'vp';

function fmtBi(v) {
  if (!v || isNaN(v)) return '—';
  if (v >= 1e12) return (v/1e12).toFixed(2) + ' T';
  if (v >= 1e9)  return (v/1e9).toFixed(2) + ' B';
  if (v >= 1e6)  return (v/1e6).toFixed(2) + ' M';
  return v.toLocaleString('pt-BR');
}

function fiiLogoOrAvatar(ticker, size=32){
  const initials = ticker.replace(/\d+/g,'').slice(0,3) || ticker.slice(0,3);
  const fs = Math.round(size * 0.32);
  return `<img src="https://raw.githubusercontent.com/thefintz/icones-b3/main/icones/${ticker}.png"
    style="width:${size}px;height:${size}px;border-radius:50%;object-fit:contain;background:#fff;flex-shrink:0"
    onerror="this.outerHTML='<div style=\\'width:${size}px;height:${size}px;border-radius:50%;background:linear-gradient(135deg,#1A3A5C,#2563a8);display:flex;align-items:center;justify-content:center;font-size:${fs}px;font-weight:800;color:#fff;font-family:var(--font-mono);flex-shrink:0\\'>${initials}</div>'"
    loading="lazy">`;
}

function setRank(el) {
  document.querySelectorAll('.rank-btn').forEach(b => b.classList.remove('active'));
  el.classList.add('active');
  currentSort = el.dataset.sort;
  filterTable();
}

// ── Tabela ────────────────────────────────────────────────────────
function renderTable(arr) {
  const tb = document.getElementById('tbody');
  tb.innerHTML = '';
  if (!arr.length) {
    tb.innerHTML = '<tr><td colspan="6" style="text-align:center;padding:2rem;color:var(--text3)">Nenhum FII encontrado</td></tr>';
    return;
  }
  arr.forEach((d, i) => {
    const tr = document.createElement('tr');
    tr.style.animationDelay = (i * 0.015) + 's';
    tr.className = 'fade-in';
    tr.style.cursor = 'pointer';
    if (d.stale) tr.setAttribute('data-stale', 'true');: abaixo de 1 = verde, acima de 1.1 = vermelho
    const pvpClass = d.pvp < 1 ? 'up' : d.pvp > 1.1 ? 'dn' : '';

    // Variação 12m — usa d.v12 se existir, senão d.v (dia)
    const v12 = d.v12 !== undefined ? d.v12 : d.v;
    const v12Class = v12 >= 0 ? 'up' : 'dn';
    const v12Txt = v12 !== undefined ? `${v12 >= 0 ? '+' : ''}${v12.toFixed(2)}%` : '—';

    // Patrimônio líquido — usa d.pl_val (valor numérico) ou d.vm ou d.mcap
    const vpVal = d.pl_val || d.mcap || d.vmNum || null;

    tr.innerHTML = `
      <td>
        <div style="display:flex;align-items:center;gap:10px">
          ${fiiLogoOrAvatar(d.t, 32)}
          <div>
            <div class="asset-ticker">${d.t}</div>
            <div class="asset-name">${d.n || ''}</div>
          </div>
        </div>
      </td>
      <td class="r" style="color:var(--text2)">${vpVal ? fmtBi(vpVal) : (d.vm || '—')}</td>
      <td class="r ${pvpClass}">${d.pvp > 0 ? d.pvp.toFixed(2) : '—'}</td>
      <td class="r gold">${d.dy > 0 ? d.dy.toFixed(1) + '%' : '—'}</td>
      <td class="r ${v12Class}">${v12Txt}</td>
      <td class="r" style="color:var(--text3);font-size:11px">${d.setor || '—'}</td>`;
    tr.onclick = () => location.href = `ativo.html?t=${d.t}&tipo=fii`;
    tb.appendChild(tr);
  });
}

// ── Filtro e ordenação ─────────────────────────────────────────────
function filterTable() {
  const q = document.getElementById('f-search').value.toLowerCase();
  const s = document.getElementById('f-setor').value;
  data = FIIS.filter(d =>
    (d.t.toLowerCase().includes(q) || (d.n||'').toLowerCase().includes(q)) &&
    (!s || d.setor === s)
  );
  applySort(currentSort);
}

function applySort(k) {
  if (k === 't')    data.sort((a, b) => a.t.localeCompare(b.t));
  else if (k === 'v')   data.sort((a, b) => b.v - a.v);
  else if (k === 'dy')  data.sort((a, b) => b.dy - a.dy);
  else if (k === 'pvp') data.sort((a, b) => (a.pvp || 999) - (b.pvp || 999));
  else if (k === 'liq') data.sort((a, b) => (b.volNum || 0) - (a.volNum || 0));
  else /* vp / default */ data.sort((a, b) => (b.pl_val || b.mcap || b.vmNum || 0) - (a.pl_val || a.mcap || a.vmNum || 0));
  renderTable(data);
}

// ── Sidebar ────────────────────────────────────────────────────────
function renderSidebar() {
  const segs = {};
  FIIS.forEach(d => { segs[d.setor] = (segs[d.setor] || 0) + 1; });
  document.getElementById('seg-list').innerHTML = Object.entries(segs)
    .sort((a, b) => b[1] - a[1])
    .map(([s, n]) => `
      <div class="mover-item" style="cursor:pointer" onclick="document.getElementById('f-setor').value='${s}';filterTable()">
        <span style="font-size:12px;font-weight:700">${s}</span>
        <span class="pill gold-pill">${n}</span>
      </div>`).join('');

  const topDy = [...FIIS].filter(d => d.dy > 0).sort((a, b) => b.dy - a.dy).slice(0, 5);
  document.getElementById('top-dy').innerHTML = topDy.length
    ? topDy.map(d => `
      <div class="mover-item" style="cursor:pointer" onclick="location.href='ativo.html?t=${d.t}&tipo=fii'">
        <div style="display:flex;align-items:center;gap:8px">
          ${fiiLogoOrAvatar(d.t, 26)}
          <div><div class="mover-ticker">${d.t}</div><div class="mover-name">${d.setor}</div></div>
        </div>
        <span class="pill gold-pill">${d.dy.toFixed(1)}%</span>
      </div>`).join('')
    : '<div style="color:var(--text3);font-size:12px">—</div>';

  const belowVP = [...FIIS].filter(d => d.pvp && d.pvp < 0.95).sort((a, b) => a.pvp - b.pvp).slice(0, 5);
  document.getElementById('below-vp').innerHTML = belowVP.length
    ? belowVP.map(d => `
      <div class="mover-item" style="cursor:pointer" onclick="location.href='ativo.html?t=${d.t}&tipo=fii'">
        <div style="display:flex;align-items:center;gap:8px">
          ${fiiLogoOrAvatar(d.t, 26)}
          <div><div class="mover-ticker">${d.t}</div><div class="mover-name">${d.setor}</div></div>
        </div>
        <span class="pill up-pill">P/VP ${d.pvp.toFixed(2)}</span>
      </div>`).join('')
    : '<div style="color:var(--text3);font-size:12px">Nenhum abaixo de 0.95</div>';
}

async function init() {
  await loadData();
  // Abre sempre ordenado por Valor Patrimonial
  data = [...FIIS].sort((a, b) => (b.pl_val || b.mcap || b.vmNum || 0) - (a.pl_val || a.mcap || a.vmNum || 0));
  const params = new URLSearchParams(location.search);
  if (params.get('q')) {
    document.getElementById('f-search').value = params.get('q');
    filterTable();
  } else {
    renderTable(data);
  }
  renderSidebar();
}
init();
</script>
</body>
</html>
