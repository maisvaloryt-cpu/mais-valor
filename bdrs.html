<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<link rel="icon" type="image/png" href="favicon.png">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>BDRs — Mais Valor</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<div id="nav-placeholder"></div>

<div class="page-hero fade-in">
  <h1>BDRs <em>B3</em></h1>
  <p>Brazilian Depositary Receipts — recibos de empresas estrangeiras listados na B3.
    <span id="data-timestamp" style="color:var(--gold);font-size:12px"></span></p>
</div>

<div class="container">
  <div class="main-grid">
    <div class="fade-in-1">
      <div class="filter-bar">
        <input class="filter-input" placeholder="🔍 Buscar por ticker ou nome..." style="flex:1;max-width:300px" oninput="filterTable()" id="f-search">
        <select class="filter-select" onchange="filterTable()" id="f-setor">
          <option value="">Todos os setores</option>
          <option value="Tecnologia">Tecnologia</option>
          <option value="Saúde">Saúde</option>
          <option value="Financeiro">Financeiro</option>
          <option value="Consumo">Consumo</option>
          <option value="Energia">Energia</option>
          <option value="Comunicação">Comunicação</option>
          <option value="Industrial">Industrial</option>
        </select>
        <select class="filter-select" onchange="filterTable()" id="f-origem">
          <option value="">Todas as origens</option>
          <option value="EUA">🇺🇸 EUA</option>
          <option value="Europa">🇪🇺 Europa</option>
          <option value="China">🇨🇳 China</option>
          <option value="Outros">Outros</option>
        </select>
      </div>

      <div class="table-wrap">
        <div class="ranking-bar">
          <span class="ranking-label">Ranking por:</span>
          <div class="ranking-btns">
            <button class="rank-btn active" data-sort="liq" onclick="setRank(this)">Liquidez</button>
            <button class="rank-btn" data-sort="v12" onclick="setRank(this)">Retorno 12m</button>
            <button class="rank-btn" data-sort="dy" onclick="setRank(this)">Dividend Yield</button>
            <button class="rank-btn" data-sort="p" onclick="setRank(this)">Preço</button>
          </div>
        </div>
        <table class="data-table">
          <thead><tr>
            <th>Ativo</th>
            <th class="r sortable" data-sort="p" onclick="setRank(this)">Preço (R$) <span class="sort-arrow"></span></th>
            <th class="r">Hoje</th>
            <th class="r sortable" data-sort="dy" onclick="setRank(this)">DY 12m <span class="sort-arrow"></span></th>
            <th class="r sortable" data-sort="pl" onclick="setRank(this)">P/L <span class="sort-arrow"></span></th>
            <th class="r sortable" data-sort="v12" onclick="setRank(this)">Ret. 12m <span class="sort-arrow"></span></th>
            <th class="r sortable" data-sort="liq" onclick="setRank(this)">Volume <span class="sort-arrow"></span></th>
            <th class="r">Origem</th>
          </tr></thead>
          <tbody id="tbody"></tbody>
        </table>
      </div>
    </div>

    <div class="sidebar fade-in-2">
      <div class="card">
        <div class="section-header" style="margin-bottom:.75rem"><div class="section-title">Maiores Altas</div></div>
        <div id="top-altas"><div style="color:var(--text3);font-size:12px">—</div></div>
      </div>
      <div class="card">
        <div class="section-header" style="margin-bottom:.75rem"><div class="section-title">Maior Liquidez</div></div>
        <div id="top-liq"><div style="color:var(--text3);font-size:12px">—</div></div>
      </div>
      <div class="card">
        <div class="section-header" style="margin-bottom:.75rem"><div class="section-title">Maior DY</div></div>
        <div id="top-dy"><div style="color:var(--text3);font-size:12px">—</div></div>
      </div>
    </div>
  </div>
</div>

<div id="footer-placeholder"></div>
<script src="data.js"></script>
<script src="nav.js"></script>
<style>
.ranking-bar{display:flex;align-items:center;gap:12px;flex-wrap:wrap;padding:10px 0 8px}
.ranking-label{font-size:13px;color:var(--text3);white-space:nowrap;font-weight:500}
.ranking-btns{display:flex;gap:6px;flex-wrap:wrap}
.rank-btn{background:transparent;border:1px solid rgba(255,255,255,0.1);color:var(--text2);padding:5px 14px;border-radius:20px;font-size:12px;font-weight:500;cursor:pointer;transition:all .18s;white-space:nowrap}
.rank-btn:hover{border-color:var(--gold);color:var(--gold)}
.rank-btn.active{background:var(--gold);border-color:var(--gold);color:#000;font-weight:700}
.sortable{cursor:pointer;user-select:none}
.sortable:hover{color:var(--gold)}
.sort-arrow{color:var(--gold);font-size:10px}
.filter-bar{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:1rem;align-items:center}
</style>
<script>
let currentSort = 'liq';

const BDRS = [
  {t:'AAPL34', n:'Apple Inc.',            p:124.80, v:0.82,  dy:0.4,  pl:29.8, v12:18.2, vol:'R$42M',  volNum:42e6,  setor:'Tecnologia',  origem:'EUA'},
  {t:'MSFT34', n:'Microsoft Corp.',       p:218.40, v:0.65,  dy:0.6,  pl:36.2, v12:24.5, vol:'R$28M',  volNum:28e6,  setor:'Tecnologia',  origem:'EUA'},
  {t:'AMZO34', n:'Amazon.com Inc.',       p:98.20,  v:1.20,  dy:0.0,  pl:52.1, v12:41.8, vol:'R$22M',  volNum:22e6,  setor:'Consumo',     origem:'EUA'},
  {t:'GOGL34', n:'Alphabet Inc.',         p:88.60,  v:0.44,  dy:0.0,  pl:25.4, v12:32.1, vol:'R$18M',  volNum:18e6,  setor:'Tecnologia',  origem:'EUA'},
  {t:'NVDC34', n:'NVIDIA Corp.',          p:456.20, v:2.10,  dy:0.03, pl:68.5, v12:192.4,vol:'R$15M',  volNum:15e6,  setor:'Tecnologia',  origem:'EUA'},
  {t:'TSLA34', n:'Tesla Inc.',            p:128.40, v:-1.20, dy:0.0,  pl:62.4, v12:-12.8,vol:'R$12M',  volNum:12e6,  setor:'Consumo',     origem:'EUA'},
  {t:'META34', n:'Meta Platforms Inc.',   p:258.80, v:1.85,  dy:0.3,  pl:28.6, v12:55.3, vol:'R$10M',  volNum:10e6,  setor:'Comunicação', origem:'EUA'},
  {t:'JPMC34', n:'JPMorgan Chase & Co.', p:102.60, v:0.55,  dy:2.1,  pl:12.1, v12:22.8, vol:'R$8M',   volNum:8e6,   setor:'Financeiro',  origem:'EUA'},
  {t:'NFLX34', n:'Netflix Inc.',          p:288.40, v:0.90,  dy:0.0,  pl:38.5, v12:62.4, vol:'R$6M',   volNum:6e6,   setor:'Comunicação', origem:'EUA'},
  {t:'LVMH34', n:'LVMH Moët Hennessy',   p:412.80, v:-0.40, dy:1.8,  pl:22.4, v12:-8.2, vol:'R$4M',   volNum:4e6,   setor:'Consumo',     origem:'Europa'},
  {t:'SAMS34', n:'Samsung Electronics',  p:48.20,  v:0.30,  dy:2.4,  pl:18.2, v12:12.5, vol:'R$3M',   volNum:3e6,   setor:'Tecnologia',  origem:'Outros'},
  {t:'BABA34', n:'Alibaba Group',         p:38.60,  v:1.50,  dy:0.0,  pl:14.8, v12:28.4, vol:'R$5M',   volNum:5e6,   setor:'Consumo',     origem:'China'},
];

function setRank(el) {
  document.querySelectorAll('.rank-btn').forEach(b => b.classList.remove('active'));
  if (el.classList.contains('rank-btn')) el.classList.add('active');
  currentSort = el.dataset.sort;
  document.querySelectorAll('.sort-arrow').forEach(e => e.textContent = '');
  const th = document.querySelector(`th[data-sort="${currentSort}"] .sort-arrow`);
  if (th) th.textContent = ' ↓';
  filterTable();
}

function renderTable(arr) {
  const tb = document.getElementById('tbody');
  if (!arr.length) { tb.innerHTML='<tr><td colspan="8" style="text-align:center;padding:2rem;color:var(--text3)">Nenhum resultado</td></tr>'; return; }
  tb.innerHTML = '';
  arr.forEach((d, i) => {
    const tr = document.createElement('tr');
    tr.style.animationDelay = (i * 0.015) + 's';
    tr.className = 'fade-in'; tr.style.cursor = 'pointer';
    const vCls = d.v >= 0 ? 'up-pill' : 'dn-pill';
    const v12Cls = d.v12 >= 0 ? 'up' : 'dn';
    const origemFlag = {EUA:'🇺🇸', Europa:'🇪🇺', China:'🇨🇳', Outros:'🌐'}[d.origem] || '';
    tr.innerHTML = `
      <td><div style="display:flex;align-items:center;gap:10px">
        ${logoHtml(d.t.replace(/\d+$/,''), 32)}
        <div><div class="asset-ticker">${d.t}</div><div class="asset-name">${d.n}</div></div>
      </div></td>
      <td class="r" style="font-family:var(--font-mono)">R$&nbsp;${d.p.toFixed(2)}</td>
      <td class="r"><span class="pill ${vCls}">${d.v>=0?'+':''}${d.v.toFixed(2)}%</span></td>
      <td class="r gold">${d.dy > 0 ? d.dy.toFixed(1)+'%' : '—'}</td>
      <td class="r">${d.pl > 0 ? d.pl.toFixed(1)+'x' : '—'}</td>
      <td class="r ${v12Cls}">${d.v12 >= 0 ? '+' : ''}${d.v12.toFixed(1)}%</td>
      <td class="r" style="color:var(--text3);font-size:12px">${d.vol}</td>
      <td class="r" style="color:var(--text3);font-size:11px">${origemFlag} ${d.origem}</td>`;
    tr.onclick = () => location.href = `ativo.html?t=${d.t}&tipo=bdr`;
    tb.appendChild(tr);
  });
}

function filterTable() {
  const q = (document.getElementById('f-search').value || '').toLowerCase();
  const setor = document.getElementById('f-setor').value;
  const origem = document.getElementById('f-origem').value;
  let arr = BDRS.filter(d => {
    const mQ = !q || d.t.toLowerCase().includes(q) || d.n.toLowerCase().includes(q);
    const mS = !setor || d.setor === setor;
    const mO = !origem || d.origem === origem;
    return mQ && mS && mO;
  });
  const k = currentSort;
  if      (k === 'dy')  arr.sort((a,b) => b.dy - a.dy);
  else if (k === 'pl')  arr.sort((a,b) => (a.pl||999) - (b.pl||999));
  else if (k === 'v12') arr.sort((a,b) => b.v12 - a.v12);
  else if (k === 'p')   arr.sort((a,b) => b.p - a.p);
  else                  arr.sort((a,b) => (b.volNum||0) - (a.volNum||0));
  renderTable(arr);
}

function renderSidebar() {
  document.getElementById('top-altas').innerHTML = [...BDRS].sort((a,b)=>b.v-a.v).slice(0,5).map(d=>`
    <div class="mover-item" style="cursor:pointer" onclick="location.href='ativo.html?t=${d.t}&tipo=bdr'">
      <div style="display:flex;align-items:center;gap:8px">
        ${logoHtml(d.t.replace(/\d+$/,''),26)}
        <div><div class="mover-ticker">${d.t}</div><div class="mover-name">${d.setor}</div></div>
      </div>
      <div style="text-align:right">
        <div class="mover-price">R$&nbsp;${d.p.toFixed(2)}</div>
        <div class="mover-chg ${d.v>=0?'up':'dn'}">${d.v>=0?'+':''}${d.v.toFixed(2)}%</div>
      </div>
    </div>`).join('');

  document.getElementById('top-liq').innerHTML = [...BDRS].sort((a,b)=>b.volNum-a.volNum).slice(0,5).map(d=>`
    <div class="mover-item" style="cursor:pointer" onclick="location.href='ativo.html?t=${d.t}&tipo=bdr'">
      <div style="display:flex;align-items:center;gap:8px">
        ${logoHtml(d.t.replace(/\d+$/,''),26)}
        <div><div class="mover-ticker">${d.t}</div><div class="mover-name">${d.n.slice(0,20)}</div></div>
      </div>
      <span class="pill gold-pill">${d.vol}</span>
    </div>`).join('');

  document.getElementById('top-dy').innerHTML = [...BDRS].filter(d=>d.dy>0).sort((a,b)=>b.dy-a.dy).slice(0,5).map(d=>`
    <div class="mover-item" style="cursor:pointer" onclick="location.href='ativo.html?t=${d.t}&tipo=bdr'">
      <div style="display:flex;align-items:center;gap:8px">
        ${logoHtml(d.t.replace(/\d+$/,''),26)}
        <div><div class="mover-ticker">${d.t}</div><div class="mover-name">${d.setor}</div></div>
      </div>
      <span class="pill gold-pill">${d.dy.toFixed(1)}%</span>
    </div>`).join('');
}

async function init() {
  await loadData();
  filterTable();
  renderSidebar();
  const ts = document.getElementById('data-timestamp');
  if (ts) ts.textContent = '· Dados demonstrativos';
}
init();
</script>
</body>
</html>
