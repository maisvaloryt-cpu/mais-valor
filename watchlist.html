<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<link rel="icon" type="image/png" href="favicon.png">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Minha Watchlist — Mais Valor</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<div id="nav-placeholder"></div>
<div class="page-hero fade-in">
  <h1>MINHA <em>WATCHLIST</em></h1>
  <p>Seus ativos favoritos em um só lugar. Dados salvos localmente no seu navegador.</p>
</div>
<div class="container">
  <div id="empty-msg" style="display:none" class="empty-state">
    <div class="empty-state-icon">☆</div>
    <h2>Nenhum ativo favorito ainda</h2>
    <p>Acesse a página de qualquer ativo e clique em "Favoritar"</p>
    <a href="acoes.html" class="banner-btn" style="display:inline-block">Ver ações →</a>
  </div>

  <div id="watchlist-content" class="fade-in-1">
    <div class="mini-cards" id="wl-summary" style="margin-bottom:1.5rem"></div>
    <div class="table-wrap">
      <table class="data-table">
        <thead><tr>
          <th>Ativo</th><th class="r">Preço</th><th class="r">Hoje</th>
          <th class="r">DY 12m</th><th class="r">P/L</th><th class="r">P/VP</th>
          <th class="r">Volume</th><th class="r">Ação</th>
        </tr></thead>
        <tbody id="wl-tbody"></tbody>
      </table>
    </div>
  </div>
</div>
<div id="footer-placeholder"></div>
<script src="data.js"></script><script src="nav.js"></script>
<script>
function getWatchlist(){ try{ return JSON.parse(localStorage.getItem('mv_watchlist')||'[]'); }catch{ return []; } }
function removeFromWatchlist(t){ localStorage.setItem('mv_watchlist',JSON.stringify(getWatchlist().filter(x=>x!==t))); renderWatchlist(); }

function logoImg(ticker, size=22) {
  return `<img src="https://raw.githubusercontent.com/thefintz/icones-b3/main/icones/${ticker}.png"
    onerror="this.style.display='none'"
    style="width:${size}px;height:${size}px;border-radius:50%;object-fit:contain;background:#fff;flex-shrink:0">`;
}
function renderWatchlist(){
  const tickers=getWatchlist();
  const all=[...ACOES,...FIIS];
  if(!tickers.length){
    document.getElementById('empty-msg').style.display='';
    document.getElementById('watchlist-content').style.display='none';
    return;
  }
  document.getElementById('empty-msg').style.display='none';
  document.getElementById('watchlist-content').style.display='';
  const ativos=tickers.map(t=>all.find(a=>a.t===t)).filter(Boolean);
  const avgDY=ativos.filter(a=>a.dy>0).reduce((s,a,_,arr)=>s+a.dy/arr.length,0);
  const altas=ativos.filter(a=>a.v>0).length;
  document.getElementById('wl-summary').innerHTML=`
    <div class="mini-card"><div class="mini-label">Ativos favoritados</div><div class="mini-val">${ativos.length}</div></div>
    <div class="mini-card"><div class="mini-label">Em alta hoje</div><div class="mini-val up">${altas}</div><div class="mini-sub">${ativos.length-altas} em baixa</div></div>
    <div class="mini-card"><div class="mini-label">DY médio</div><div class="mini-val gold">${avgDY>0?avgDY.toFixed(1)+'%':'—'}</div></div>
    <div class="mini-card"><div class="mini-label">Última atualização</div><div class="mini-val" style="font-size:13px">${DATA_UPDATED_AT||'—'}</div></div>`;
  document.getElementById('wl-tbody').innerHTML=ativos.map((d,i)=>`
    <tr onclick="location.href='ativo.html?t=${d.t}${d.t.endsWith('11')?'&tipo=fii':''}'" class="fade-in" style="cursor:pointer;animation-delay:${i*0.03}s">
      <td><div style="display:flex;align-items:center;gap:8px">${logoImg(d.t)}<div><div class="asset-ticker">${d.t}</div><div class="asset-name">${d.n}</div></div></div></td>
      <td class="r">R$&nbsp;${d.p.toFixed(2)}</td>
      <td class="r"><span class="pill ${d.v>=0?'up-pill':'dn-pill'}">${d.v>=0?'+':''}${d.v.toFixed(2)}%</span></td>
      <td class="r gold">${d.dy>0?d.dy.toFixed(1)+'%':'—'}</td>
      <td class="r">${d.pl?(d.pl>0?d.pl.toFixed(1)+'x':'neg.'):'—'}</td>
      <td class="r">${d.pvp?d.pvp.toFixed(2):'—'}</td>
      <td class="r" style="color:var(--text3)">${d.vol}</td>
      <td class="r">
        <button onclick="event.stopPropagation();removeFromWatchlist('${d.t}')"
          style="background:var(--dn-bg);color:var(--dn);border:none;border-radius:6px;padding:4px 8px;cursor:pointer;font-size:11px;font-weight:700;transition:all .15s"
          onmouseover="this.style.background='var(--dn)';this.style.color='#fff'"
          onmouseout="this.style.background='var(--dn-bg)';this.style.color='var(--dn)'">
          ✕ Remover
        </button>
      </td>
    </tr>`).join('');
}

async function init(){ await loadData(); renderWatchlist(); }
init();
</script>
</body></html>
