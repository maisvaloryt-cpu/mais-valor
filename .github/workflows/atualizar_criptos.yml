name: Atualizar Criptos

on:
  schedule:
    # Roda às 6h e 18h UTC (3h e 15h horário de Brasília)
    - cron: '0 6,18 * * *'
  workflow_dispatch:
    inputs:
      modo:
        description: 'mercado | historico | tudo'
        required: false
        default: 'tudo'

jobs:
  atualizar:
    runs-on: ubuntu-latest
    timeout-minutes: 50

    steps:
      - name: Checkout do repositório
        uses: actions/checkout@v3

      - name: Configurar Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Instalar dependências
        run: pip install requests

      - name: Decidir modo
        id: modo
        run: |
          INPUT="${{ github.event.inputs.modo }}"
          echo "modo=${INPUT:-tudo}" >> $GITHUB_OUTPUT

      # ── MODO: só mercado (rápido ~2min) ─────────────────────────────────────
      - name: Atualizar mercado (sem histórico)
        if: ${{ steps.modo.outputs.modo == 'mercado' }}
        run: |
          python atualizar_criptos.py \
            --top 250 \
            --data-dir data \
            --details-top 50 \
            --skip-history

      # ── MODO: só histórico incremental ───────────────────────────────────────
      - name: Atualizar histórico incremental
        if: ${{ steps.modo.outputs.modo == 'historico' }}
        run: |
          python atualizar_criptos.py \
            --top 100 \
            --data-dir data \
            --details-top 0

      # ── MODO: tudo (schedule automático) ─────────────────────────────────────
      - name: Atualizar tudo
        if: ${{ steps.modo.outputs.modo == 'tudo' }}
        run: |
          python atualizar_criptos.py \
            --top 100 \
            --data-dir data \
            --details-top 20

      # ── SEMPRE: gera historico/ETHBRL.json, BTCBRL.json etc. para o Simulador ─
      - name: Gerar históricos BRL para o Simulador
        run: python gerar_historico_cripto.py

      - name: Commitar JSONs atualizados
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name  "GitHub Actions"
          git add data/cripto_market.json data/cripto_historico/ data/historico/BTCBRL.json data/historico/ETHBRL.json data/historico/SOLBRL.json data/historico/BNBBRL.json data/historico/XRPBRL.json 2>/dev/null || true
          git diff --staged --quiet || git commit -m "🤖 Criptos: atualização automática $(date -u '+%d/%m/%Y %H:%M UTC')"
          git push
