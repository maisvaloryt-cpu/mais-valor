name: Atualizar Criptos

on:
  schedule:
    - cron: '0 6,18 * * *'
  workflow_dispatch:
    inputs:
      modo:
        description: 'mercado | historico | tudo'
        required: false
        default: 'tudo'

jobs:
  atualizar:
    runs-on: ubuntu-latest
    timeout-minutes: 50

    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Dependências
        run: pip install requests

      - name: Decidir modo
        id: modo
        run: |
          INPUT="${{ github.event.inputs.modo }}"
          echo "modo=${INPUT:-tudo}" >> $GITHUB_OUTPUT

      # ── Mercado (preços atuais para página criptos.html) ─────────────────────
      - name: Mercado CoinGecko (sem histórico)
        if: ${{ steps.modo.outputs.modo == 'mercado' }}
        run: python atualizar_criptos.py --top 250 --data-dir data --details-top 50 --skip-history

      # ── Histórico CoinGecko (cripto_historico/ para página cripto-detalhe) ───
      - name: Histórico CoinGecko incremental
        if: ${{ steps.modo.outputs.modo == 'historico' }}
        run: python atualizar_criptos.py --top 100 --data-dir data --details-top 0

      # ── Tudo (schedule automático) ────────────────────────────────────────────
      - name: Atualizar mercado + histórico CoinGecko
        if: ${{ steps.modo.outputs.modo == 'tudo' }}
        run: python atualizar_criptos.py --top 100 --data-dir data --details-top 20

      # ── SEMPRE: gera historico/TICKER.json em BRL para o Simulador ───────────
      # Usa Binance API (gratuita, sem chave, sem bloqueio) + fallback Yahoo
      - name: Gerar históricos BRL para o Simulador (top 30 — Binance)
        run: python gerar_historico_cripto.py

      - name: Commit
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Actions"
          git add data/cripto_market.json data/cripto_historico/ \
                  data/historico/BTCBRL.json \
                  data/historico/ETHBRL.json \
                  data/historico/BNBBRL.json \
                  data/historico/SOLBRL.json \
                  data/historico/XRPBRL.json \
                  data/historico/ADABRL.json \
                  data/historico/DOGEBRL.json \
                  data/historico/AVAXBRL.json \
                  data/historico/LINKBRL.json \
                  data/historico/DOTBRL.json \
                  data/historico/LTCBRL.json \
                  data/historico/XLMBRL.json \
                  data/historico/ATOMBRL.json \
                  data/historico/TONBRL.json \
                  data/historico/NEARBRL.json \
                  data/historico/UNIBRL.json \
                  data/historico/BCHBRL.json \
                  data/historico/MATICBRL.json \
                  data/historico/ETCBRL.json \
                  data/historico/TRXBRL.json \
                  data/historico/ICPBRL.json \
                  data/historico/APTBRL.json \
                  data/historico/PEPEBRL.json \
                  data/historico/SHIBABRL.json \
                  data/historico/FILBRL.json \
                  data/historico/USDTBRL.json \
                  2>/dev/null || true
          git diff --staged --quiet || git commit -m "🤖 Criptos: $(date -u '+%d/%m/%Y %H:%M UTC')"
          git push
