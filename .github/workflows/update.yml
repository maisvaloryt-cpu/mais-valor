name: Atualizar Cotações Diariamente

on:
  schedule:
    - cron: '0 21 * * 1-5'
  workflow_dispatch:

jobs:
  update-data:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout do repositório
        uses: actions/checkout@v3

      - name: Instalar Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Instalar dependências
        run: pip install requests

      - name: Buscar cotações
        env:
          BRAPI_TOKEN: ${{ secrets.BRAPI_TOKEN }}
        run: python fetch_data.py

      - name: Commit e push dos dados
        run: |
          git config user.name "Mais Valor Bot"
          git config user.email "bot@maisvalor.com"
          git add data/
          git diff --staged --quiet || git commit -m "📊 Atualização diária de cotações $(date +'%d/%m/%Y %H:%M')"
          git push
