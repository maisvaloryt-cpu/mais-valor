name: Atualizar Cotações Diariamente

on:
  schedule:
    - cron: '0 21 * * 1-5'
  workflow_dispatch:
    inputs:
      modo:
        description: 'diario | g1 | g2 | g3 | g4 | g5 | fii1 | fii2 | fii3 | fii4'
        required: false
        default: 'diario'

jobs:
  update-data:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - name: Checkout do repositório
        uses: actions/checkout@v3

      - name: Instalar Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Instalar dependências
        run: pip install requests

      - name: Decidir modo automático
        id: modo
        run: |
          if [ "${{ github.event.inputs.modo }}" != "" ]; then
            echo "modo=${{ github.event.inputs.modo }}" >> $GITHUB_OUTPUT
          else
            ACOES=$(ls data/historico/*.json 2>/dev/null | grep -v "11\.json" | wc -l)
            FIIS=$(ls data/historico/*11.json 2>/dev/null | wc -l)
            echo "Ações com histórico: $ACOES | FIIs com histórico: $FIIS"
            if [ "$ACOES" -lt 100 ]; then
              echo "modo=g1" >> $GITHUB_OUTPUT
            elif [ "$ACOES" -lt 200 ]; then
              echo "modo=g2" >> $GITHUB_OUTPUT
            elif [ "$ACOES" -lt 300 ]; then
              echo "modo=g3" >> $GITHUB_OUTPUT
            elif [ "$ACOES" -lt 400 ]; then
              echo "modo=g4" >> $GITHUB_OUTPUT
            elif [ "$ACOES" -lt 403 ]; then
              echo "modo=g5" >> $GITHUB_OUTPUT
            elif [ "$FIIS" -lt 100 ]; then
              echo "modo=fii1" >> $GITHUB_OUTPUT
            elif [ "$FIIS" -lt 200 ]; then
              echo "modo=fii2" >> $GITHUB_OUTPUT
            elif [ "$FIIS" -lt 300 ]; then
              echo "modo=fii3" >> $GITHUB_OUTPUT
            elif [ "$FIIS" -lt 380 ]; then
              echo "modo=fii4" >> $GITHUB_OUTPUT
            else
              echo "modo=diario" >> $GITHUB_OUTPUT
            fi
          fi

      - name: Mostrar modo
        run: echo "Modo => ${{ steps.modo.outputs.modo }}"

      - name: Fundamentus — Ações
        if: ${{ steps.modo.outputs.modo == 'diario' }}
        run: python fetch_fundamentus.py

      - name: Fundamentus — FIIs
        if: ${{ steps.modo.outputs.modo == 'diario' }}
        run: python fetch_fiis_fundamentus.py

      - name: Cotações diárias (Brapi + fallback histórico)
        if: ${{ steps.modo.outputs.modo == 'diario' }}
        env:
          BRAPI_TOKEN: ${{ secrets.BRAPI_TOKEN }}
        run: python fetch_data.py

      - name: Histórico Ações — Grupo 1
        if: ${{ steps.modo.outputs.modo == 'g1' }}
        run: python fetch_historico_g1.py

      - name: Histórico Ações — Grupo 2
        if: ${{ steps.modo.outputs.modo == 'g2' }}
        run: python fetch_historico_g2.py

      - name: Histórico Ações — Grupo 3
        if: ${{ steps.modo.outputs.modo == 'g3' }}
        run: python fetch_historico_g3.py

      - name: Histórico Ações — Grupo 4
        if: ${{ steps.modo.outputs.modo == 'g4' }}
        run: python fetch_historico_g4.py

      - name: Histórico Ações — Grupo 5
        if: ${{ steps.modo.outputs.modo == 'g5' }}
        run: python fetch_historico_g5.py

      - name: Histórico FIIs — Grupo 1
        if: ${{ steps.modo.outputs.modo == 'fii1' }}
        run: python fetch_historico_fii_g1.py

      - name: Histórico FIIs — Grupo 2
        if: ${{ steps.modo.outputs.modo == 'fii2' }}
        run: python fetch_historico_fii_g2.py

      - name: Histórico FIIs — Grupo 3
        if: ${{ steps.modo.outputs.modo == 'fii3' }}
        run: python fetch_historico_fii_g3.py

      - name: Histórico FIIs — Grupo 4
        if: ${{ steps.modo.outputs.modo == 'fii4' }}
        run: python fetch_historico_fii_g4.py

      - name: Commit e push dos dados
        run: |
          git config user.name "Mais Valor Bot"
          git config user.email "bot@maisvalor.com"
          git add data/
          git diff --staged --quiet || git commit -m "📊 Atualização $(date +'%d/%m/%Y %H:%M') — ${{ steps.modo.outputs.modo }}"
          git push
