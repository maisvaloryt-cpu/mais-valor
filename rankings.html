<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<link rel="icon" type="image/png" href="favicon.png">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Rankings — Mais Valor</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<div id="nav-placeholder"></div>
<div class="page-hero fade-in">
  <h1>RANKINGS <em>B3</em></h1>
  <p>Os melhores e piores desempenhos por diferentes critérios.</p>
</div>
<div class="container">
  <div class="tabs fade-in-1">
    <button class="tab active" onclick="render('dy-acoes',this)">DY Ações</button>
    <button class="tab" onclick="render('dy-fiis',this)">DY FIIs</button>
    <button class="tab" onclick="render('altas',this)">Maiores Altas</button>
    <button class="tab" onclick="render('baixas',this)">Maiores Baixas</button>
    <button class="tab" onclick="render('pl',this)">Menor P/L</button>
    <button class="tab" onclick="render('pvp-acoes',this)">Menor P/VP Ações</button>
    <button class="tab" onclick="render('pvp-fiis',this)">Menor P/VP FIIs</button>
    <button class="tab" onclick="render('roe',this)">Maior ROE</button>
    <button class="tab" onclick="render('cresc',this)">Crescimento</button>
  </div>

  <div class="main-grid">
    <div class="fade-in-2">
      <div class="section-header">
        <div class="section-title" id="rank-title">—</div>
        <input class="filter-input" placeholder="Filtrar..." style="width:160px" oninput="filterRank(this.value)" id="rank-filter">
      </div>
      <div class="table-wrap">
        <table class="data-table">
          <thead><tr id="rank-thead"></tr></thead>
          <tbody id="rank-tbody"></tbody>
        </table>
      </div>
    </div>

    <div class="sidebar fade-in-3">
      <div class="card">
        <div class="section-header" style="margin-bottom:.75rem"><div class="section-title">Pódio DY Ações</div></div>
        <div id="podio-acoes"></div>
      </div>
      <div class="card">
        <div class="section-header" style="margin-bottom:.75rem"><div class="section-title">Pódio DY FIIs</div></div>
        <div id="podio-fiis"></div>
      </div>
      <div class="card">
        <div class="section-header" style="margin-bottom:.75rem"><div class="section-title">Maiores Altas Hoje</div></div>
        <div id="top-altas"></div>
      </div>
    </div>
  </div>
</div>
<div id="footer-placeholder"></div>
<script src="data.js"></script><script src="nav.js"></script>
<script>
let currentData=[], currentConfig=null;

function assetCell(d){
  return `<td>
    <div style="display:flex;align-items:center;gap:10px">
      ${logoHtml(d.t, 32)}
      <div>
        <div style="display:flex;align-items:center;gap:6px">
          <div class="asset-ticker">${d.t}</div>
          ${scoreBadge(d)}
        </div>
        <div class="asset-name">${d.n?.slice(0,26)||''}</div>
      </div>
    </div>
  </td>`;
}

const configs = {
  'dy-acoes':{title:'Maiores Dividend Yield — Ações',
    getData:()=>[...ACOES].filter(d=>d.dy>0&&d.dy<=50).sort((a,b)=>b.dy-a.dy),
    head:'<th>Pos.</th><th>Ativo</th><th class="r">Preço</th><th class="r">DY 12m</th><th class="r">P/L</th><th class="r">Setor</th><th class="r">Hoje</th>',
    row:(d,i)=>`<td style="color:var(--text3);font-weight:700">#${i+1}</td>
      ${assetCell(d)}
      <td class="r">R$&nbsp;${d.p.toFixed(2)}</td>
      <td class="r" style="font-size:16px;font-weight:800;color:var(--gold)">${d.dy.toFixed(1)}%</td>
      <td class="r">${d.pl?(d.pl>0?d.pl.toFixed(1)+'x':'neg.'):'—'}</td>
      <td class="r" style="color:var(--text3);font-size:11px">${d.setor}</td>
      <td class="r"><span class="pill ${d.v>=0?'up-pill':'dn-pill'}">${d.v>=0?'+':''}${d.v.toFixed(2)}%</span></td>`},

  'dy-fiis':{title:'Maiores Dividend Yield — FIIs',
    getData:()=>[...FIIS].filter(d=>d.dy>0&&d.dy<=50).sort((a,b)=>b.dy-a.dy),
    head:'<th>Pos.</th><th>FII</th><th class="r">Cota</th><th class="r">DY 12m</th><th class="r">P/VP</th><th class="r">Segmento</th><th class="r">Hoje</th>',
    row:(d,i)=>`<td style="color:var(--text3);font-weight:700">#${i+1}</td>
      ${assetCell(d)}
      <td class="r">R$&nbsp;${d.p.toFixed(2)}</td>
      <td class="r" style="font-size:16px;font-weight:800;color:var(--gold)">${d.dy.toFixed(1)}%</td>
      <td class="r ${d.pvp&&d.pvp<1?'up':''}">${d.pvp?d.pvp.toFixed(2):'—'}</td>
      <td class="r" style="color:var(--text3);font-size:11px">${d.setor}</td>
      <td class="r"><span class="pill ${d.v>=0?'up-pill':'dn-pill'}">${d.v>=0?'+':''}${d.v.toFixed(2)}%</span></td>`},

  'altas':{title:'Maiores Altas do Dia',
    getData:()=>[...ACOES,...FIIS].filter(d=>d.v>0).sort((a,b)=>b.v-a.v),
    head:'<th>Pos.</th><th>Ativo</th><th class="r">Preço</th><th class="r">Hoje</th><th class="r">DY</th><th class="r">Volume</th>',
    row:(d,i)=>`<td style="color:var(--text3);font-weight:700">#${i+1}</td>
      ${assetCell(d)}
      <td class="r">R$&nbsp;${d.p.toFixed(2)}</td>
      <td class="r"><span class="pill up-pill">+${d.v.toFixed(2)}%</span></td>
      <td class="r gold">${d.dy>0?d.dy.toFixed(1)+'%':'—'}</td>
      <td class="r" style="color:var(--text3)">${d.vol}</td>`},

  'baixas':{title:'Maiores Baixas do Dia',
    getData:()=>[...ACOES,...FIIS].filter(d=>d.v<0).sort((a,b)=>a.v-b.v),
    head:'<th>Pos.</th><th>Ativo</th><th class="r">Preço</th><th class="r">Hoje</th><th class="r">DY</th><th class="r">Volume</th>',
    row:(d,i)=>`<td style="color:var(--text3);font-weight:700">#${i+1}</td>
      ${assetCell(d)}
      <td class="r">R$&nbsp;${d.p.toFixed(2)}</td>
      <td class="r"><span class="pill dn-pill">${d.v.toFixed(2)}%</span></td>
      <td class="r gold">${d.dy>0?d.dy.toFixed(1)+'%':'—'}</td>
      <td class="r" style="color:var(--text3)">${d.vol}</td>`},

  'pl':{title:'Menor P/L — Ações mais baratas pelo lucro',
    getData:()=>[...ACOES].filter(d=>d.pl&&d.pl>0&&d.pl<100).sort((a,b)=>a.pl-b.pl),
    head:'<th>Pos.</th><th>Ativo</th><th class="r">Preço</th><th class="r">P/L</th><th class="r">DY</th><th class="r">ROE</th><th class="r">Setor</th>',
    row:(d,i)=>`<td style="color:var(--text3);font-weight:700">#${i+1}</td>
      ${assetCell(d)}
      <td class="r">R$&nbsp;${d.p.toFixed(2)}</td>
      <td class="r" style="font-size:16px;font-weight:800;color:var(--up)">${d.pl.toFixed(1)}x</td>
      <td class="r gold">${d.dy>0?d.dy.toFixed(1)+'%':'—'}</td>
      <td class="r ${d.roe&&d.roe>15?'up':''}">${d.roe?d.roe.toFixed(1)+'%':'—'}</td>
      <td class="r" style="color:var(--text3);font-size:11px">${d.setor}</td>`},

  'pvp-acoes':{title:'Menor P/VP — Ações abaixo do valor patrimonial',
    getData:()=>[...ACOES].filter(d=>d.pvp&&d.pvp>0&&d.pvp<5).sort((a,b)=>a.pvp-b.pvp),
    head:'<th>Pos.</th><th>Ativo</th><th class="r">Preço</th><th class="r">P/VP</th><th class="r">DY</th><th class="r">P/L</th><th class="r">Setor</th>',
    row:(d,i)=>`<td style="color:var(--text3);font-weight:700">#${i+1}</td>
      ${assetCell(d)}
      <td class="r">R$&nbsp;${d.p.toFixed(2)}</td>
      <td class="r" style="font-size:16px;font-weight:800;color:var(--up)">${d.pvp.toFixed(2)}</td>
      <td class="r gold">${d.dy>0?d.dy.toFixed(1)+'%':'—'}</td>
      <td class="r">${d.pl?(d.pl>0?d.pl.toFixed(1)+'x':'neg.'):'—'}</td>
      <td class="r" style="color:var(--text3);font-size:11px">${d.setor}</td>`},

  'pvp-fiis':{title:'Menor P/VP — FIIs abaixo do valor patrimonial',
    getData:()=>[...FIIS].filter(d=>d.pvp&&d.pvp>0&&d.pvp<2).sort((a,b)=>a.pvp-b.pvp),
    head:'<th>Pos.</th><th>FII</th><th class="r">Cota</th><th class="r">P/VP</th><th class="r">DY</th><th class="r">Segmento</th>',
    row:(d,i)=>`<td style="color:var(--text3);font-weight:700">#${i+1}</td>
      ${assetCell(d)}
      <td class="r">R$&nbsp;${d.p.toFixed(2)}</td>
      <td class="r" style="font-size:16px;font-weight:800;color:var(--up)">${d.pvp.toFixed(2)}</td>
      <td class="r gold">${d.dy>0?d.dy.toFixed(1)+'%':'—'}</td>
      <td class="r" style="color:var(--text3);font-size:11px">${d.setor}</td>`},

  'roe':{title:'Maior ROE — Retorno sobre Patrimônio',
    getData:()=>[...ACOES].filter(d=>d.roe&&d.roe>0&&d.roe<200).sort((a,b)=>b.roe-a.roe),
    head:'<th>Pos.</th><th>Ativo</th><th class="r">Preço</th><th class="r">ROE</th><th class="r">ROIC</th><th class="r">DY</th><th class="r">Setor</th>',
    row:(d,i)=>`<td style="color:var(--text3);font-weight:700">#${i+1}</td>
      ${assetCell(d)}
      <td class="r">R$&nbsp;${d.p.toFixed(2)}</td>
      <td class="r" style="font-size:16px;font-weight:800;color:var(--up)">${d.roe.toFixed(1)}%</td>
      <td class="r ${d.roic&&d.roic>12?'up':''}">${d.roic?d.roic.toFixed(1)+'%':'—'}</td>
      <td class="r gold">${d.dy>0?d.dy.toFixed(1)+'%':'—'}</td>
      <td class="r" style="color:var(--text3);font-size:11px">${d.setor}</td>`},

  'cresc':{title:'Maior Crescimento de Receita — 5 anos',
    getData:()=>[...ACOES].filter(d=>d.cresc5a&&d.cresc5a>0&&d.cresc5a<500).sort((a,b)=>b.cresc5a-a.cresc5a),
    head:'<th>Pos.</th><th>Ativo</th><th class="r">Preço</th><th class="r">Cresc. 5a</th><th class="r">ROE</th><th class="r">DY</th><th class="r">Setor</th>',
    row:(d,i)=>`<td style="color:var(--text3);font-weight:700">#${i+1}</td>
      ${assetCell(d)}
      <td class="r">R$&nbsp;${d.p.toFixed(2)}</td>
      <td class="r" style="font-size:16px;font-weight:800;color:var(--up)">${d.cresc5a.toFixed(1)}%</td>
      <td class="r ${d.roe&&d.roe>15?'up':''}">${d.roe?d.roe.toFixed(1)+'%':'—'}</td>
      <td class="r gold">${d.dy>0?d.dy.toFixed(1)+'%':'—'}</td>
      <td class="r" style="color:var(--text3);font-size:11px">${d.setor}</td>`},
};

function render(key, el) {
  if(el){ document.querySelectorAll('.tab').forEach(b=>b.classList.remove('active')); el.classList.add('active'); }
  const cfg=configs[key]; currentConfig=cfg;
  document.getElementById('rank-title').textContent=cfg.title;
  document.getElementById('rank-thead').innerHTML=cfg.head;
  currentData=cfg.getData();
  document.getElementById('rank-filter').value='';
  renderTable(currentData);
}

function renderTable(arr){
  document.getElementById('rank-tbody').innerHTML=arr.slice(0,100).map((d,i)=>{
    const staleAttr = d.stale ? ' data-stale="true" title="Último valor disponível"' : '';
    return `<tr onclick="location.href='ativo.html?t=${d.t}${d.t.endsWith('11')?'&tipo=fii':''}'" class="fade-in" style="cursor:pointer;animation-delay:${i*0.012}s"${staleAttr}>${currentConfig.row(d,i)}</tr>`;
  }).join('');
}

function filterRank(q) {
  if(!currentConfig) return;
  renderTable(currentConfig.getData().filter(d=>
    d.t.toLowerCase().includes(q.toLowerCase())||d.n.toLowerCase().includes(q.toLowerCase())
  ));
}

function renderSidebar(){
  const medal=(i)=>['🥇','🥈','🥉'][i]||`#${i+1}`;
  const topA=[...ACOES].filter(d=>d.dy>0&&d.dy<=50).sort((a,b)=>b.dy-a.dy).slice(0,3);
  document.getElementById('podio-acoes').innerHTML=topA.map((d,i)=>`
    <div class="mover-item" style="cursor:pointer" onclick="location.href='ativo.html?t=${d.t}'">
      <div style="display:flex;align-items:center;gap:8px">
        <span style="font-size:18px">${medal(i)}</span>
        ${logoHtml(d.t,26)}
        <div><div class="mover-ticker">${d.t}</div><div class="mover-name">${d.setor}</div></div>
      </div>
      <span class="pill gold-pill">${d.dy.toFixed(1)}%</span></div>`).join('');

  const topF=[...FIIS].filter(d=>d.dy>0&&d.dy<=50).sort((a,b)=>b.dy-a.dy).slice(0,3);
  document.getElementById('podio-fiis').innerHTML=topF.map((d,i)=>`
    <div class="mover-item" style="cursor:pointer" onclick="location.href='ativo.html?t=${d.t}&tipo=fii'">
      <div style="display:flex;align-items:center;gap:8px">
        <span style="font-size:18px">${medal(i)}</span>
        ${logoHtml(d.t,26)}
        <div><div class="mover-ticker">${d.t}</div><div class="mover-name">${d.setor}</div></div>
      </div>
      <span class="pill gold-pill">${d.dy.toFixed(1)}%</span></div>`).join('');

  const altas=[...ACOES,...FIIS].filter(d=>d.v>0).sort((a,b)=>b.v-a.v).slice(0,5);
  document.getElementById('top-altas').innerHTML=altas.map(d=>`
    <div class="mover-item" style="cursor:pointer" onclick="location.href='ativo.html?t=${d.t}'">
      <div style="display:flex;align-items:center;gap:8px">
        ${logoHtml(d.t,26)}
        <div><div class="mover-ticker">${d.t}</div><div class="mover-name">${d.setor}</div></div>
      </div>
      <span class="pill up-pill">+${d.v.toFixed(2)}%</span></div>`).join('');
}

async function init(){
  await loadData();
  render('dy-acoes', null);
  renderSidebar();
}
init();
</script>
</body></html>
