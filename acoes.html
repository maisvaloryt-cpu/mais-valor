<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<link rel="icon" type="image/png" href="favicon.png">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Ações — Mais Valor</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<div id="nav-placeholder"></div>

<div class="page-hero fade-in">
  <h1>AÇÕES <em>B3</em></h1>
  <p>Cotações, indicadores e histórico de todas as ações listadas na bolsa brasileira.
    <span id="data-timestamp" style="color:var(--gold);font-size:12px"></span></p>
</div>

<div class="container">
  <div class="main-grid">
    <div class="fade-in-1">

      <!-- BUSCA E SETOR -->
      <div class="filter-bar">
        <input class="filter-input" placeholder="🔍 Buscar por ticker ou nome..." style="flex:1;max-width:300px" oninput="filterTable()" id="f-search">
        <select class="filter-select" onchange="filterTable()" id="f-setor">
          <option value="">Todos os setores</option>
          <option>Bancos</option><option>Petróleo & Gás</option><option>Mineração</option>
          <option>Varejo</option><option>Indústria</option><option>Bebidas</option>
          <option>Telecomunicações</option><option>Siderurgia</option><option>Holdings</option>
          <option>Papel & Celulose</option><option>Locação</option><option>Saúde</option>
          <option>Energia</option><option>Alimentos</option><option>Construção</option>
        </select>
      </div>

      <div class="table-wrap">
        <!-- RANKING colado acima da tabela -->
        <div class="ranking-bar" style="border-bottom:1px solid rgba(255,255,255,0.07);padding-bottom:10px;margin-bottom:0">
          <span class="ranking-label">Ranking por:</span>
          <div class="ranking-btns">
            <button class="rank-btn active" data-sort="mcap" onclick="setRank(this)">Market Cap</button>
            <button class="rank-btn" data-sort="dy" onclick="setRank(this)">DY</button>
            <button class="rank-btn" data-sort="graham" onclick="setRank(this)">Mais Baratas - Graham</button>
            <button class="rank-btn" data-sort="ml" onclick="setRank(this)">Margem Líquida</button>
            <button class="rank-btn" data-sort="v" onclick="setRank(this)">Variação dia</button>
            <button class="rank-btn" data-sort="liq" onclick="setRank(this)">Liquidez</button>
          </div>
        </div>
        <table class="data-table">
          <thead><tr>
            <th>Ativos</th>
            <th class="r">Valor de Mercado</th>
            <th class="r">P/L</th>
            <th class="r">P/VP</th>
            <th class="r">Dividend Yield</th>
            <th class="r">Margem Líquida</th>
            <th class="r">Setor</th>
          </tr></thead>
          <tbody id="tbody">
            <tr><td colspan="8" style="text-align:center;padding:2rem;color:var(--text3)">
              <span class="loading-dot"></span><span class="loading-dot"></span><span class="loading-dot"></span>
            </td></tr>
          </tbody>
        </table>
      </div>
    </div>

    <div class="sidebar fade-in-2">
      <div class="card">
        <div class="section-header" style="margin-bottom:.75rem"><div class="section-title">Por Setor</div></div>
        <div id="setor-list"></div>
      </div>
      <div class="card">
        <div class="section-header" style="margin-bottom:.75rem"><div class="section-title">Top DY</div></div>
        <div id="top-dy"></div>
      </div>
      <div class="card">
        <div class="section-header" style="margin-bottom:.75rem"><div class="section-title">Mais Negociadas</div></div>
        <div id="top-vol"></div>
      </div>
    </div>
  </div>
</div>

<div id="footer-placeholder"></div>
<script src="data.js"></script>
<script src="nav.js"></script>
<style>
.ranking-bar{display:flex;align-items:center;gap:12px;flex-wrap:wrap;padding:10px 0 4px}
.ranking-label{font-size:13px;color:var(--text3);white-space:nowrap;font-weight:500}
.ranking-btns{display:flex;gap:6px;flex-wrap:wrap}
.rank-btn{background:transparent;border:1px solid rgba(255,255,255,0.1);color:var(--text2);padding:5px 14px;border-radius:20px;font-size:12px;font-weight:500;cursor:pointer;transition:all .18s;white-space:nowrap}
.rank-btn:hover{border-color:var(--gold);color:var(--gold)}
.rank-btn.active{background:var(--gold);border-color:var(--gold);color:#000;font-weight:700}
</style>
<script>
let data = [];
let currentSort = 'mcap';

function fmtBi(v) {
  if (v >= 1e12) return (v/1e12).toFixed(2) + ' T';
  if (v >= 1e9)  return (v/1e9).toFixed(2) + ' B';
  if (v >= 1e6)  return (v/1e6).toFixed(2) + ' M';
  return v.toLocaleString('pt-BR');
}

function setRank(el) {
  document.querySelectorAll('.rank-btn').forEach(b => b.classList.remove('active'));
  el.classList.add('active');
  currentSort = el.dataset.sort;
  filterTable();
}

// ── Tabela ────────────────────────────────────────────────────────
function renderTable(arr) {
  const tb = document.getElementById('tbody');
  tb.innerHTML = '';
  if (!arr.length) {
    tb.innerHTML = '<tr><td colspan="8" style="text-align:center;padding:2rem;color:var(--text3)">Nenhum ativo encontrado</td></tr>';
    return;
  }
  arr.forEach((d, i) => {
    const tr = document.createElement('tr');
    tr.style.animationDelay = (i * 0.015) + 's';
    tr.className = 'fade-in';
    tr.style.cursor = 'pointer';
    tr.innerHTML = `
      <td>
        <div style="display:flex;align-items:center;gap:10px">
          ${logoHtml(d.t, 32)}
          <div>
            <div class="asset-ticker">${d.t}</div>
            <div class="asset-name">${d.n}</div>
          </div>
        </div>
      </td>
      <td class="r" style="color:var(--text2)">${d.mcap ? fmtBi(d.mcap) : d.vol}</td>
      <td class="r" style="color:var(--text2)">${d.pl > 0 ? d.pl.toFixed(2) : '—'}</td>
      <td class="r" style="color:var(--text2)">${d.pvp > 0 ? d.pvp.toFixed(2) : '—'}</td>
      <td class="r gold">${d.dy > 0 ? d.dy.toFixed(1) + '%' : '—'}</td>
      <td class="r" style="color:var(--text2)">${d.ml > 0 ? d.ml.toFixed(2) + '%' : '—'}</td>
      <td class="r" style="color:var(--text3);font-size:11px">${d.setor || '—'}</td>`;
    tr.onclick = () => location.href = `ativo.html?t=${d.t}`;
    tb.appendChild(tr);
  });
}

// ── Filtro e ordenação ─────────────────────────────────────────────
function filterTable() {
  const q = document.getElementById('f-search').value.toLowerCase();
  const s = document.getElementById('f-setor').value;
  data = ACOES.filter(d =>
    (d.t.toLowerCase().includes(q) || d.n.toLowerCase().includes(q)) &&
    (!s || d.setor === s)
  );
  applySort(currentSort);
}

function applySort(k) {
  if (k === 't')           data.sort((a, b) => a.t.localeCompare(b.t));
  else if (k === 'v')      data.sort((a, b) => b.v - a.v);
  else if (k === 'dy')     data.sort((a, b) => b.dy - a.dy);
  else if (k === 'liq')    data.sort((a, b) => (b.volNum || 0) - (a.volNum || 0));
  else if (k === 'ml')     data.sort((a, b) => (b.ml || 0) - (a.ml || 0));
  else if (k === 'graham') data.sort((a, b) => (a.pl || 999) - (b.pl || 999));
  else /* mcap */          data.sort((a, b) => (b.mcap || b.volNum || 0) - (a.mcap || a.volNum || 0));
  renderTable(data);
}

// ── Sidebar ────────────────────────────────────────────────────────
function renderSidebar() {
  const setores = {};
  ACOES.forEach(d => { setores[d.setor] = (setores[d.setor] || 0) + 1; });
  document.getElementById('setor-list').innerHTML = Object.entries(setores)
    .sort((a, b) => b[1] - a[1])
    .map(([s, n]) => `
      <div class="mover-item" style="cursor:pointer" onclick="document.getElementById('f-setor').value='${s}';filterTable()">
        <span style="font-size:12px;font-weight:700">${s}</span>
        <span class="pill gold-pill">${n}</span>
      </div>`).join('');

  const topDy = [...ACOES].filter(d => d.dy > 0).sort((a, b) => b.dy - a.dy).slice(0, 5);
  document.getElementById('top-dy').innerHTML = topDy.length
    ? topDy.map(d => `
      <div class="mover-item" style="cursor:pointer" onclick="location.href='ativo.html?t=${d.t}'">
        <div style="display:flex;align-items:center;gap:8px">
          ${logoHtml(d.t, 26)}
          <div><div class="mover-ticker">${d.t}</div><div class="mover-name">${d.setor}</div></div>
        </div>
        <span class="pill gold-pill">${d.dy.toFixed(1)}%</span>
      </div>`).join('')
    : '<div style="color:var(--text3);font-size:12px">—</div>';

  const topVol = [...ACOES].sort((a, b) => (b.volNum || 0) - (a.volNum || 0)).slice(0, 5);
  document.getElementById('top-vol').innerHTML = topVol.map(d => `
    <div class="mover-item" style="cursor:pointer" onclick="location.href='ativo.html?t=${d.t}'">
      <div style="display:flex;align-items:center;gap:8px">
        ${logoHtml(d.t, 26)}
        <div><div class="mover-ticker">${d.t}</div><div class="mover-name">${d.n.slice(0, 22)}</div></div>
      </div>
      <span style="font-size:12px;font-family:var(--font-mono);color:var(--text2)">${d.vol}</span>
    </div>`).join('');
}

async function init() {
  await loadData();
  // Abre sempre ordenado por Market Cap
  data = [...ACOES].sort((a, b) => (b.mcap || b.volNum || 0) - (a.mcap || a.volNum || 0));
  const params = new URLSearchParams(location.search);
  if (params.get('q')) {
    document.getElementById('f-search').value = params.get('q');
    filterTable();
  } else {
    renderTable(data);
  }
  renderSidebar();
}
init();
</script>
</body>
</html>
