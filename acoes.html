<style>
.ranking-bar{display:flex;align-items:center;gap:12px;flex-wrap:wrap;padding:10px 0 4px}
.ranking-label{font-size:13px;color:var(--text3);white-space:nowrap;font-weight:500}
.ranking-btns{display:flex;gap:6px;flex-wrap:wrap}
.rank-btn{background:transparent;border:1px solid rgba(255,255,255,0.1);color:var(--text2);padding:5px 14px;border-radius:20px;font-size:12px;font-weight:500;cursor:pointer;transition:all .18s;white-space:nowrap}
.rank-btn:hover{border-color:var(--gold);color:var(--gold)}
.rank-btn.active{background:var(--gold);border-color:var(--gold);color:#000;font-weight:700}
.sortable-th{cursor:pointer;user-select:none;white-space:nowrap}
.sortable-th:hover{color:var(--gold)}
.th-arrow{margin-left:4px;font-size:10px;color:var(--gold);opacity:0}
.sortable-th.th-active .th-arrow{opacity:1}
.sortable-th.th-active{color:var(--gold)}
</style>
<script>
let data = [];
let currentSort = 'mcap';
let thSortDir = {}; // guarda direção por coluna

function thSort(col) {
  // Alterna direção se clicar na mesma coluna
  thSortDir[col] = thSortDir[col] === 'asc' ? 'desc' : 'asc';
  const asc = thSortDir[col] === 'asc';

  // Atualiza visuais dos headers
  document.querySelectorAll('.sortable-th').forEach(th => {
    th.classList.remove('th-active');
    const arr = th.querySelector('.th-arrow');
    if (arr) arr.textContent = '';
  });
  const activeArr = document.getElementById('arr-' + col);
  if (activeArr) {
    activeArr.closest('.sortable-th').classList.add('th-active');
    activeArr.textContent = asc ? '▲' : '▼';
  }

  // Desativa ranking-btn ativo
  document.querySelectorAll('.rank-btn').forEach(b => b.classList.remove('active'));

  // Ordena
  const q = document.getElementById('f-search').value.toLowerCase();
  const s = document.getElementById('f-setor').value;
  data = ACOES.filter(d =>
    (d.t.toLowerCase().includes(q) || d.n.toLowerCase().includes(q)) &&
    (!s || d.setor === s)
  );

  if (col === 't')    data.sort((a, b) => asc ? a.t.localeCompare(b.t) : b.t.localeCompare(a.t));
  else if (col === 'mcap') data.sort((a, b) => asc ? (a.mcap||0)-(b.mcap||0) : (b.mcap||0)-(a.mcap||0));
  else if (col === 'pl')   data.sort((a, b) => asc ? (a.pl||0)-(b.pl||0)   : (b.pl||0)-(a.pl||0));
  else if (col === 'pvp')  data.sort((a, b) => asc ? (a.pvp||0)-(b.pvp||0) : (b.pvp||0)-(a.pvp||0));
  else if (col === 'dy')   data.sort((a, b) => asc ? (a.dy||0)-(b.dy||0)   : (b.dy||0)-(a.dy||0));
  else if (col === 'ml')   data.sort((a, b) => asc ? (a.ml||0)-(b.ml||0)   : (b.ml||0)-(a.ml||0));

  renderTable(data);
}

function fmtBi(v) {
  if (v >= 1e12) return (v/1e12).toFixed(2) + ' T';
  if (v >= 1e9)  return (v/1e9).toFixed(2) + ' B';
  if (v >= 1e6)  return (v/1e6).toFixed(2) + ' M';
  return v.toLocaleString('pt-BR');
}

function setRank(el) {
  document.querySelectorAll('.rank-btn').forEach(b => b.classList.remove('active'));
  el.classList.add('active');
  currentSort = el.dataset.sort;
  // Atualizar cabeçalho da coluna contextual
  const thMl = document.getElementById('th-ml');
  if (thMl) thMl.textContent = currentSort === 'bazin' ? 'Preço Teto Bazin' : 'Margem Líquida';
  filterTable();
}

// ── Tabela ────────────────────────────────────────────────────────
function renderTable(arr) {
  const tb = document.getElementById('tbody');
  tb.innerHTML = '';
  if (!arr.length) {
    tb.innerHTML = '<tr><td colspan="8" style="text-align:center;padding:2rem;color:var(--text3)">Nenhum ativo encontrado</td></tr>';
    return;
  }
  arr.forEach((d, i) => {
    const tr = document.createElement('tr');
    tr.style.animationDelay = (i * 0.015) + 's';
    tr.className = 'fade-in';
    tr.style.cursor = 'pointer';
    if (d.stale) tr.setAttribute('data-stale', 'true');
    tr.innerHTML = `
      <td>
        <div style="display:flex;align-items:center;gap:10px">
          ${logoHtml(d.t, 32)}
          <div>
            <div class="asset-ticker">${d.t}</div>
            <div class="asset-name">${d.n}</div>
          </div>
        </div>
      </td>
      <td class="r" style="color:var(--text2)">${d.mcap ? fmtBi(d.mcap) : '—'}</td>
      <td class="r" style="color:var(--text2)">${d.pl > 0 ? d.pl.toFixed(2) : '—'}</td>
      <td class="r" style="color:${d.pvp > 0 && d.pvp < 1 ? 'var(--up)' : d.pvp > 3 ? 'var(--dn)' : 'var(--text2)'}">${d.pvp > 0 ? d.pvp.toFixed(2) : '—'}</td>
      <td class="r gold">${d.dy > 0 ? d.dy.toFixed(1) + '%' : '0%'}</td>
      <td class="r" style="color:var(--text2)">${
        currentSort === 'bazin'
          ? (() => {
              const t = d.div12m / 0.06;
              const up = (t - d.p) / d.p * 100;
              const cor = up >= 0 ? 'var(--up)' : 'var(--dn)';
              const sinal = up >= 0 ? '+' : '';
              return `<span style="color:${cor}">Teto R$${t.toFixed(2)}</span> <span style="font-size:10px;color:${cor}">(${sinal}${up.toFixed(1)}%)</span>`;
            })()
          : d.ml > 0 ? d.ml.toFixed(2) + '%' : '—'
      }</td>
      <td class="r" style="color:var(--text3);font-size:11px">${d.setor || '—'}</td>`;
    tr.onclick = () => location.href = `ativo.html?t=${d.t}`;
    tb.appendChild(tr);
  });
}

// ── Filtro e ordenação ─────────────────────────────────────────────
function filterTable() {
  const q = document.getElementById('f-search').value.toLowerCase();
  const s = document.getElementById('f-setor').value;
  data = ACOES.filter(d =>
    (d.t.toLowerCase().includes(q) || d.n.toLowerCase().includes(q)) &&
    (!s || d.setor === s)
  );
  applySort(currentSort);
}

function applySort(k) {
  if (k === 't')           data.sort((a, b) => a.t.localeCompare(b.t));
  else if (k === 'v')      data.sort((a, b) => b.v - a.v);
  else if (k === 'dy')     data.sort((a, b) => b.dy - a.dy);
  else if (k === 'liq')    data.sort((a, b) => (b.volNum || 0) - (a.volNum || 0));
  else if (k === 'ml')     data.sort((a, b) => (b.ml || 0) - (a.ml || 0));
  else if (k === 'graham') {
    // Fórmula de Graham: P/L × P/VP < 22,5 → ordena pelo produto (menor = mais barato)
    const grahamScore = d => (d.pl > 0 && d.pvp > 0) ? d.pl * d.pvp : 99999;
    data = data.filter(d => d.pl > 0 && d.pvp > 0); // remove quem não tem os dois
    data.sort((a, b) => grahamScore(a) - grahamScore(b));
  }
  else if (k === 'bazin') {
    // Bazin: preço teto = div12m / 0.06
    // Mostra todas as ações com div12m, ordenadas pelo maior upside
    // Verde = abaixo do teto (compra), Vermelho = acima do teto (caro)
    data = data.filter(d => d.div12m > 0 && d.p > 0);
    data.sort((a, b) => {
      const upside = d => (d.div12m / 0.06 - d.p) / d.p;
      return upside(b) - upside(a);
    });
  }
  else /* mcap */          data.sort((a, b) => (b.mcap || b.volNum || 0) - (a.mcap || a.volNum || 0));
  renderTable(data);
}

// ── Sidebar ────────────────────────────────────────────────────────
function renderSidebar() {
  const setores = {};
  ACOES.forEach(d => { setores[d.setor] = (setores[d.setor] || 0) + 1; });
  document.getElementById('setor-list').innerHTML = Object.entries(setores)
    .sort((a, b) => b[1] - a[1])
    .map(([s, n]) => `
      <div class="mover-item" style="cursor:pointer" onclick="document.getElementById('f-setor').value='${s}';filterTable()">
        <span style="font-size:12px;font-weight:700">${s}</span>
        <span class="pill gold-pill">${n}</span>
      </div>`).join('');

  const topDy = [...ACOES].filter(d => d.dy > 0).sort((a, b) => b.dy - a.dy).slice(0, 5);
  document.getElementById('top-dy').innerHTML = topDy.length
    ? topDy.map(d => `
      <div class="mover-item" style="cursor:pointer" onclick="location.href='ativo.html?t=${d.t}'">
        <div style="display:flex;align-items:center;gap:8px">
          ${logoHtml(d.t, 26)}
          <div><div class="mover-ticker">${d.t}</div><div class="mover-name">${d.setor}</div></div>
        </div>
        <span class="pill gold-pill">${d.dy.toFixed(1)}%</span>
      </div>`).join('')
    : '<div style="color:var(--text3);font-size:12px">—</div>';

  const topVol = [...ACOES].sort((a, b) => (b.volNum || 0) - (a.volNum || 0)).slice(0, 5);
  document.getElementById('top-vol').innerHTML = topVol.map(d => `
    <div class="mover-item" style="cursor:pointer" onclick="location.href='ativo.html?t=${d.t}'">
      <div style="display:flex;align-items:center;gap:8px">
        ${logoHtml(d.t, 26)}
        <div><div class="mover-ticker">${d.t}</div><div class="mover-name">${d.n.slice(0, 22)}</div></div>
      </div>
      <span style="font-size:12px;font-family:var(--font-mono);color:var(--text2)">${d.vol}</span>
    </div>`).join('');
}

async function init() {
  await loadData();
  // Abre sempre ordenado por Market Cap
  data = [...ACOES].sort((a, b) => (b.mcap || b.volNum || 0) - (a.mcap || a.volNum || 0));
  const params = new URLSearchParams(location.search);
  if (params.get('q')) {
    document.getElementById('f-search').value = params.get('q');
    filterTable();
  } else {
    renderTable(data);
  }
  renderSidebar();
}
init();
</script>
